name: Sync Dashboard to Public Repo

# 대시보드를 별도 Public 저장소로 동기화 (Pages는 대시보드 저장소 Actions에서 배포)
# 로컬에서 한 줄 실행: ./tools/deploy_dashboard.sh bootstrap speeno/delphi-dashboard
#
# CI 동기화를 쓰려면: Secrets → DASHBOARD_DEPLOY_TOKEN (repo 권한 PAT)
# Variables → DASHBOARD_REPO (예: speeno/delphi-dashboard)

on:
  push:
    branches: [master, main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'

  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Sync to dashboard repo
        env:
          DEPLOY_TOKEN: ${{ secrets.DASHBOARD_DEPLOY_TOKEN }}
          DASHBOARD_REPO: ${{ vars.DASHBOARD_REPO }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_TOKEN:-}" ]; then
            echo "::warning::DASHBOARD_DEPLOY_TOKEN이 없습니다. 로컬: ./tools/deploy_dashboard.sh bootstrap"
            exit 0
          fi
          REPO="${DASHBOARD_REPO:-speeno/delphi-dashboard}"

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          CLONE_DIR=$(mktemp -d)
          git clone "https://x-access-token:${DEPLOY_TOKEN}@github.com/${REPO}.git" "$CLONE_DIR"

          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            dashboard/ "$CLONE_DIR/"

          mkdir -p "$CLONE_DIR/.github/workflows"
          cp tools/templates/github-pages-deploy.yml "$CLONE_DIR/.github/workflows/deploy.yml"

          cd "$CLONE_DIR"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Dashboard sync: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git branch -M main
          git push -u origin main
