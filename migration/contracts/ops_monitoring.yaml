version: 1.0.0
scenario_id: C14
title: 운영 모니터링 계약 (Self-hosted only — 외부 SaaS APM/알림/로그집계 제외)
status: frozen   # v1.0 동결 — 확장 라인 v0.2 §3 (C14) 진입 게이트 충족
created: 2026-04-20
updated: 2026-04-20
owner: 메인개발자

constraints:
  external_integrations: excluded  # DEC-044 정합 — 외부 SaaS 연동 ❌
  external_apm:        excluded    # Datadog/NewRelic/Sentry 호스티드 ❌
  external_alerting:   excluded    # Slack/Teams/PagerDuty 외부 ❌
  external_log_aggr:   excluded    # ELK 호스티드/Splunk ❌
  new_sql_count: 0                  # audit 통합 뷰는 기존 audit_* SELECT 재사용 (DEC-040)

references:
  - analysis/screen_cards/C14_Ops_Monitoring.md
  - legacy-analysis/permission-keys-catalog.md   # §4 — F90/F91/F92 등록
  - DEC-033  # 멀티 DB 호환 (4 server 동시 모니터링)
  - DEC-040  # 신규 SQL 0 정책
  - DEC-041  # 표준 응답 코드
  - DEC-042  # If-Match/ETag (다중 관리자 동시성)
  - DEC-044  # 외부 시스템 연동 제외 + 권한 카탈로그 단일 등록

scope:
  health_extension:
    path: /api/v1/health/full
    legacy_compat_path: /api/v1/health   # 기존 경량 health 는 보존
    guard_permission: admin.health.read   # F92
    response_schema:
      status: enum[ok, degraded, fail]
      dependencies:
        db: ok|degraded|fail
        disk: ok|degraded|fail
        external: ok|na  # 본 페이즈는 항상 na
      uptime_seconds: int
    # v0.2 보강 — degraded 매핑표 (계획서 v0.2 §3 의 매핑 정책)
    degraded_mapping:
      - rule_id: DM-1
        condition: db.fail OR disk.fail
        result: status=fail   # HTTP 503
      - rule_id: DM-2
        condition: db.degraded OR disk.degraded
        result: status=degraded   # HTTP 200 (배포 LB 는 통과시키되 in-app 배너 노출)
      - rule_id: DM-3
        condition: db.ok AND disk.ok
        result: status=ok   # HTTP 200

  metrics:
    path: /metrics
    guard_permission: admin.metrics.read   # F91
    format: prometheus_text_004
    library: prometheus_client  # Apache-2.0
    counters:
      - http_requests_total
      - http_errors_total
      - db_queries_total
    histograms:
      - http_request_duration_seconds
      - db_query_duration_seconds
    gauges:
      - db_pool_size
      - db_pool_in_use
    # v0.2 보강 — 라벨 카디널리티 정책 (Prometheus 폭증 방지)
    label_cardinality_policy:
      max_unique_label_values_per_metric: 50
      forbidden_label_keys:
        - user_id      # 카디널리티 폭증 — 사용자 단위 메트릭 금지
        - request_id   # 추적 식별자 — 메트릭 라벨 부적합
        - hcode_full   # 전체 hcode 카디널리티 (대신 hcode_class 그룹화)
      allowed_label_keys:
        - method        # GET/POST/PUT/DELETE — ≤ 8
        - endpoint_pattern  # 라우터 경로 패턴 — ≤ 50
        - status_class  # 2xx/3xx/4xx/5xx — ≤ 5
        - server_id     # 4 server — ≤ 4
      enforcement:
        static_check: "test/test_c14_ops_phase1.py::test_S_03_metric_label_cardinality_policy"

  audit_view:
    path: /api/v1/admin/audit
    guard_permission: admin.audit.read   # F90
    sources:
      - audit_settlement
      - audit_returns
      - audit_password_attempts
    d_select_policy: 본 사용자 데이터만 (operator) / Server_id 분기 (branch_manager) / 전체 (admin)
    pagination: { limit: 100, max_limit: 500 }

  in_app_banner:
    path: /api/v1/admin/alerts
    guard_permission: admin.audit.read
    storage: in_memory_queue   # 외부 채널 ❌ — DEC-044
    severity: enum[info, warn, critical]
    eviction: max_items=200, retention_minutes=60

  # ─── Phase 2 (T6) — 프론트엔드 풀 구현 ───────────────────────────
  # 게이트 #6 SLA 정합 — 외부 SaaS 호출 0 (DEC-044) + ETag 적용 + 저빈도 폴링.
  phase2_frontend:
    library:
      charts: not_required        # C14 화면은 카드/테이블/배너 위주, recharts 미사용
      polling_interval_ms: 60000  # GlobalAlertBanner — 60s 저빈도 (브라우저 부하 ↓)
      polling_pause_when_hidden: true   # document.hidden=true 시 폴링 일시정지
    pages:
      - path: /admin/ops
        permission: admin.health.read   # 페이지 가드 (3개 권한 전체 노출은 본문에서 부분가드)
        legacy_id: WebAdmOps
        sections: [Health, Metrics, Alerts]
        notes: |
          - Prometheus 카운터(http_requests_total / http_errors_total / db_queries_total) 만 카드 노출.
          - 원본(text 0.0.4) 은 토글로 펼침.
          - Alert dismiss 는 If-Match (ETag) 필수 — 409/428 메시지 매핑 (DEC-042).
      - path: /admin/audit
        permission: admin.audit.read   # F90
        legacy_id: WebAdmAudit
        filters: [channel, limit]
        notes: 권한별 d_select 는 백엔드에서 수행 (operator/branch_manager/admin).
    global_alert_banner:
      mount: "도서물류관리프로그램/frontend/src/app/(app)/layout.tsx"
      visibility: "admin.audit.read 권한 보유자에게만 노출 (PermissionGuard 와 동일 규칙)"
      severity_threshold: warn       # info 는 글로벌 미노출 — /admin/ops 에서만 표시
      max_visible: 3
    sla_alignment:
      external_calls: 0               # DEC-044 — 외부 SaaS 호출 ❌
      concurrency_control: ETag/If-Match (DEC-042)
      auth_error_codes: standardized (401 AUTH_*, 403 PERMISSION_DENIED, 409 STAT_INVALID_RANGE 미사용 — DEC-041)

acceptance_criteria:
  - id: AC-OPS-1
    description: "/health/full 이 dependency 별 분리 응답 — degraded_mapping (DM-1~3) 정합"
    test: "test/test_c14_ops_phase1.py::test_R_01_health_full_dependency_split"
  - id: AC-OPS-2
    description: "/metrics 가 Prometheus exposition 표준 (text 0.0.4) + 라벨 카디널리티 정책 정합"
    test: "test/test_c14_ops_phase1.py::test_R_02_metrics_prometheus_format"
  - id: AC-OPS-3
    description: "in-app 알림 배너 — server-authoritative (in-memory 큐) + DEC-042 If-Match 적용"
    test: "test/test_c14_ops_phase1.py::test_R_03_in_app_banner_etag"
  - id: AC-OPS-4
    description: "audit 통합 뷰가 admin.audit.read 가드 + d_select 적용"
    test: "test/test_c14_ops_phase1.py::test_R_04_audit_view_guard_and_dselect"
  - id: AC-OPS-5
    description: "신규 SQL 0건 — audit 통합 뷰는 기존 audit_* SELECT 만 호출"
    test: "test/test_c14_ops_phase1.py::test_S_04_no_new_sql_in_ops_layer"

decisions:
  - DEC-OPS-1   # self-hosted only (외부 SaaS 제외 — DEC-044 정합)
  - DEC-OPS-2   # Prometheus 단일 metrics 표준 + 라벨 카디널리티 정책
  - DEC-OPS-3   # /health degraded_mapping DM-1~3 동결
  - DEC-044     # 외부 시스템 연동 제외 + 신규 SQL 0건
open_questions:
  - OQ-OPS-1   # 메트릭 보존 정책 (Prometheus retention)
  - OQ-OPS-2   # 알림 임계값 (degraded → critical 승격)
