# Migration Contract: 로그인·세션 시작 (C1)
# 본 계약은 레거시 델파이 동작을 웹(API+UI)에서 동등하게 재현하기 위한 1차 계약입니다.
# 출처(레거시): legacy_delphi_source/legacy_source/Chul.pas FormCreate (line 441~) + ToolButton18Click (line 1956~)
# 사용 폼: Subu00 (TSubu00, Chul.dfm)
# 핵심 테이블: Id_Logn (analysis/db_impact_matrix.json: SELECT 9 / UPDATE 4)
# 관련 OQ: OQ-001, OQ-DBL-002, OQ-DBL-003 (런타임 SQL 캡처로 보강)

id: C1-login
name: 로그인·세션 시작
version: 1.1.0
status: approved        # draft → review → approved
scope_phase: phase1     # phase1 = 1차 포팅 범위 동결 (DEC-005~008 1차 제외 반영)
acceptance_goal: |
  1차 포팅 합격선: "기존 사용자가 기존 아이디/비밀번호로 그대로 로그인 가능".
  멀티테넌시(D-LOGIN-4) / 비밀번호 해시(D-LOGIN-1) / 라이선스 키(D-LOGIN-2) / 슈퍼유저 분기(D-LOGIN-3) 는 모두 후속 작업으로 이관.
owners:
  business: 메인개발자
  legacy: 델파이 담당자
  web: 웹 포팅 팀
links:
  candidate: docs/core-scenarios-candidates.md#1-후보요약
  test_pack: migration/test-cases/login.json
  source_legacy:
    - legacy_delphi_source/legacy_source/Chul.pas
    - legacy_delphi_source/legacy_source/Chul.dfm
  related_open_questions:
    - OQ-001  # 고객사 분기 — Hcode='0000' 슈퍼유저 판정이 모든 고객사 동일한지
    - OQ-DBL-002  # 평문 비밀번호(Id_Logn.Gpass) 정책의 정합성
    - OQ-DBL-003  # 런타임 SQL 캡처로 추가 SELECT 발견 시 본 계약 보강
    - OQ-LOGIN-1  # 멀티테넌시 배포·매핑 모델 (D-LOGIN-4 신규)

# ---------------------------------------------------------------
# 1. 비즈니스 의도 (한 줄)
# ---------------------------------------------------------------
intent: |
  사용자(작업자명/아이디/비밀번호)를 검증해 세션을 시작하고, 권한 코드(Hnnnn)와 표시명을
  애플리케이션 헤더에 노출한다. 권한 코드 0000은 슈퍼유저 분기에 사용된다.

# ---------------------------------------------------------------
# 2. 입력 (UI/API 공용)
# ---------------------------------------------------------------
inputs:
  - name: gname           # 레거시 Logn1 (작업자 이름)
    type: string
    required: true
    legacy_field: Id_Logn.Gname
    note: "한글 가능, 사용자가 수기 입력"
  - name: gcode           # 레거시 Logn2 (로그인 코드/사번)
    type: string
    required: true
    legacy_field: Id_Logn.Gcode
    note: "코드 체계는 OQ-001 확인 필요"
  - name: gpass           # 레거시 Logn3 (비밀번호)
    type: string
    required: true
    legacy_field: Id_Logn.Gpass
    sensitivity: secret
    note: "레거시는 평문 비교(Gpass=Logn3). 1차 포팅도 평문 동등 비교 보존(DEC-005). 해시 도입은 후속 작업."
  # tenant_hint: 1차 포팅에서 삭제 (DEC-008 — 단일 테넌트 운영). 후속 작업에서 D-LOGIN-4 옵션 B/C 채택 시 재도입.

# ---------------------------------------------------------------
# 3. 출력
# ---------------------------------------------------------------
outputs:
  success:
    - name: hcode         # 레거시 Hnnnn
      type: string
      legacy_field: Id_Logn.Hcode
      use: "권한·고객사 분기 키. '0000'은 슈퍼유저"
    - name: hname         # 레거시 Subu00.Caption 추가 표시
      type: string
      legacy_field: Id_Logn.Hname
      use: "헤더에 표시"
    - name: session_token # 신규(웹 전용)
      type: string
      use: "이후 모든 API 호출의 인증 토큰"
  failure_codes:
    - code: AUTH_NO_USER
      legacy_message: "사용자 또는 아이디가 틀립니다."
      condition: "SELECT 결과가 NODATA"
    - code: AUTH_BAD_PASSWORD
      legacy_message: "비밀번호가 틀립니다."
      condition: "row.Gpass != input.gpass"
    - code: AUTH_KEY_REGISTER_REQUIRED
      legacy_message: "Program Key를 등록해 주세요."
      condition: "Hnnnn이 ChulpanKey/Chul001~003Key 어느 것과도 매치되지 않음"
      web_handling: "웹은 라이선스/키 검증을 서버 측 정책으로 이관 — §6 결정 필요"

# ---------------------------------------------------------------
# 4. 데이터 액세스 (레거시 SQL ↔ 웹 SQL)
# ---------------------------------------------------------------
data_access:
  - id: SQL-LOGIN-1
    legacy:
      file: legacy_delphi_source/legacy_source/Chul.pas
      line: 441
      sql: |
        Select Hcode, Hname, Gpass From Id_Logn
         Where Gcode = '<Logn2>'
           and Gname = '<Logn1>'
    notes:
      - "문자열 연결 SQL (#39 단일따옴표). 웹은 파라미터 바인딩 필수."
      - "런타임 캡처(query_capture)로 동일 SELECT 1건 재확인 권장."
    web:
      method: SELECT
      table: Id_Logn
      columns: [Hcode, Hname, Gpass]
      where:
        - "Gcode = :gcode"
        - "Gname = :gname"
      bind: parameterized
  - id: SQL-LOGIN-2-VISIBILITY   # 슈퍼유저(Hnnnn='0000') 가시성 필터 — 1차 포팅 제외 (DEC-007)
    legacy:
      file: legacy_delphi_source/legacy_source/Chul.pas
      line: 490
      sql: |
        Select Gcode From G7_Ggeo
         Where Chek5 = 'show1' Order By Gcode
    notes:
      - "Hnnnn='0000'(슈퍼유저)일 때만 실행. 결과로 S_Where0/1/2 가시성 필터(Hcode/Gcode 제외 목록) 구성."
      - "Chul.pas L486~L515 If Hnnnn='0000' Then ... 블록."
      - "**DEC-007**: 1차 포팅에서 슈퍼유저 분기 자체를 제외하므로 본 SELECT 호출 없음. 후속 권한 관리 기능(C10) 통합 시 재도입."
    in_scope_for_beta: false
    in_scope_phase1: false
    deferred_to: "후속 작업 (C10 권한 관리 통합 설계 시)"
  - id: SQL-PWCHANGE-1   # 비밀번호 변경(ToolButton18Click) — 본 계약 베타 범위 외, 참고만
    legacy:
      file: legacy_delphi_source/legacy_source/Chul.pas
      line: 1967
      sql: |
        UPDATE Id_Logn SET Gcode = '<St1>' WHERE Hcode = '0001'
    notes:
      - "주의: 컬럼명이 Gcode이지만 비밀번호 변경 처리에 쓰이는 인용 사례. OQ-DBL-002 검토 항목."
    in_scope_for_beta: false

# ---------------------------------------------------------------
# 5. 엔드포인트 (웹)
# ---------------------------------------------------------------
endpoints:
  - method: POST
    path: /api/auth/login
    request:
      content_type: application/json
      schema:
        gcode: string
        gname: string
        gpass: string
    responses:
      "200":
        body:
          hcode: string
          hname: string
          session_token: string
          is_super: boolean   # hcode == '0000'
      "401":
        body:
          code: enum [AUTH_NO_USER, AUTH_BAD_PASSWORD]
          message: string
      "403":
        body:
          code: AUTH_KEY_REGISTER_REQUIRED
          message: string
        note: "1차 포팅에서 본 응답은 발생하지 않음(DEC-006 — 라이선스 검증 비활성). 응답 스키마는 후속 호환을 위해 보존."

# ---------------------------------------------------------------
# 6. 차이점·결정 사항 (Decision Log 후보)
# ---------------------------------------------------------------
deltas:
  - id: D-LOGIN-1
    title: 비밀번호 평문 저장 → 단방향 해시
    in_scope_phase1: false
    decision_ref: DEC-005
    phase1_behavior: "1차 포팅은 Id_Logn.Gpass 평문 그대로 사용. 레거시와 동일한 평문 동등 비교(Gpass = :gpass) 유지."
    legacy_behavior: "Id_Logn.Gpass에 평문 보관, 동등 비교"
    proposed_web_behavior: "(후속) 별도 컬럼·테이블에 bcrypt/argon2id 해시 저장. lazy migration: 첫 로그인 성공 시 자동 변환."
    risk: "1차 — 평문 비밀번호 노출 위험 누적. 후속 도입까지 한시적 보안 요구사항(전송 TLS, DB 접근 통제) 강화로 보완."
    decision_required_by: "후속 사이클 (별도 DEC-XXX)"
    open_question: OQ-DBL-002
    deferred_to: "후속 작업 (해시 정책·마이그레이션 일정 별도 동결)"

  - id: D-LOGIN-2
    title: 라이선스 키 체크(레지스트리) → 서버 측 정책
    in_scope_phase1: false
    decision_ref: DEC-006
    phase1_behavior: "1차 포팅은 라이선스 검증 비활성(전 사용자 PASS). 클라이언트 레지스트리 의존 코드는 웹에서 폐지(설치형 아님)."
    legacy_behavior: "클라이언트 레지스트리의 ChulpanKey/Chul001~003Key 와 Hnnnn 매치"
    proposed_web_behavior: "(후속) 서버측 License_Tenant 테이블 + JWT claim 으로 서버 단일 통제. 요금제·만료·인스턴스 한도 등 서버 정책으로 운영."
    risk: "1차 — 라이선스 통제 부재. 베타 사용 범위가 내부 한정이므로 수용 가능."
    decision_required_by: "후속 사이클 (별도 DEC-XXX)"
    open_question: OQ-001
    deferred_to: "후속 작업 (서버측 라이선스 정책 정의 시)"

  - id: D-LOGIN-3
    title: "'0000' 슈퍼유저 분기 — 권한 관리 기능에 통합"
    in_scope_phase1: false
    decision_ref: DEC-007
    phase1_behavior: "1차 포팅은 슈퍼유저 분기 자체 제외. 모든 사용자 동등 권한으로 동작. SQL-LOGIN-2-VISIBILITY 미호출."
    legacy_behavior: "Hnnnn='0000' 으로 슈퍼유저 분기 + G7_Ggeo 가시성 필터 SELECT"
    proposed_web_behavior: "(후속) C10 권한 관리 화면에서 역할(role)·권한 매트릭스 통합 설계로 도입. '0000' → role='admin' 마이그레이션."
    risk: "1차 — 관리자 전용 기능 부재. 1차 합격선(기본 업무 화면 동작)에 비치명적."
    decision_required_by: "후속 사이클 (C10 권한 관리 통합 설계)"
    open_question: OQ-001
    deferred_to: "후속 작업 (C10 권한 관리)"

  - id: D-LOGIN-4
    title: "사용자→테넌트(서버) 자동 매핑 (웹 멀티테넌시)"
    in_scope_phase1: false
    decision_ref: DEC-008
    phase1_behavior: "1차 포팅은 단일 테넌트 운영(레거시와 동일한 고객사별 별도 인스턴스 모델 유지). 기존 사용자가 기존 ID/PW 로 그대로 로그인."
    legacy_behavior: |
      고객사별 별도 EXE 배포 + Config.Ini[Client] 로컬 설정으로 사실상 단일 테넌트.
      Chul.pas L376~L427: nBase/nUses/nPcip/nPort 로딩, MimeDecode 된 base64 DB 접속 정보 하드코딩.
      사용자→테넌트 매핑 코드는 정적 분석 결과 어디에도 없음.
    proposed_web_behavior: |
      (후속) 한 웹 인스턴스에 다수 고객사 수용. 옵션 A/B/C 중 별도 합의 사이클로 확정 후 도입.
      옵션 A) Id_Logn 에 tenant_id 컬럼 추가 + JWT claim + RLS-style 필터.
      옵션 B) user_tenant 매핑 테이블 + 사용자 선택 UI.
      옵션 C) 서브도메인/경로 기반.
    risk: "1차 — 단일 테넌트 운영이므로 인스턴스 분리 운영 비용 그대로. 후속 멀티테넌시 도입 시 회귀 리스크는 별도 사이클에서 관리."
    decision_required_by: "후속 사이클 (멀티테넌시 합의 — 별도 DEC-XXX)"
    open_question: OQ-LOGIN-1
    deferred_to: "후속 작업 (멀티테넌시 도입 시)"
    related: ["D-LOGIN-3"]

# ---------------------------------------------------------------
# 7. 동등성 기준 (5축 — eval-axes-and-dod-draft.md)
# ---------------------------------------------------------------
equivalence:
  functional:
    - "동일 (gcode, gname, gpass) 입력에 대한 성공/실패 분기가 레거시와 동일"
    - "AUTH_NO_USER, AUTH_BAD_PASSWORD 메시지 분기 보존"
    - "1차: 슈퍼유저 분기 미수행(DEC-007). 모든 사용자 동등 권한."
    - "1차: 라이선스 키 검증 미수행(DEC-006). AUTH_KEY_REGISTER_REQUIRED 미발생."
  data:
    - "Id_Logn SELECT only (변경 없음). Gpass 평문 동등 비교 (DEC-005)."
    - "1차: 단일 테넌트 운영 (DEC-008). tenant_id 컬럼·JWT claim·RLS 필터 미사용."
    - "비밀번호 변경 흐름은 본 계약 범위 밖(별도 계약)"
  ux:
    - "헤더에 hname 표시 동일성"
    - "에러 메시지 한글 문구 의미 보존(문장은 다소 다듬을 수 있음)"
  performance:
    - "p95 < 500 ms (네트워크 포함). 평문 비교이므로 bcrypt 비용 0."
  audit:
    - "로그인 성공·실패 모두 감사 로그 기록(레거시는 미흡 → 신규 요구)"

# ---------------------------------------------------------------
# 8. 비범위 (out of scope for this contract)
# ---------------------------------------------------------------
out_of_scope:
  - "비밀번호 변경 / 초기 비밀번호 발급 — 별도 계약"
  - "고객사 자체 SSO·도메인 인증 — OQ-001 결과에 따라 별도 계약"
  - "레지스트리 키 체크 — 웹에서는 §6 D-LOGIN-2로 대체 (1차 비활성)"
  # 1차 포팅 추가 비범위 (DEC-005~008 기준)
  - "비밀번호 해시 마이그레이션 (D-LOGIN-1 / DEC-005) — 후속 작업"
  - "라이선스 키 서버측 정책 (D-LOGIN-2 / DEC-006) — 후속 작업"
  - "슈퍼유저 분기 + G7_Ggeo 가시성 필터 (D-LOGIN-3 / DEC-007) — 후속 C10 권한 관리 통합"
  - "사용자→테넌트 자동 매핑 / 멀티테넌시 (D-LOGIN-4 / DEC-008) — 후속 작업"

