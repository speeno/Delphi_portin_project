  - id: OOS-INQ-2
    item: "Sobo31 Panel003 거래처별 분배 그리드 (DBGrid201, 9 컬럼)"
    rationale: "거래처별 분배는 C5 정산 후속 — 1차 단일 시계열 그리드로 단순화."
