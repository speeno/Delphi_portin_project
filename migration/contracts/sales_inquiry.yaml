    rationale: "React 의 loading boolean 으로 일괄 흡수 — 별도 컴포넌트 신설 안 함."
  - id: OOS-INQ-6
    item: "4폼 공통 검색 패널의 출판사 검색 4종 (Edit107/108, Panel102/103/105 출판사 라벨)"
    rationale: "C6 1차는 거래처 hcode 단일. 출판사 검색은 후속."
  - id: OOS-INQ-7
    item: "Sobo61/62 의 지점별검색/본사출고제외 체크박스 (CheckBox1/2)"
    rationale: "scope 파라미터로 흡수 — UI 토글은 후속."

