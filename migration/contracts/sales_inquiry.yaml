# ---------------------------------------------------------------
# 11. Phase 2 보강 — 모바일 메뉴 통합 (DEC-046)
# ---------------------------------------------------------------
# 본 섹션은 Sobo21 + Sobo48 의 phase2 변형(view 모드 / audit 비교)만 추가.
# 단일 원천: migration/contracts/_phase2_screen_to_contract_map.yaml
phase2_addendum:
  transactions_status_view:
    base_legacy: Sobo21
    base_endpoint: GET /api/v1/transactions/status
    permission: transactions.status.read
    new_query_param:
      view: required enum[list, summary, memo]   # 모바일 통합 메뉴 분기
    response_variants:
      list:
        items:
          - txn_date: ISO date
            slip_no: string
            customer_code: string
            customer_name: string
            book_count: int
            total_amount: int
        page: { limit: 200, max_limit: 500 }
      summary:
        items:
          - customer_code: string
            customer_name: string
            slip_count: int
            total_qty: int
            total_amount: int
        sort: amount_desc
      memo:
        items:
          - txn_date: ISO date
            slip_no: string
            customer_name: string
            memo_preview: string   # 첫 100자
