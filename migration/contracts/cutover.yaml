version: 1.0.0
scenario_id: C15_cutover
title: 데이터 마이그레이션/Cut-over 계약 (자체 스크립트 only — 외부 SaaS 제외)
status: frozen   # v1.0 동결 — 확장 라인 v0.2 §4 (C15) 진입 게이트 충족
created: 2026-04-20
updated: 2026-04-20
owner: 메인개발자 + 운영팀

constraints:
  external_integrations: excluded   # AWS DMS / Azure Migrate ❌ (DEC-044)
  external_data_transform: excluded  # ETL SaaS ❌
  new_sql_count: 0                    # validator 는 기존 service SELECT 재사용 (DEC-040)
  rollback_rto_min: 15                # 15분 내 레거시 EXE 복구

references:
  - analysis/screen_cards/C15_Cutover.md
  - DEC-033  # 4 server 멀티 DB (mysql3 폴백)
  - DEC-040  # 신규 SQL 0
  - DEC-041  # 표준 응답 코드
  - DEC-042  # If-Match/ETag 부하
  - DEC-044  # 외부 시스템 연동 제외

scope:
  inventory:
    tables:
      - { name: Id_Logn, criticality: critical }
      - { name: S1_Ssub, criticality: critical }
      - { name: S2_Stra, criticality: critical }
      - { name: R1_Rsub, criticality: high }
      - { name: R2_Rtra, criticality: high }
      - { name: Sv_Ghng, criticality: high }
      - { name: G4_Book, criticality: medium }
      - { name: G3_Sang, criticality: medium }
      - { name: G1_Ggeo, criticality: medium }
      - { name: G2_Ggwo, criticality: medium }
    servers: [remote_138, remote_153, remote_154, remote_155]

  procedure:
    - id: P1
      step: 마지막 영업일 종료 후 운영 lock (read-only 모드 전환)
      duration_min: 15
    - id: P2
      step: mysqldump (per server) + checksum 산출
      duration_min: 60
    - id: P3
      step: 신규 환경 import + 스키마 어댑터 검증 (DEC-033 t5_ssub_adapt 등)
      duration_min: 120
    - id: P4
      step: cutover_validator.py 5종 검증 (count + checksum + encoding + mysql3 호환 + 스키마 차분)
      duration_min: 30
    - id: P5
      step: 사용자 검수 (UAT 합격 — 7 핵심 시나리오)
      duration_min: 60
    - id: P6
      step: 운영 전환 (DNS/proxy 스위치) + 신규 환경 read-write
      duration_min: 15
    total_window_min: 300

  rollback:
    trigger: "24h 이내 critical(P0/P1) 결함 발생 또는 validator 실패율 ≥ 1%"
    rto_min: 15
    data_loss: 0   # 신규 환경 read-only 우회로 데이터 손실 0 (cut-over 후 24h 이내)
    procedure:
      - "1. 신규 환경 read-only mode 전환 (write API 차단)"
      - "2. DNS/proxy 레거시 EXE 환경으로 스위치"
      - "3. 24h 윈도우 내 신규 데이터 → 레거시 환경 reconciliation 스크립트 실행"
      - "4. 사후 RCA 작성 + DEC 보강"

  # v0.2 보강 — 5종 validator 정의
  validator:
    module: scripts/cutover_validator.py
    checks:
      - id: VC-1
        name: row_count_equality
        description: "각 테이블의 행 수가 신/구 환경 동일"
        tolerance: 0
      - id: VC-2
        name: checksum_equality
        description: "샘플링된 critical 컬럼 (Id_Logn.Hcode/Pwd, S1_Ssub.Idx/Gssum) MD5/SHA-256 동일"
        sample_strategy: "critical=ALL, high=10%, medium=1%"
      - id: VC-3
        name: encoding_compat
        description: "UTF-8 → 신규 환경 적재 시 mojibake 0건 (KOI8-R/EUC-KR 잔존 검사)"
        forbidden_byte_patterns: ["0xC0 0x80 (modified UTF-8)", "0xEF 0xBF 0xBD (replacement char)"]
      - id: VC-4
        name: mysql3_compat
        description: "DEC-033 t5_ssub_adapt 컬럼 alias (Yesno/Yesno1, Sdate/Sdate1) 정합"
        adapters: [t5_ssub_adapt, sg_csum_adapt, t1_t2_polymorphic]
      - id: VC-5
        name: schema_diff_zero
        description: "신/구 환경 information_schema 차분 0건 (added/removed column → 차단)"
        allowed_diff: "audit_* 관리 컬럼만 (auditor_id/audit_ts) 신규 허용"

  open_questions_handling:
    - id: OQ-IN-1
      title: "입고 마감일 기준 (Sobo38 P_8 = '예약입고')"
      cutover_block: true
      reason: "예약입고 인스턴스의 마감/cancel 정책 결정 전까지 cut-over 진행 시 회복 불가"
    - id: OQ-DBL-001
      title: "Id_Logn 비밀번호 해시 알고리즘 (legacy plaintext 보관)"
      cutover_block: true
      reason: "cut-over 시 평문→bcrypt 전환 일괄 — 정책 미확정 시 보안 사고"
    - id: OQ-DBL-002
      title: "audit_password_attempts 보존 기간 (현재 무한 보관)"
      cutover_block: false
      reason: "cut-over 후 정책 보강 가능 (운영 SLA #6 게이트와 함께 마감)"
    - id: OQ-DBL-003
      title: "동일 hcode 다중 server 분산 (DEC-033 정책)"
      cutover_block: true
      reason: "4 server 단계 cut-over 시 동일 hcode 가 2 환경 사이에 분산되면 정합성 깨짐"

acceptance_criteria:
  - id: AC-CUT-1
    description: "4 server 모두 cutover_validator.py 5 check 100% PASS"
    test: "test/test_c15_cutover_phase1.py::test_R_01_validator_five_checks_pass"
  - id: AC-CUT-2
    description: "24시간 운영 검증 후 0 critical 결함 → 레거시 EXE 종결 게이트"
    test: "test/test_c15_cutover_phase1.py::test_S_05_acceptance_gate_24h_window"
  - id: AC-CUT-3
    description: "7 핵심 시나리오 (C2/C3/C4/C5/C6/C7/C8) 운영 시연 PASS"
    test: "test/test_c15_cutover_phase1.py::test_S_06_seven_core_scenarios_listed"
  - id: AC-CUT-4
    description: "롤백 절차 1회 dry-run 완료 (RTO ≤ 15분)"
    test: "test/test_c15_cutover_phase1.py::test_R_02_rollback_dryrun_rto"
  - id: AC-CUT-5
    description: "validator 는 기존 service SELECT 만 호출 (DEC-040 신규 SQL 0건 정합)"
    test: "test/test_c15_cutover_phase1.py::test_S_07_no_new_sql_in_validator"
  - id: AC-CUT-6
    description: "OQ-IN-1, OQ-DBL-001/003 미마감 → cut-over 진행 차단 게이트"
    test: "test/test_c15_cutover_phase1.py::test_S_08_oq_block_gate"

# ─── Phase 2 (T6) — 실 DB 어댑터 + 운영 cut-over 자동화 ────────
phase2_runtime:
  adapters:
    package: scripts/adapters
    modules:
      - scripts/adapters/__init__.py
      - scripts/adapters/base.py
      - scripts/adapters/mysql.py     # MysqlDataSource (pymysql lazy)
      - scripts/adapters/sqlserver.py # SqlServerDataSource (pyodbc lazy)
    allowed_query_kinds:
      - "COUNT(*) FROM <table>"           # VC-1
      - "SELECT <whitelisted cols> FROM <table> LIMIT N"   # VC-2 (Python sha256)
      - "TOP N <text cols>"               # VC-3 sample
      - "INFORMATION_SCHEMA.COLUMNS"      # VC-4 / VC-5
    forbidden_query_kinds:
      - "INSERT/UPDATE/DELETE/CREATE/DROP/ALTER/TRUNCATE — DML/DDL ❌"
      - "임의 비즈니스 SELECT — DEC-040/044 정합"
    identifier_safety: "scripts/adapters/base.py::sanitize_identifier (whitelist regex)"
    credentials: "ENV only (BLS_C15_PWD__<server_id> 또는 password_env: VAR_NAME)"
  runner:
    module: scripts/cutover_run.py
    cli:
      - "--dryrun (InMemoryDataSource — 단위 회귀)"
      - "--legacy / --modern (server profile id, live mode)"
      - "--profiles (DB 프로필 YAML 경로 — 기본 servers.yaml)"
      - "--tables (선택, 미지정 시 inventory.tables)"
      - "--confirm (P6 운영 전환 명시 승인 — live 필수)"
      - "--ignore-oq-block (권장 ❌, 운영팀 합의 필수)"
    report_schema:
      version: "1.0"
      fields:
        - schema_version
        - mode (dryrun|live)
        - confirmed
        - blocked_by (cutover_block:true OQ 목록)
        - steps[] (id, name, started_at, finished_at, ok, note)
        - validator (run_checks 출력)
        - rollback_started_at
        - rollback_elapsed_sec
        - success
    safety_guards:
      - "OQ 차단 게이트 — live mode 에서 cutover_block:true OQ 미해소 시 rc=3 즉시 종료"
      - "P6 진입 차단 — --confirm 미지정 시 rc=4"
      - "rollback 시뮬레이션 — 단계 실패 시 동일 리포트에 rollback_*_sec 기록"
      - "외부 명령 호출 ❌ — mysqldump/import/DNS 스위치는 운영 절차 수기"

decisions:
  - DEC-CUT-1   # 단계 전환 전략 (138 파일럿 → 153 → 154/155)
  - DEC-CUT-2   # 자체 스크립트 only (외부 SaaS 제외 — DEC-044 정합)
  - DEC-CUT-3   # 5종 validator 정합 + RTO 15분 동결
  - DEC-CUT-4   # Phase 2 — 실 DB 어댑터 (MysqlDataSource/SqlServerDataSource) + cutover_run.py 안전 게이트
  - DEC-044     # 외부 시스템 연동 제외
open_questions:
  - OQ-CUT-1   # cut-over 윈도우 합의
  - OQ-CUT-2   # 4 server 동시 vs 단계
  - OQ-CUT-3   # 레거시 EXE 종결 시점
  - OQ-IN-1    # cutover_block: true
  - OQ-DBL-001 # cutover_block: true
  - OQ-DBL-002 # cutover_block: false
  - OQ-DBL-003 # cutover_block: true
