# Migration Contract: 특별관리 Sobo16 — G6_Ggeo (Phase 2)
#
# 출처(레거시):
#   - legacy_delphi_source/legacy_source/Subu16.pas (조회·그리드)
#   - legacy_delphi_source/도서유통-New/도서유통/한국도서유통/출판/Base01.pas
#     TBase10.T1_Sub61BeforePost / T1_Sub62BeforePost (INSERT/UPDATE G6_Ggeo)
#
# 정정 (2026-04-26): 초안의 「G1_Ggeo Special_flag / 분류」 모델은 Sobo16 코드와 불일치.
#   레거시 저장 대상은 G6_Ggeo 의 Grat1·Gssum(및 키 Hcode,Gcode,Bcode,ID) 뿐.
#   거래처 마스터 플래그가 필요하면 별도 화면·계약으로 분리한다.

id: C9-special-master
name: 특별관리 (Sobo16 — 출판사·거래처·도서 링크 G6_Ggeo)
version: 1.0.0
status: draft
scope_phase: phase2
created: 2026-04-21
updated: 2026-04-26
owner: 메인개발자

references:
  - analysis/screen_cards/Sobo16.md
  - analysis/layout_mappings/Sobo16.md
  - migration/contracts/master_data.yaml
  - docs/welove-publish-schema-dictionary.md  # G6_Ggeo

constraints:
  new_sql_count: 0
  external_integrations: excluded

blockers: []

intent: |
  출판사(Hcode) 단위로 거래처(Gcode)·도서(Bcode) 간 G6_Ggeo 링크를 조회하고,
  레거시와 동일하게 Grat1(비율)·Gssum 필드를 수정한다.
  표시명은 G4_Book·G1_Ggeo 조인(또는 동등 룩업)으로 보강한다.

legacy_write_sql: |
  INSERT INTO G6_Ggeo (Hcode, Gcode, Bcode, Grat1, Gssum) VALUES (...);
  UPDATE G6_Ggeo SET Gcode=..., Bcode=..., Grat1=..., Gssum=... WHERE ID=... AND Hcode=...;
  (소스: 도서유통-New/.../Base01.pas T1_Sub61BeforePost — 모던 1차 PATCH 는 Grat1/Gssum 만)

scope:
  list:
    path: GET /api/v1/masters/special
    legacy_id: Sobo16
    permission: master.special.read
    query_params:
      serverId: required
      mode: enum [customer, book, publisher]
      hcode: required (출판사 코드)
      gcode: optional — mode=customer 일 때 거래처 코드
      bcode: optional — mode=book 일 때 도서 코드
      limit: { default: 100, max: 500 }
      offset: default 0
    response:
      items:
        - id: int
          hcode: string
          gcode: string
          bcode: string
          grat1: string
          gssum: number
          bname: string
          gname: string
      page: { limit, offset, total, has_more }

  patch_row:
    path: PATCH /api/v1/masters/special/{id}
    legacy_id: Sobo16
    permission: master.special.write
    request_body:
      serverId: required
      hcode: required
      grat1: optional string
      gssum: optional number
    notes: |
      1차는 Grat1/Gssum 만 변경(DEC-019, 물리 DELETE 미제공).
      레거시는 Gcode/Bcode 도 갱신하나 웹 1차는 단순화.

acceptance_criteria:
  - id: AC-SPC-G6-1
    description: "list(customer/book/publisher) 가 G6_Ggeo 행을 페이징 반환"
    test: "test/test_masters_special_g6.py"
  - id: AC-SPC-G6-2
    description: "PATCH 후 동일 키로 조회 시 grat1/gssum 반영"
    test: "test/test_masters_special_g6.py"
  - id: AC-SPC-G6-3
    description: "mysql3 서버에서 LIMIT 바인딩 순서 회귀 없음"
    test: "test/test_masters_special_g6.py"

decisions:
  - DEC-019
  - DEC-023
  - DEC-033
  - DEC-040
  - DEC-041
  - DEC-046
