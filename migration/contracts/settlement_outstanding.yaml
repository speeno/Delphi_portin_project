# Migration Contract: 미수현황 + 입금전표 (Phase 2)
# 출처(레거시):
#   - legacy_delphi_source/legacy_source/Subu41.pas (TSobo41 입금전표)
#   - legacy_delphi_source/legacy_source/Subu42.pas (TSobo42 미수현황)
# 본 contract 는 settlement_billing.yaml 에서 분리한 phase2 전용 sub-contract.

id: C5-settlement-outstanding
name: 미수현황 + 입금전표
version: 1.0.0
status: draft
scope_phase: phase2
created: 2026-04-21
updated: 2026-04-21
owner: 메인개발자

references:
  - analysis/screen_cards/Sobo41.md
  - analysis/screen_cards/Sobo42.md
  - migration/contracts/settlement_billing.yaml   # 부모 contract
  - dashboard/data/phase2-screen-cards.json

constraints:
  new_sql_count: 0   # 기존 S2_Ssum / S2_Pamt SELECT/INSERT 재사용 (DEC-040)
  external_integrations: excluded

intent: |
  운영자가 (1) 기준일 시점 거래처별 미수금을 조회하고,
  (2) 거래처에서 입금이 들어오면 입금전표를 INSERT 하여 청구잔액을 차감한다.
  레거시 Subu41 의 헤더+라인 INSERT 패턴 + Subu42 의 (청구합계 - 입금합계) 누적 SQL 동등.

scope:
  outstanding_list:
    path: GET /api/v1/settlement/outstanding
    legacy_id: Sobo42
    permission: settlement.outstanding.read
    query_params:
      base_date: required, ISO date
      hcode: optional (operator → 본인, branch_manager → 지사)
    response:
      items:
        - customer_code: string
          customer_name: string
          billed_amount: int     # S2_Ssum 누적
          paid_amount: int        # S2_Pamt 누적
          outstanding_amount: int # 차액
          last_payment_date: ISO date | null
      total: int
      page: { limit: 200, max_limit: 500 }    # MAX_PAGE_LIMIT 정합

  payment_slip:
    path: POST /api/v1/settlement/payment-slip
    legacy_id: Sobo41
    permission: settlement.payment.write
    request_body:
      customer_code: required
      payment_date: required ISO date
      amount: required int
      method: enum[cash, transfer, card, check]
      memo: optional
      lines:                   # 청구 매핑 (1:N)
        - billing_key: string  # 거래처+년월
          allocated_amount: int
    response:
      slip_no: string          # 발급된 전표번호
      audit_id: string

acceptance_criteria:
  - id: AC-OUT-1
    description: "outstanding_list — 기준일 단순 합계 (billed - paid) 가 레거시 Subu42 SQL 결과와 ±0 일치"
    test: "test/test_c5_settlement_outstanding.py::test_outstanding_total_equivalence"
  - id: AC-OUT-2
    description: "payment_slip INSERT 후 outstanding_list 의 customer 미수금이 amount 만큼 정확히 차감"
    test: "test/test_c5_settlement_outstanding.py::test_payment_slip_decreases_outstanding"
  - id: AC-OUT-3
    description: "payment_slip 의 lines.allocated_amount 합 ≠ amount 시 422 BAD_REQUEST"
    test: "test/test_c5_settlement_outstanding.py::test_allocation_mismatch_rejected"
  - id: AC-OUT-4
    description: "권한별 d_select — operator 본인, branch_manager 지사, admin 전체"
    test: "test/test_c5_settlement_outstanding.py::test_dselect_by_role"
  - id: AC-OUT-5
    description: "audit_settlement 에 payment_slip INSERT 이벤트 기록 (slip_no + actor)"
    test: "test/test_c5_settlement_outstanding.py::test_audit_emit"

decisions:
  - DEC-040  # 신규 SQL 0건
  - DEC-041  # 표준 응답 코드 (422 BAD_REQUEST)
  - DEC-046  # phase2 contract 분리 정책 (신규)
