  - date: 2026-04-22
    by: porting-team
    note: |
      1.3.0 — 발송비/입금 422 핫픽스 사이클 (DEC-033 (f) 확장 적용).
      배경: Sobo45/45_1/47/41/42/42_1/49 7화면 중 일부가 빈 필터 자동 진입 시 422/500 으로 실패.
      해결: 필터(hcode 등)는 옵셔널화하여 "전체 대상 fallback", 경계(month_from/to·gdate)는 필수 유지.
      추가: 미수현황 신규 서버 집계 endpoint /api/v1/settlement/outstanding (mysql3 호환 fetch+Python merge + truncated).
      - endpoint 변경 (시그니처만 — 기존 동작 보존):
        - GET /settlement/billing/period: hcode 필수→옵셔널, limit/offset/total 표준화
        - GET /settlement/cash-status: variant=sdate 도 hcode 옵셔널 (백엔드 fallback)
        - GET /settlement/tax-invoice: hcode 옵셔널, limit/offset 신규, gdate 422 메시지 명확화
      - endpoint +1: GET /settlement/outstanding (OutstandingItem/Response 신설)
      - data_access: 기존 SQL 패턴 재사용 (DEC-033 (f) `(%s = '' OR Hcode = %s)` 분기 + LIMIT/OFFSET)
      - 신규 SQL: 0 (기존 SQL-ST-6/10/11/18 + reports_service.summarize 패턴 재사용)
      - 회귀 테스트: test/test_c5_settlement_optional_filters.py 신설 (period/cash-status/tax-invoice/outstanding/페이저 round-trip)
      - 프런트: 5 list 화면(billing/cash/cash-status/tax-invoice/outstanding) 표준 페이저 + DEC-055 useListSession 합류,
        period/payment-slip 은 useListSession 만 추가 (페이저 미적용, 소량 의도 유지).

