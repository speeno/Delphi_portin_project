# ---------------------------------------------------------------
# 5. 엔드포인트 (웹)
# ---------------------------------------------------------------
endpoints:
  # ---------- 청구서관리 (Sobo45/45_1) ----------
  - method: GET
    path: /api/v1/settlement/billing
    description: "월별 청구 헤더 목록 조회 (거래처/월 범위)."
    auth: bearer
    request:
      query:
        server_id: string
        month_from: string   # 'YYYYMM'
        month_to: string
        hcode?: string
        variant?: "string — 'standard' | 'takbae' (default 'standard')"
        include_cancelled?: boolean
        limit?: integer
        offset?: integer
    responses:
      "200":
        body:
          items:
            - gdate: string
              hcode: string
              hname: string
              total_lines: integer
              sum26: integer
              sum27: integer
              sum28: integer
              yesno: "string ('0'|'1'|'2')"
          page: { limit, offset, total, has_more }

  - method: GET
    path: /api/v1/settlement/billing/{billing_key}
    description: "청구서 상세 (헤더 + 라인 N개)."
    auth: bearer
    request:
      path:
        billing_key: string   # '{gdate}|{hcode}'
    responses:
      "200":
        body:
          billing_key: { gdate, hcode }
          customer: { hcode, hname }
          variant: "string"
          summary: { sum26, sum27, sum28, yesno }
          lines:
            - idx: integer
              gdate: string
              gqut1: integer
              gqut2: integer
              gqut3: integer
              gqut4: integer
              gqut5: integer
              gqut6: integer
              gqut7: integer
              name1: string
              name2: string
              gname: string
              gsqut: integer
              gssum: integer
              yesno: string
      "404": { body: { detail: "Billing not found", code: "ST_NOT_FOUND" } }

  - method: POST
    path: /api/v1/settlement/billing/aggregate
    description: "청구서 집계 — 출고/반품/발송비를 (gdate,hcode) 키로 T2_Ssub UPSERT + T3_Ssub 라인 재구성. 마감 가드 적용."
    auth: bearer
    request:
      content_type: application/json
      schema:
        server_id: string
        gdate: "string (required, 'YYYYMM')"
        hcode: "string (required)"
        variant?: "string ('standard'|'takbae')"
        lines?: "array (optional — 미제공 시 출고/반품 원천에서 자동 집계)"
    responses:
      "200":
        body:
          billing_key: { gdate, hcode }
          summary: { sum26, sum27, sum28, total_lines }
          rebuilt_lines: integer
          updated_at: string
      "423": { body: { detail: "마감된 자료입니다.", code: "ST_PERIOD_CLOSED" } }
      "422": { body: { detail: "Validation failed", code: "ST_VALIDATION" } }
      "500": { body: { detail: "Transaction failed (rolled back)", code: "ST_TX_FAILED" } }

  - method: POST
    path: /api/v1/settlement/billing/confirm
    description: "청구서 확정 — T2_Ssub.Yesno='1'. 🔒 audit_token(scope='settlement_confirm') 필수."
    auth: bearer
    request:
      headers:
        Authorization-Audit: "Bearer-Audit {token}"
      content_type: application/json
      schema:
        server_id: string
        gdate: string
        hcode: string
    responses:
      "200":
        body:
          billing_key: { gdate, hcode }
          yesno: "1"
          confirmed_at: string
      "401": { body: { detail: "Audit token required", code: "ST_AUDIT_REQUIRED" } }
      "423": { body: { detail: "이미 마감된 자료입니다.", code: "ST_PERIOD_CLOSED" } }

  - method: POST
    path: /api/v1/settlement/billing/cancel
    description: "청구서 소프트 취소 — T2_Ssub.Yesno='2' (DEC-012). 🔒 audit_token 필수."
    auth: bearer
    request:
      headers:
        Authorization-Audit: "Bearer-Audit {token}"
      content_type: application/json
      schema:
        server_id: string
        gdate: string
        hcode: string
        reason: "string (optional, audit-only)"
    responses:
      "200":
        body:
          billing_key: { gdate, hcode }
          yesno: "2"
          cancelled_at: string
      "401": { body: { detail: "Audit token required", code: "ST_AUDIT_REQUIRED" } }
      "409": { body: { detail: "이미 취소된 자료입니다.", code: "ST_ALREADY_CANCELLED" } }

  # ---------- 청구금액 년월 (Sobo47) ----------
  - method: GET
    path: /api/v1/settlement/billing/period
    description: |
      월별 청구금액 합계 보고 (Sobo47).
      DEC-033 (f): hcode 옵셔널 — 빈값/생략 시 전체 거래처 합산 (필터 vs 경계 구분).
      DEC-033 (g): 표준 페이저(limit/offset).
    auth: bearer
    request:
      query:
        server_id: string
        hcode?: "string — 옵셔널, 미제공 시 전체 거래처 합산 (DEC-033 (f))"
        month_from: "string (required) 'YYYYMM'"
        month_to: "string (required)"
        limit?: "integer (default 50, max 500)"
        offset?: "integer (default 0)"
    responses:
      "200":
        body:
          items:
            - gdate: string    # YYYYMM
              gsumx: integer   # 당월금액
              gsumy: integer   # 세액
              gssum: integer   # 합계
              name1: string    # 비고
          totals:
            gsumx: integer
            gsumy: integer
            gssum: integer
          total: integer       # DEC-033 (g) 표준 페이저

  # ---------- 입금내역 (Sobo41) ----------
  - method: GET
    path: /api/v1/settlement/cash
    description: "입금 내역 목록 (Sobo41)."
    auth: bearer
    request:
      query:
        server_id: string
        date_from: string    # 'YYYY-MM-DD'
        date_to: string
        hcode?: string
        include_cancelled?: boolean
        limit?: integer
        offset?: integer
    responses:
      "200":
        body:
          items:
            - gdate: string
              sdate: string
              hcode: string
              hname: string
              jubun: string
              gssum: integer
              pubun: string
              gbigo: string
              yesno: string
          page: { limit, offset, total, has_more }

  - method: POST
    path: /api/v1/settlement/cash
    description: "입금 신규/수정 등록 (UPSERT). 마감 가드: sdate(대응 청구월) Yesno='1' 면 423."
    auth: bearer
    request:
      content_type: application/json
      schema:
        server_id: string
        gdate: string
        hcode: string
        sdate: string
        jubun?: "string (optional, server-generated)"
        gssum: integer
        pubun: string
        gbigo?: string
    responses:
      "200":
        body:
          cash_key: { gdate, hcode, jubun }
          action: "inserted|updated"
          gssum: integer
          updated_at: string
      "422": { body: { detail: "결재구분을 선택하세요.", code: "ST_VALIDATION" } }
      "423": { body: { detail: "마감된 자료입니다.", code: "ST_PERIOD_CLOSED" } }

  - method: PATCH
    path: /api/v1/settlement/cash/{cash_key}/cancel
    description: "입금 소프트 취소 (DEC-012)."
    auth: bearer
    request:
      headers:
        Authorization-Audit: "Bearer-Audit {token}"
      path:
        cash_key: string   # '{gdate}|{hcode}|{jubun}'
    responses:
      "200":
        body:
          cash_key: { gdate, hcode, jubun }
          status: "cancelled"
      "401": { body: { detail: "Audit token required", code: "ST_AUDIT_REQUIRED" } }
      "409": { body: { detail: "이미 취소된 자료입니다.", code: "ST_ALREADY_CANCELLED" } }

  # ---------- 입금현황 (Sobo42/42_1) ----------
  - method: GET
    path: /api/v1/settlement/cash-status
    description: |
      입금현황 5단 집계 — variant=hcode (Sobo42 본) | sdate (Sobo42_1 변형).
      DEC-033 (f): hcode 옵셔널 — 빈값이면 variant=sdate 도 전체 거래처 합산으로 fallback.
    auth: bearer
    request:
      query:
        server_id: string
        variant: "string ('hcode'|'sdate', default 'hcode')"
        month: "string (required) 'YYYYMM' — 기준월"
        hcode?: "string — 옵셔널, variant=sdate 도 빈값 시 전체 거래처 (DEC-033 (f))"
        limit?: integer
        offset?: integer
    responses:
      "200":
        body:
          variant: string
          items:
            # variant=hcode:
            - hcode?: string
              hname?: string
            # variant=sdate:
            - sdate?: string
            # 공통:
            - gsumx: integer    # 전월미수
              gosum: integer    # 당월금액
              gbsum: integer    # 세액
              gpsum?: integer   # 당월합계 (variant=sdate 만)
              gssum: integer    # 합계금액
              gdate: string     # 입금일
              gsusu: integer    # 입금액
              gsumy: integer    # 당월미수
          totals:
            gsumx: integer
            gosum: integer
            gbsum: integer
            gssum: integer
            gsusu: integer
            gsumy: integer
          page: { limit, offset, total, has_more }

  # ---------- audit (DEC-029 재사용) ----------
  - method: POST
    path: /api/v1/audit/password-verify
    description: "패스워드 검증 (settlement scope). C4 와 동일 endpoint, scope 만 'settlement_confirm' / 'gpass_change' 추가."
    auth: bearer
    request:
      content_type: application/json
      schema:
        password: "string (required)"
        scope: "string — 'settlement_confirm' 또는 'gpass_change'"
    responses:
      "200":
        body:
          token: string
          expires_at: string
          scope: string
          algorithm: "string ('bcrypt'|'plain_fallback')"
      "401": { body: { detail: "비밀번호가 일치하지 않습니다.", code: "ST_AUDIT_INVALID" } }
      "429": { body: { detail: "비밀번호 시도 한도를 초과했습니다.", code: "ST_AUDIT_LOCKED" } }

  - method: POST
    path: /api/v1/audit/gpass-rotate
    description: "Gpass(평문) 회전 (Sobo45.pas L372 InputBox 폐기, DEC-032). 🔒 scope='gpass_change' 토큰 필수. C4 의 /audit/password-rotate (scope=audit) 와 경로/스코프를 분리해 라우트 충돌·권한 혼동을 방지."
    auth: bearer
    request:
      headers:
        Authorization-Audit: "Bearer-Audit {token}"
      content_type: application/json
      schema:
        new_password: "string (required, min=4)"
    responses:
      "200":
        body:
          rotated_at: string
          algorithm: "bcrypt"
          cost: integer
      "401": { body: { detail: "Audit token required", code: "ST_AUDIT_REQUIRED" } }

  # ===========================================================
  # Phase 2 — Sobo46 청구서출력 (HTML 미리보기까지, DEC-034)
  # ===========================================================
  - method: GET
    path: /api/v1/settlement/billing/{billing_key}/print-data
    description: "Sobo46 청구서 1매 미리보기용 데이터 (헤더 + 67 합계 + 31일 라인). 읽기 전용 — 마감 가드 미적용."
    auth: bearer
    in_scope_phase: phase2
    request:
      path:
        billing_key: "string '{gdate}|{hcode}'"
      query:
        server_id: string
    responses:
      "200":
        body:
          billing_key: { gdate, hcode }
          customer: { hcode, hname, bname, gadd1, gadd2, gtel1 }
          summary:                       # 67개 Sum + 입금/메모 — Sobo46 Edit201~Edit315 1:1
            sum01: integer
            sum02: integer
            # ... sum03 ~ sum48, sum51 ~ sum69 (총 67개)
            sum26: integer               # 핵심 — 당월금액
            sum27: integer               # 핵심 — 세액
            sum28: integer               # 핵심 — 합계
            gsusu: integer               # 입금액
            vdate: string                # 입금일
            bigo1: string
            bigo2: string
          lines:                          # 31일 라인 — DBGrid201
            - gdate: string
              gqut1: integer
              gqut2: integer
              gqut3: integer
              gqut4: integer
              gqut5: integer
              gqut6: integer
              gqut7: integer
              name1: string
              name2: string
              gname: string
              gcode: string
              gsqut: integer
              gssum: integer
              yesno: string
          status:
            yesno: string                 # '0'|'1'|'2'
            preview_only: true            # DEC-034 가시화
      "404": { body: { detail: "해당 거래처의 청구 자료가 없습니다.", code: "ST_NOT_FOUND" } }

  - method: GET
    path: /api/v1/settlement/billing/{billing_key}/print
    description: "Sobo46 청구서 HTML 미리보기 — Jinja2 템플릿 렌더링. 응답 Content-Type: text/html."
    auth: bearer
    in_scope_phase: phase2
    notes: "DEC-034 — PDF/실인쇄/일괄은 C7 후속. 본 응답은 모던 페이지 `/settlement/billing/[billingKey]/print` 에서도 동일 데이터를 사용해 React 렌더링 가능 (white-label 우선)."
    request:
      path:
        billing_key: "string '{gdate}|{hcode}'"
      query:
        server_id: string
    responses:
      "200":
        content_type: text/html
        body: "<html>... 청구서 1매 ...</html>"
      "404": { body: { detail: "해당 거래처의 청구 자료가 없습니다.", code: "ST_NOT_FOUND" } }

  - method: GET
    path: /api/v1/settlement/billing/{billing_key}/print.pdf
    description: "Sobo46 청구서 1매 PDF 다운로드 (C7 Phase 1 — DEC-037 WeasyPrint). HTML 미리보기와 동일 데이터 + 동일 빌더 함수 (render_invoice_pdf_html → render_pdf)."
    auth: bearer
    in_scope_phase: c7_phase1
    notes: "DEC-037 — WeasyPrint 단일 엔진. 마감(`T2_Ssub.Yesno='1'`) 자료는 본문 위 '마감' 워터마크 (print_specs/c7_phase1.md §4)."
    request:
      path:
        billing_key: "string '{gdate}|{hcode}'"
      query:
        server_id: string
    responses:
      "200":
        content_type: application/pdf
        headers:
          Content-Disposition: 'inline; filename="invoice_{gdate}_{hcode}.pdf"'
          Cache-Control: "private, no-store"
        body: "<binary PDF bytes — `%PDF-` magic + `%%EOF`>"
      "404": { body: { detail: "해당 거래처의 청구 자료가 없습니다.", code: "ST_NOT_FOUND" } }
      "503": { body: { detail: "PDF 엔진이 설치되지 않았습니다.", code: "PR_ENGINE_UNAVAILABLE" } }

  # ===========================================================
  # Phase 2 — 재집계 잡
  # ===========================================================
  - method: POST
    path: /api/v1/settlement/billing/recalc
    description: "청구 재집계 — 출고/반품 원천에서 T2_Ssub Sum26~28 재계산. 🔒 마감 가드 적용 (DEC-031)."
    auth: bearer
    in_scope_phase: phase2
    request:
      content_type: application/json
      schema:
        server_id: string
        gdate: "string (required, 'YYYYMM')"
        hcode: "string (optional, 미제공 시 월 전체)"
    responses:
      "200":
        body:
          billing_key: { gdate, hcode }
          updated: integer                 # 갱신된 행 수
          summary: { sum26, sum27, sum28 }
          recalculated_at: string
          audit_id: integer
      "423": { body: { detail: "마감된 자료입니다.", code: "ST_PERIOD_CLOSED" } }

  # ===========================================================
  # Phase 2 — 미수현황 (Outstanding) 신규 서버 집계 (DEC-033 (f))
  # ===========================================================
  - method: GET
    path: /api/v1/settlement/outstanding
    description: |
      거래처별 미수금 집계 (청구금액 누계 - 입금 누계). 기존 화면이 fetchAllPages 로
      클라이언트 누적하던 동작을 서버측 단일 집계로 흡수.
      mysql3 호환: T2_Ssub + T5_Ssub fetch + Python merge (subquery/derived 미사용).
      DEC-033 (f) — hcode 옵셔널, monthFrom/monthTo 필수 경계.
      OUTSTANDING_FETCH_MAX 안전 한도 도달 시 truncated=true 응답.
    auth: bearer
    in_scope_phase: phase2
    request:
      query:
        server_id: string
        month_from: "string (required) 'YYYYMM'"
        month_to: "string (required) 'YYYYMM'"
        hcode?: "string — 옵셔널, 미제공 시 전체 거래처 (DEC-033 (f))"
        limit?: "integer (default 50, max 500)"
        offset?: "integer (default 0)"
    responses:
      "200":
        body:
          items:
            - hcode: string                # alias customer_code
              hname: string                # alias customer_name
              billed: integer              # 청구금액 누계
              paid: integer                # alias cash_received
              balance: integer             # alias outstanding
          totals:
            billed: integer
            cash_received: integer
            balance: integer
          total: integer
          limit: integer
          offset: integer
          truncated: boolean
          page: { limit, offset, total, has_more }

  # ===========================================================
  # Phase 2 — Sobo49 세금계산서
  # ===========================================================
  - method: GET
    path: /api/v1/settlement/tax-invoice
    description: |
      Sobo49 월 세금계산서 발행 대상 목록 (Sum27<>0 필터).
      DEC-033 (f): hcode 옵셔널 — 빈값/생략 시 월 전체 거래처. 경계(gdate)는 필수.
      DEC-033 (g): 표준 페이저(limit/offset).
    auth: bearer
    in_scope_phase: phase2
    request:
      query:
        server_id: string
        gdate: "string (required) 'YYYYMM' (6~8자, 숫자) — 경계 파라미터, 422 가시화"
        hcode?: "string — 옵셔널, 미제공 시 월 전체 거래처 (DEC-033 (f))"
        limit?: "integer (default 50, max 500)"
        offset?: "integer (default 0)"
    responses:
      "200":
        body:
          items:
            - billing_key: "string '{month}|{hcode}'"
              gcode: string                # 거래처코드 (DBGrid101.GCODE)
              gname: string                # 거래처명
              sdate: string                # 발행일자 (편집 가능 — POST .../sdate)
              gosum: integer               # 금액 (Sum26)
              gbsum: integer               # 세액 (Sum27)
              gssum: integer               # 발행금액 (Sum26+Sum27)
              code1: "string '0'|'1' — Chek3 1:1"
              code2: "string '영수'|'청구' — Phase 2 표시 only"
          totals:
            gosum: integer
            gbsum: integer
            gssum: integer
          page: { limit, offset, total, has_more }

  - method: POST
    path: /api/v1/settlement/tax-invoice/chek3
    description: "Sobo49 Chek3 단건/일괄 토글 (DEC-036 단일 SQL 헬퍼). 🔒 마감 가드 적용."
    auth: bearer
    in_scope_phase: phase2
    notes: |
      단건/일괄을 동일 엔드포인트 + body 로 흡수해 라우트 충돌·복잡도 0:
        - hcode 제공 ⇒ 단건 (assert_period_open 호출, audit action='tax_chek3_toggled')
        - hcode null/생략 ⇒ 일괄 (월 전체 Sum27<>0, audit action='tax_chek3_bulk')
      클라이언트는 클릭 시점의 현재 Chek3 값의 부정값을 newValue 로 계산해 전달.
    request:
      headers:
        Authorization-Audit: "Bearer-Audit {token}"
      content_type: application/json
      schema:
        server_id: string
        gdate: "string (required, 'YYYYMM')"
        hcode: "string | null — null 또는 생략 시 일괄"
        new_value: "string '0'|'1' (required) — 새 Chek3 값"
    responses:
      "200":
        body:
          gdate: string
          hcode: "string | null"
          chek3: "string '0'|'1'"
          scope: "string 'single'|'bulk'"
      "423": { body: { detail: "마감된 자료입니다.", code: "ST_PERIOD_CLOSED" } }

  - method: POST
    path: /api/v1/settlement/tax-invoice/sdate
    description: "Sobo49 발행일자(Sdate) 수정 — T4_Sub91BeforePost (L657) 의 모던 등가물. 🔒 마감 가드 적용."
    auth: bearer
    in_scope_phase: phase2
    request:
      headers:
        Authorization-Audit: "Bearer-Audit {token}"
      content_type: application/json
      schema:
        server_id: string
        gdate: string
        hcode: string
        sdate: "string 'YYYY-MM-DD' (빈 문자열 = 해제)"
    responses:
      "200":
        body:
          gdate: string
          hcode: string
          sdate: string
      "423": { body: { detail: "마감된 자료입니다.", code: "ST_PERIOD_CLOSED" } }

  - method: POST
    path: /api/v1/settlement/tax-invoice/{billing_key}/issue
    description: "Sobo49 외부 채널 발행 — DEC-035 stub. 항상 200 + status='NOT_INTEGRATED' 반환 + audit 영속화."
    auth: bearer
    in_scope_phase: phase2
    notes: |
      OQ-ST-1 종결: 외부 발행 채널(홈택스/이메일 등)은 운영 결정 전까지 미연결.
      - 본 엔드포인트는 호출 시점에 audit_settlement 에 INSERT 만 수행 (T2_Ssub.Chek3 변경 X).
      - 클라이언트는 응답의 message_key 를 읽어 사용자에게 'c5.tax.external_not_integrated' 안내.
      - 후속(외부 채널 연결) 시 본 엔드포인트가 stub→real 전환되며 contract 만 갱신 (URL 동결).
    request:
      path:
        billing_key: "string '{month}|{hcode}'"
      content_type: application/json
      schema:
        server_id: string
        channel?: "string — 향후 호환용 ('hometax'|'email' 등). 현재 무시."
    responses:
      "200":
        body:
          billing_key: { gdate, hcode }
          status: "NOT_INTEGRATED"
          recorded: true
          audit_id: integer
          message_key: "c5.tax.external_not_integrated"

  - method: GET
    path: /api/v1/settlement/tax-invoice/{billing_key}/print
    description: "Sobo49 세금계산서 1매 HTML 미리보기 (Sobo46 와 동일 패턴 — DEC-034)."
    auth: bearer
    in_scope_phase: phase2
    request:
      path:
        billing_key: "string '{month}|{hcode}'"
      query:
        server_id: string
    responses:
      "200":
        content_type: text/html
        body: "<html>... 세금계산서 1매 ...</html>"
      "404": { body: { detail: "해당 거래처의 세금계산서 자료가 없습니다.", code: "ST_NOT_FOUND" } }

  - method: GET
    path: /api/v1/settlement/tax-invoice/{billing_key}/print.pdf
    description: "Sobo49 세금계산서 1매 PDF 다운로드 (C7 Phase 1 — DEC-037). 발행/미발행 배지 + 마감 워터마크 포함."
    auth: bearer
    in_scope_phase: c7_phase1
    request:
      path:
        billing_key: "string '{month}|{hcode}'"
      query:
        server_id: string
    responses:
      "200":
        content_type: application/pdf
        headers:
          Content-Disposition: 'inline; filename="tax_invoice_{month}_{hcode}.pdf"'
          Cache-Control: "private, no-store"
        body: "<binary PDF bytes>"
      "404": { body: { detail: "해당 거래처의 세금계산서 자료가 없습니다.", code: "ST_NOT_FOUND" } }
      "503": { body: { detail: "PDF 엔진이 설치되지 않았습니다.", code: "PR_ENGINE_UNAVAILABLE" } }

  # ===========================================================
  # Phase 2 — audit 회전 UI 목록
  # ===========================================================
  - method: GET
    path: /api/v1/audit/settlement
    description: "audit_settlement 최근 N건 조회 (audit 회전 UI 용). scope/action 필터링."
    auth: bearer
    in_scope_phase: phase2
    request:
      query:
        server_id: string
        scope?: "string — 'audit' | 'gpass_change' | 'tax_invoice' | 'settlement_confirm' | 'all'"
        action?: "string — 'tax_chek3_toggled' | 'tax_chek3_bulk' | 'tax_issued_stub' | 'billing_recalculated' | 'audit_password_rotated_ui' 등"
        limit?: "integer (default 100, max 500)"
        offset?: integer
    responses:
      "200":
        body:
          items:
            - id: integer
              created_at: string
              scope: string
              action: string
              gdate?: string
              hcode?: string
              billing_key?: string
              result: string
              client_ip: string
              request_id: string
          page: { limit, offset, total, has_more }

# ---------------------------------------------------------------
# 6. 차이점·결정 사항
# ---------------------------------------------------------------
deltas:
  - id: D-ST-1
    title: 마감 정책 — T2_Ssub.Yesno 보존, 글로벌 close_until 키 미도입
    in_scope_phase1: true
    decision_ref: DEC-031
    phase1_behavior: "T2_Ssub.Yesno='1' 인 (gdate,hcode) 의 모든 쓰기를 423 + 한글 메시지로 차단. application_settings.settlement.close_until 키는 도입하지 않음."
    legacy_behavior: "Subu45.pas L840·979·1051 의 if Yesno='1' then ShowMessage(...) 분기."
    proposed_web_behavior: "settlement_service.assert_period_open(gdate, hcode) 헬퍼를 모든 쓰기 contract action 진입 직후 호출."

  - id: D-ST-2
    title: 평문 Gpass 변경 → AuditPasswordModal rotate 이관
    in_scope_phase1: true
    decision_ref: DEC-032
    phase1_behavior: "InputBox 평문 입력 폐기. AuditPasswordModal 의 'rotate' 액션 (audit_password_service.rotate_password) 호출, scope='gpass_change'."
    legacy_behavior: "Subu45.pas L372~381: InputBox + UPDATE Id_Logn SET Gpass=평문."
    risk: "1차 — 운영팀이 기존 평문 비밀번호를 새 bcrypt 해시로 1회 이행 필요."

  - id: D-ST-3
    title: 변형 (Sobo45_1 / Sobo42_1) 단일 컴포넌트 + 데이터 주도 분기
    in_scope_phase1: true
    decision_ref: DEC-019
    phase1_behavior: "URL ?variant=takbae|sdate 로 분기. 백엔드는 variant 파라미터를 받아 컬럼 헤더/SQL group_by 만 변경. 코드 분기 0건."

  - id: D-ST-4
    title: 청구서출력 (Sobo46) + 세금계산서 (Sobo49) — Phase 2
    in_scope_phase1: false
    in_scope_phase2: true
    decision_ref: DEC-034
    phase1_behavior: "Phase 1 미제공. Sobo45 의 Button701/702 인쇄 버튼은 disabled."
    phase2_behavior: "print_invoice / list_tax_invoice / chek3 토글 / Sdate UPDATE / 외부 발행 stub / HTML 미리보기 8 endpoints. PDF/실인쇄/일괄 = C7 이연."

  - id: D-ST-5
    title: 권한키 분기 (D_Select F43~F47) — C10 RBAC 통합
    in_scope_phase1: false
    decision_ref: DEC-009
    phase1_behavior: "1차 모든 인증 사용자 권한 동등 (D_Select 빈 값). 헬퍼 인터페이스(app/core/d_select.py) 만 노출."

  - id: D-ST-6
    title: 결재구분 PUBUN 코드표 — OQ-ST-4 카탈로그 후 enum 화
    in_scope_phase1: true
    decision_ref: OQ-ST-4
    phase1_behavior: "1차 자유 입력 (string). 카탈로그 확정 시 enum 으로 검증 추가."

  - id: D-ST-7
    title: 인쇄 (Sobo47 Tong20.Srart_47_01) — 화면 결과로 흡수
    in_scope_phase1: true
    decision_ref: DEC-017
    phase1_behavior: "별 인쇄 버튼 미제공. 화면의 SUM 푸터로 보고서 의미 흡수. 인쇄는 C7 사이클."

  - id: D-ST-8
    title: Phase 2 인쇄 = HTML 미리보기 only (PDF/실인쇄/일괄 = C7 이연)
    in_scope_phase1: false
    in_scope_phase2: true
    decision_ref: DEC-034
    legacy_behavior: "Subu46.pas L418 Tong40.print_46_01/02, Subu49.pas L601 Tong40.PrinTing00 — Delphi Canvas 직접 그리기."
    phase2_behavior: "GET /settlement/billing/{key}/print 및 /tax-invoice/{key}/print 모두 text/html (Jinja2). 모던 페이지는 동일 데이터로 React 렌더 + window.print(). 일괄 인쇄(Button016/017) 는 미구현."
    risk: "사용자가 'PDF 저장' 을 기대할 수 있음 → 페이지 상단 안내(`c5.print.preview_only`)로 가시화."

  - id: D-ST-9
    title: 세금계산서 외부 채널 stub (DEC-035 OQ-ST-1 종결)
    in_scope_phase1: false
    in_scope_phase2: true
    decision_ref: DEC-035
    legacy_behavior: "Subu49 자체에는 외부 채널 발행 코드 없음 — 운영자가 별도 솔루션(홈택스/이메일) 으로 처리."
    phase2_behavior: "POST /tax-invoice/{key}/issue 는 항상 200 + status='NOT_INTEGRATED' + audit_settlement INSERT + 내부적으로 T2_Ssub.Chek3='1' (발행 표식). 외부 홈택스/EDI 통신은 없음 (NOT_INTEGRATED). 보관본 GET print 는 별 경로로 동적 SELECT (DEC-058)."
    risk: "외부 채널이 실연결되면 audit 로 추적된 stub 호출과 실제 발행 사이의 시점 불일치 발생 가능 → 후속 사이클에서 'replay' 도구 필요."

  - id: D-ST-10
    title: 청구 재집계 = 동기 사용자 트리거 (백그라운드 큐 X)
    in_scope_phase1: false
    in_scope_phase2: true
    decision_ref: DEC-031
    phase2_behavior: "POST /settlement/billing/recalc 는 호출 즉시 출고/반품 원천 SELECT → T2_Ssub UPDATE 실행. 마감 가드 통과 필수. 응답에 updated 행 수 포함."
    risk: "월/거래처 단위 재집계가 라인 200건 이상이면 응답 지연 — Phase 2 합격선 < 3s. 초과 시 후속 사이클에서 백그라운드 큐 도입."

  - id: D-ST-11
    title: audit 회전 UI — Gpass / Audit 두 scope 분리 표시
    in_scope_phase1: false
    in_scope_phase2: true
    decision_ref: DEC-036
    phase2_behavior: "신규 페이지 /admin/audit-rotate — 기존 audit_password_service.rotate_password 두 호출(scope='gpass_change' / 'audit')을 한 화면에서 운용. 기존 AuditPasswordModal(returns 폴더 → shared 폴더로 이동) 재사용. GET /audit/settlement 로 최근 N건 표시."
    risk: "두 scope 의 패스워드를 한 운영자가 모두 회전할 수 있음 → audit_settlement 에 user/IP 기록 필수 (Phase 1 audit 인프라 그대로 활용)."

  - id: D-ST-12
    title: 청구서/세금계산서 PDF 다운로드 (C7 Phase 1 — DEC-037)
    in_scope_phase1: false
    in_scope_phase2: false
    in_scope_c7_phase1: true
    decision_ref: DEC-037
    legacy_behavior: "Subu46.pas L418 `Tong40.print_46_01/02`, Subu49.pas L601 `Tong40.PrinTing00` — Delphi Canvas 직접 그리기. C5 Phase 2 = HTML 미리보기까지 (DEC-034 의 'PDF는 C7 이연')."
    c7_phase1_behavior: "GET .../print.pdf 2건 신규. WeasyPrint 단일 엔진 (DEC-037). 빌더 함수는 기존 render_*_html 재사용 (SRP — 신규 SQL 0). 마감 자료는 '마감' 워터마크 (print_specs/c7_phase1.md §4)."
    risk: "WeasyPrint 시스템 의존성(libpango/libcairo) 누락 시 503. Dockerfile 메모 + Phase 1 회귀 테스트 1건으로 가시화 (c7.engine.unavailable)."

# ---------------------------------------------------------------
# 7. 동등성 기준 (5축)
# ---------------------------------------------------------------
equivalence:
  functional:
    - "동일 (gdate, hcode) 입력에 대해 aggregate → confirm → cancel 사이클이 가능."
    - "마감(Yesno='1') 후의 쓰기는 423 + i18n 'c5.errors.period_closed' (Phase 1 + Phase 2 공통)."
    - "확정·취소는 audit_token(scope='settlement_confirm') 필수."
    - "Sobo45_1 (택배) variant 는 동일 엔드포인트 + ?variant=takbae — 컬럼 의미만 변경."
    - "입금현황 variant=hcode(Sobo42 본) 와 variant=sdate(Sobo42_1 변형) 모두 동일 endpoint."
    - "Gpass 변경은 audit_password_service.rotate_password(scope='gpass_change')."
    # Phase 2:
    - "Sobo46 print-data 응답은 67개 Sum 컬럼 전체를 직렬화 (모던 UI 는 핵심 5종만 표시 — DEC-034)."
    - "Sobo49 Chek3 토글: 단건은 'bulk:false', 일괄은 'bulk:true' — 동일 엔드포인트, 동일 SQL 헬퍼 (DEC-036)."
    - "Sobo49 외부 발행: /issue 는 항상 200 + status='NOT_INTEGRATED' + audit_settlement INSERT + 내부 Chek3='1' 갱신 (DEC-035)."
    - "Sobo49 보관본 HTML·PDF: GET print(/print.pdf) 의 T2_Ssub 단건 SELECT 는 목록과 동일 동적 컬럼 빌드 (DEC-058) — Chek3/Sdate/Yesno 부재 변형 DB 에서도 인쇄 경로 500 방지."
    - "재집계: 마감 월에 호출 시 423, 정상 월은 출고/반품 원천에서 Sum26~28 재계산 + audit 'billing_recalculated'."
    - "audit 회전 UI: GET /audit/settlement 에 scope 필터(audit/gpass_change/tax_invoice/settlement_confirm/all) 가 동작."
  data:
    - "T2_Ssub UPSERT = SELECT FOR UPDATE → UPDATE/INSERT (단일 트랜잭션, execute_transactional_block)."
    - "T3_Ssub 라인 = DELETE WHERE 월 → INSERT N건 단일 트랜잭션."
    - "Yesno enum: '0' 신규/미확정, '1' 마감, '2' 취소(DEC-012)."
    - "Chek3 enum: '0' 미발행/청구, '1' 발행/영수 (DEC-036)."
    - "audit_returns 패턴 재사용 → audit_settlement 신설 (Phase 1 마이그레이션, Phase 2 는 신규 액션 5종 추가)."
  ux:
    - "DEC-028: 모던 페이지의 모든 위젯에 data-legacy-id 부착 — layout_mappings 의 위젯 ID 와 1:1."
    - "Sobo45 14컬럼 그리드 + 좌측 출판사 그리드, Sobo47 5컬럼, Sobo41 7컬럼+5필드 입력, Sobo42 9컬럼, Sobo46 미리보기 1매(헤더+표+합계), Sobo49 8컬럼 + 일괄 토글 버튼."
    - "마감 후 행은 '마감' 배지 + 셀 readonly 시각화."
    - "Sobo46 페이지 상단에 'c5.print.preview_only' 안내 배너 (DEC-034)."
    - "Sobo49 페이지 상단에 'c5.tax.external_not_integrated' 안내 배너 (DEC-035)."
    - "AuditPasswordModal: scope='settlement_confirm'/'gpass_change'/'audit' 분기, /admin/audit-rotate 에서 단일 화면 운용."
    - "i18n 메시지는 c5.ko.json 단일 출처."
  performance:
    - "월별 청구 집계 (라인 200건) < 1.5s (단일 트랜잭션)."
    - "입금 등록 < 500ms."
    - "입금현황 50거래처 < 1s (5단 집계)."
    - "목록 조회 p95 < 500ms (limit=50)."
    - "Sobo46 print-data (67 Sum + 31 라인) p95 < 800ms."
    - "Sobo49 일괄 Chek3 토글 (50거래처) < 1s."
    - "재집계 (월/거래처, 라인 200건) < 3s — 초과 시 D-ST-10 risk 후속."
  audit:
    - "aggregate/confirm/cancel/rotate 모두 audit.settlement 로거 + audit_settlement 테이블 INSERT."
    - "Phase 2 추가 액션: tax_chek3_toggled, tax_chek3_bulk, tax_issued_stub, billing_recalculated, audit_password_rotated_ui."
    - "필수 필드: timestamp / gcode / billing_key / action / result / client_ip / audit_token_hash."
    - "확정·취소·Gpass 변경은 audit_token_hash 추가 기록."

