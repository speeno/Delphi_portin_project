# Migration Contract: 정산 청구·집계·입금 (C5 Phase 1)
# 본 계약은 레거시 델파이 동작을 웹(API+UI)에서 동등하게 재현하기 위한 1차 계약입니다.
# 출처(레거시):
#   - legacy_delphi_source/legacy_source/Subu45.pas (TSobo45 청구서관리 — INSERT/UPDATE T2_Ssub ≈2644~2971,
#       Yesno='1' 마감 분기 840·979·1051, Tong40._Sv_Ghng_ 트리거 3282~3304/4523, 평문 Gpass 372~381)
#   - legacy_delphi_source/legacy_source/Subu45_1.pas (택배 변형 — nForm='45_1', 폼 로컬 T4_Sub51/52)
#   - legacy_delphi_source/legacy_source/Subu47.pas (TSobo47 청구금액 년월 — 271~316 Group By Gdate)
#   - legacy_delphi_source/legacy_source/Subu41.pas (TSobo41 입금내역 — Select * From T5_Ssub, 343/353/563 INSERT/UPDATE)
#   - legacy_delphi_source/legacy_source/Subu42.pas (TSobo42 입금현황 — Select Hcode, Sum26..28 ≈278)
#   - legacy_delphi_source/legacy_source/Subu42_1.pas (변형 — Group By Gdate ≈297, GPSUM 추가)
#   - legacy_delphi_source/legacy_source/Base01.pas L12~17 (E_* 메시지 상수)
# 사용 폼: Sobo45/45_1 (청구서관리) + Sobo47 (청구금액 년월) + Sobo41 (입금내역) + Sobo42/42_1 (입금현황)
# Phase 2 (별도 contract 또는 본 contract 의 v1.1.0 신설 예정): Sobo46 (청구서출력) + Sobo49 (세금계산서)
# 핵심 테이블: T2_Ssub (청구 헤더, Sum26~28 합계, Yesno 마감 플래그) / T3_Ssub (청구 상세 라인) / T5_Ssub (입금)
# 보조 테이블: Sv_Ghng (변동 트리거 — _Sv_Ghng_) / G7_Ggeo (거래처 LOOKUP) / Id_Logn (Gpass — DEC-032)
# 1차 미접근: Sobo46 청구서출력 / Sobo49 세금계산서 / Tong20.Srart_47_01 보고 인쇄 — Phase 2
# 관련 OQ: OQ-ST-1~5 (analysis/screen_cards/c5_settlement.md §8)
# 관련 DEC: DEC-031 (T2_Ssub.Yesno 마감 정책 — 본 contract 와 함께 신설),
#           DEC-032 (평문 Gpass → AuditPasswordModal rotate — 본 contract 와 함께 신설),
#           DEC-029 (audit_password_service 재사용 — scope=settlement_confirm/gpass_change 추가),
#           DEC-024 (페이지네이션·EUC-KR), DEC-019 (customer_variants), DEC-012 (Yesno='2' soft cancel),
#           DEC-009 (D_Select 1차 미적용), DEC-028 (dfm 영구 입력 동결)
# 참조 산출물: analysis/layout_mappings/Sobo45_billing.md / Sobo45_1_billing.md / Sobo47_billing.md /
#              Sobo41_cash.md / Sobo42_cash.md / Sobo42_1_cash.md
#              analysis/screen_cards/c5_settlement.md (C5 통합 카드)
#              analysis/handlers/c5_phase1.md (이벤트·SQL 인덱스)
#              i18n/messages/c5.ko.json (메시지 카탈로그)

id: C5-settlement-billing
name: 정산 청구·집계·입금 + 마감 가드 (Phase 1) / 청구서출력·세금계산서 (Phase 2)
version: 1.0.0
status: approved
scope_phase: phase1
acceptance_goal: |
  C5 Phase 1 합격선:
  "기존 사용자가 (1) 거래처별 월 청구서를 집계·확정·취소(소프트)할 수 있고,
   (2) 월별 청구금액 합계를 조회할 수 있으며,
   (3) 입금 내역을 신규/수정 등록하고,
   (4) 거래처별·년월별 입금현황(전월미수·당월금액·세액·입금·당월미수)을 조회할 수 있다."
  마감(`T2_Ssub.Yesno='1'`) 후의 모든 쓰기는 HTTP 423 + 레거시 한글 메시지로 차단(DEC-031).
  확정·취소·Gpass 변경은 audit_password_service 토큰(DEC-029) 통과 필수.
  Phase 2 합격선(별도 사이클): 청구서 인쇄(Sobo46) + 세금계산서(Sobo49) + 재집계 잡 + 고급 audit.

owners:
  business: 메인개발자
  legacy: 델파이 담당자
  web: 웹 포팅 팀

links:
  candidate: docs/core-scenarios-candidates.md#c5-정산
  test_pack: test/test_c5_settlement_phase1.py
  source_legacy:
    - legacy_delphi_source/legacy_source/Subu45.pas
    - legacy_delphi_source/legacy_source/Subu45.dfm
    - legacy_delphi_source/legacy_source/Subu45_1.pas
    - legacy_delphi_source/legacy_source/Subu45_1.dfm
    - legacy_delphi_source/legacy_source/Subu47.pas
    - legacy_delphi_source/legacy_source/Subu47.dfm
    - legacy_delphi_source/legacy_source/Subu41.pas
    - legacy_delphi_source/legacy_source/Subu41.dfm
    - legacy_delphi_source/legacy_source/Subu42.pas
    - legacy_delphi_source/legacy_source/Subu42.dfm
    - legacy_delphi_source/legacy_source/Subu42_1.pas
    - legacy_delphi_source/legacy_source/Subu42_1.dfm
    - legacy_delphi_source/legacy_source/Base01.pas
  source_analysis:
    - analysis/screen_cards/c5_settlement.md      # C5 통합 카드
    - analysis/handlers/c5_phase1.md              # 이벤트·SQL 인덱스
    - i18n/messages/c5.ko.json                    # 메시지 카탈로그 (DEC-031 단일 출처)
  layout_mappings:        # DEC-028 — 신규 화면 작성의 공식 입력
    - analysis/layout_mappings/Sobo45_billing.md
    - analysis/layout_mappings/Sobo45_1_billing.md
    - analysis/layout_mappings/Sobo47_billing.md
    - analysis/layout_mappings/Sobo41_cash.md
    - analysis/layout_mappings/Sobo42_cash.md
    - analysis/layout_mappings/Sobo42_1_cash.md
  dfm_html_artifacts:
    - tools/delphi_porting_accelerator/examples/generated/legacy_source_root/Subu45/Sobo45.html
    - tools/delphi_porting_accelerator/examples/generated/legacy_source_root/Subu45_1/Sobo45_1.html
    - tools/delphi_porting_accelerator/examples/generated/legacy_source_root/Subu47/Sobo47.html
    - tools/delphi_porting_accelerator/examples/generated/legacy_source_root/Subu41/Sobo41.html
    - tools/delphi_porting_accelerator/examples/generated/legacy_source_root/Subu42/Sobo42.html
    - tools/delphi_porting_accelerator/examples/generated/legacy_source_root/Subu42_1/Sobo42_1.html
  related_open_questions:
    - OQ-ST-1   # 세금계산서 외부 발행 채널 — Phase 2 stub
    - OQ-ST-2   # Chek3 의미 (세금계산서 발행 플래그) — Phase 2 시작 전 운영 확인
    - OQ-ST-3   # 취소 시 Yesno 값 ('2' 추정 — DEC-012 패턴) — Phase 1 전 확인 필요
    - OQ-ST-4   # 입금수단 PUBUN 코드표 — 카탈로그 조회 후 enum 화
    - OQ-ST-5   # F43–F47 권한 적용 시점 — DEC-009 따라 1차 미적용

# ---------------------------------------------------------------
# 1. 비즈니스 의도
# ---------------------------------------------------------------
intent: |
  거래처별 월 단위 청구·정산 사이클을 모던 웹에서 재현한다:
    1) 청구서관리(Sobo45/45_1): 출고/반품/발송비 라인을 월키(gdate)+거래처(hcode)로 집계 → T2_Ssub UPSERT, 라인 T3_Ssub 재구성
    2) 청구금액 년월(Sobo47): 거래처+월 범위 합계 보고 (보고서 출력은 Phase 2)
    3) 입금내역(Sobo41): T5_Ssub 신규/수정/조회 — 결재구분(PUBUN)·금액·메모
    4) 입금현황(Sobo42/42_1): 전월미수+당월금액+세액-입금=당월미수 5단 집계 — 거래처별 또는 년월별
    5) 마감(Sobo45 Button702): T2_Ssub.Yesno='1' 확정 → 이후 쓰기 423 차단 (DEC-031)
    6) Gpass 변경(Subu45.pas L372 InputBox): 평문 폐기, AuditPasswordModal rotate 액션으로 이관 (DEC-032)
  변형(Sobo45_1 택배 / Sobo42_1 년월별)은 코드 분기 없이 customer_variants 데이터 주도 분기로만 표현(DEC-019).

# ---------------------------------------------------------------
# 2. 입력 (UI/API 공용)
# ---------------------------------------------------------------
inputs:
  billing_aggregate:
    - name: gdate
      type: string         # 'YYYYMM' (월키 — Sobo45 일자가 월별 집계되는 단위)
      required: true
      legacy_field: T2_Ssub.Gdate
      note: "월 6글자 또는 'YYYY-MM' (서버에서 정규화). 청구서 1건 = (gdate, hcode) 1쌍."
    - name: hcode
      type: string
      required: true
      legacy_field: T2_Ssub.Hcode
      note: "거래처 코드. G7_Ggeo lookup."
    - name: variant
      type: string
      required: false
      default: 'standard'
      enum: ['standard', 'takbae']
      note: "Sobo45 본 = 'standard' / Sobo45_1 = 'takbae' (DEC-019). 컬럼 5~7 의미만 변경."
  billing_lines:
    - name: lines[]
      required: false      # 집계는 출고/반품 원천 데이터에서 자동 — 사용자 직접 라인 수정 시에만 채움
      schema:
        - name: idx
          type: integer
          required: false  # 신규 시 서버 채번
          legacy_field: T3_Ssub.Idx
        - name: gdate
          type: string     # 'YYYY-MM-DD'
          required: true
          legacy_field: T3_Ssub.Gdate
        - name: gqut1     # 시내부수 (또는 takbae 변형의 大)
          type: integer
          required: false
        - name: gqut2     # 지방부수 (또는 takbae 변형의 中)
          type: integer
          required: false
        - name: gqut3     # 박스대 (또는 takbae 변형의 小)
          type: integer
          required: false
        - name: gqut4     # 보호대
          type: integer
          required: false
        - name: gqut5
          type: integer
          required: false
        - name: gqut6
          type: integer
          required: false
        - name: gqut7
          type: integer
          required: false
        - name: name1     # 발송비내역 지역
          type: string
          required: false
        - name: name2     # 발송비내역 화물명
          type: string
          required: false
        - name: gname     # 발송비내역 서점명
          type: string
          required: false
        - name: gsqut     # 발송비내역 건수
          type: integer
          required: false
        - name: gssum     # 발송비내역 발송비 (또는 청구금액 합계)
          type: integer
          required: false
  cash_input:
    - name: gdate
      type: string         # 'YYYY-MM-DD'
      required: true
      legacy_field: T5_Ssub.Gdate
    - name: hcode
      type: string
      required: true
      legacy_field: T5_Ssub.Hcode
    - name: sdate
      type: string         # 'YYYYMM' — 대응 청구월
      required: true
      legacy_field: T5_Ssub.Sdate
    - name: gssum
      type: integer
      required: true
      legacy_field: T5_Ssub.Gssum
      note: "입금 금액. 음수 = 환불 (운영 합의 시 — OQ-ST-3 후속)."
    - name: pubun
      type: string
      required: true
      legacy_field: T5_Ssub.Pubun
      note: "결재구분 (현금/이체/카드 등). OQ-ST-4 카탈로그 후 enum 화."
    - name: gbigo
      type: string
      required: false
      legacy_field: T5_Ssub.Gbigo
    - name: jubun
      type: string
      required: false      # 신규 시 서버 자동 채번 (마이크로초)
      legacy_field: T5_Ssub.Jubun
  audit_password:
    - name: token
      type: string
      required: false      # confirm/cancel/rotate endpoint 에서만 필수
      note: "AuditPasswordModal 검증 통과 시 발급된 5분 수명 HMAC-SHA256 토큰. /api/v1/audit/password-verify (scope=settlement_confirm 또는 gpass_change) 응답."

# ---------------------------------------------------------------
# 3. 출력
# ---------------------------------------------------------------
outputs:
  billing_summary:
    - name: gdate
      type: string         # 월키 'YYYYMM'
    - name: hcode
      type: string
    - name: hname
      type: string         # G7_Ggeo lookup
    - name: total_lines
      type: integer
    - name: sum26          # 당월금액 (Sum26)
      type: integer
    - name: sum27          # 세액 (Sum27)
      type: integer
    - name: sum28          # 합계금액 (Sum28)
      type: integer
    - name: yesno
      type: string
      enum: ['0', '1', '2']
      note: "'0'=미확정, '1'=마감, '2'=취소(DEC-012)."
  cash_summary:
    - name: hcode
      type: string
    - name: hname
      type: string
    - name: gsumx          # 전월 미수
      type: integer
    - name: gosum          # 당월 금액
      type: integer
    - name: gbsum          # 세액
      type: integer
    - name: gssum          # 합계
      type: integer
    - name: gdate          # 마지막 입금일
      type: string
    - name: gsusu          # 입금액
      type: integer
    - name: gsumy          # 당월 미수 (= gsumx + gssum - gsusu)
      type: integer
    - name: gpsum          # 당월 합계 (variant=sdate 전용 — Sobo42_1)
      type: integer
      note: "본 폼(Sobo42, variant=hcode) 에서는 미반환."
  audit_token:
    - name: token
      type: string
      use: "AuditPasswordModal 검증 통과 시 발급. Authorization-Audit: Bearer-Audit {token} 헤더로 다음 호출에 사용. 5분 수명."
    - name: expires_at
      type: string
      use: "ISO 8601 timestamp."
    - name: scope
      type: string
      enum: ['settlement_confirm', 'gpass_change']
  failure_codes:
    - code: ST_VALIDATION
      condition: "필수 필드 누락 / 타입 불일치"
      http_status: 422
      i18n: "c5.errors.validation_*"
    - code: ST_NOT_FOUND
      condition: "지정한 월키/거래처의 row 가 없음"
      http_status: 404
    - code: ST_DUPLICATE
      condition: "신규 등록 시 이미 같은 (gdate, hcode, jubun) 존재"
      http_status: 409
    - code: ST_TX_FAILED
      condition: "라인 INSERT/UPDATE/DELETE 트랜잭션 도중 SQL 오류 → 전체 롤백"
      http_status: 500
    - code: ST_PERIOD_CLOSED
      condition: "T2_Ssub.Yesno='1' (마감) 인 월에 쓰기 시도 (DEC-031)"
      http_status: 423
      i18n: "c5.errors.period_closed"
    - code: ST_ALREADY_CANCELLED
      condition: "T2_Ssub.Yesno='2' (취소) 인 행 재취소 시도"
      http_status: 409
      i18n: "c5.errors.already_cancelled"
    - code: ST_AUDIT_REQUIRED
      condition: "confirm/cancel/rotate endpoint 호출 시 audit token 누락 또는 만료"
      http_status: 401
      i18n: "c5.errors.audit_invalid"
    - code: ST_AUDIT_INVALID
      condition: "패스워드 검증 실패 (비밀번호 불일치)"
      http_status: 401
      i18n: "c5.errors.audit_invalid"
    - code: ST_AUDIT_LOCKED
      condition: "패스워드 검증 5회 실패 → 30분 잠금 (DEC-029)"
      http_status: 429
      i18n: "c5.errors.audit_locked"

# ---------------------------------------------------------------
# 4. 데이터 액세스 (레거시 SQL ↔ 웹 SQL)
# ---------------------------------------------------------------
data_access:
  - id: SQL-ST-1-BILLING-UPSERT
    legacy:
      file: legacy_delphi_source/legacy_source/Subu45.pas
      line: 2644
      sql: |
        # T2_Ssub 청구 헤더 UPSERT (DBGrid201Columns10UpdateData ≈ L2644~2971)
        # 모던: 명시 SELECT → UPDATE 또는 INSERT 분기
        SELECT 1 FROM T2_Ssub WHERE Gdate=:gdate AND Hcode=:hcode LIMIT 1;
        # rows>0:
        UPDATE T2_Ssub SET Sum26=:sum26, Sum27=:sum27, Sum28=:sum28, Time2=NOW()
         WHERE Gdate=:gdate AND Hcode=:hcode;
        # rows=0:
        INSERT INTO T2_Ssub (Gdate, Hcode, Sum26, Sum27, Sum28, Yesno, Time1)
        VALUES (:gdate, :hcode, :sum26, :sum27, :sum28, '0', NOW());
    notes:
      - "마감 가드: assert_period_open(gdate, hcode) 선행 — Yesno='1' 시 ST_PERIOD_CLOSED."
      - "execute_transactional_block 사용 (SELECT FOR UPDATE 권장)."
    web:
      method: UPSERT
      table: T2_Ssub
      bind: parameterized
      transaction: required
      precondition: period_open
    in_scope_phase1: true

  - id: SQL-ST-2-LINE-UPSERT
    legacy:
      file: legacy_delphi_source/legacy_source/Subu45.pas
      line: 2700
      sql: |
        # T3_Ssub 라인 — 월 단위 재구성:
        DELETE FROM T3_Ssub WHERE Gdate LIKE CONCAT(:month, '%') AND Hcode=:hcode;
        INSERT INTO T3_Ssub (Gdate, Hcode, Idx, Gqut1, Gqut2, Gqut3, Gqut4, Gqut5, Gqut6, Gqut7,
                             Name1, Name2, Gname, Gsqut, Gssum, Yesno, Time1)
        VALUES (...) [N times];
    notes:
      - "라인 N개를 단일 BEGIN→DELETE→N×INSERT→COMMIT 으로 재구성."
      - "마감 가드 동일."
    web:
      method: REBUILD
      table: T3_Ssub
      bind: parameterized
      transaction: required
      precondition: period_open
    in_scope_phase1: true

  - id: SQL-ST-3-CONFIRM
    legacy:
      file: legacy_delphi_source/legacy_source/Subu45.pas
      line: 840
      sql: |
        UPDATE T2_Ssub SET Yesno='1', Time2=NOW()
         WHERE Gdate=:gdate AND Hcode=:hcode
    notes:
      - "마감 확정. 🔒 audit_token(scope='settlement_confirm') 검증 필수 (DEC-029)."
      - "이후 모든 쓰기는 423 (DEC-031)."
    web:
      method: UPDATE
      table: T2_Ssub
      bind: parameterized
      transaction: required
      precondition: audit_token_valid
    in_scope_phase1: true

  - id: SQL-ST-4-CANCEL
    legacy:
      file: legacy_delphi_source/legacy_source/Subu45.pas
      line: 980
      sql: |
        UPDATE T2_Ssub SET Yesno='2', Time3=NOW()
         WHERE Gdate=:gdate AND Hcode=:hcode AND Yesno != '2'
    notes:
      - "DEC-012 soft cancel. 이미 '2' 면 ST_ALREADY_CANCELLED."
      - "🔒 audit_token(scope='settlement_confirm') 검증 필수."
    web:
      method: UPDATE
      table: T2_Ssub
      bind: parameterized
      transaction: required
      precondition: audit_token_valid
    in_scope_phase1: true

  - id: SQL-ST-5-SVGHNG
    legacy:
      file: legacy_delphi_source/legacy_source/Subu45.pas
      line: 3282
      sql: |
        # Tong40._Sv_Ghng_ 트리거 (≈3282~3304 / 4523)
        UPDATE Sv_Ghng SET <Field>=<Field>+:delta, Time2=NOW()
         WHERE Hcode=:hcode AND Bcode=:bcode AND Gdate=:gdate
    notes:
      - "확정·취소 트랜잭션 내부 자동 호출. settlement_service._touch_sv_ghng."
      - "OQ-RT-3 (Sv_Ghng Field 카탈로그) 재사용 — Phase 2 정밀화."
    web:
      method: UPDATE
      table: Sv_Ghng
      bind: parameterized
      transaction: required
    in_scope_phase1: true

  - id: SQL-ST-6-PERIOD-SUMMARY
    legacy:
      file: legacy_delphi_source/legacy_source/Subu47.pas
      line: 271
      sql: |
        SELECT Gdate, Sum(Sum26) AS gsumx, Sum(Sum27) AS gsumy, Sum(Sum28) AS gssum
          From T2_Ssub
         Where Hcode=:hcode AND Gdate >= :from AND Gdate <= :to
         Group By Gdate
         Order By Gdate
    notes:
      - "Sobo47 청구금액 년월. Phase 2 인쇄(Tong20.Srart_47_01)는 모던 화면 결과 자체로 흡수."
    web:
      method: SELECT
      table: T2_Ssub
      bind: parameterized
    in_scope_phase1: true

  - id: SQL-ST-7-CASH-LIST
    legacy:
      file: legacy_delphi_source/legacy_source/Subu41.pas
      line: 320
      sql: |
        SELECT t.*, g.Gname AS Hname
          From T5_Ssub t
          LEFT JOIN G7_Ggeo g ON t.Hcode=g.Gcode
         Where t.Gdate >= :from AND t.Gdate <= :to
           [AND t.Hcode = :hcode]
           [AND t.Yesno != '2' OR :include_cancelled]
         Order By t.Gdate DESC, t.Hcode
    web:
      method: SELECT
      table: T5_Ssub
      bind: parameterized
    in_scope_phase1: true

  - id: SQL-ST-8-CASH-INSERT
    legacy:
      file: legacy_delphi_source/legacy_source/Subu41.pas
      line: 343
      sql: |
        INSERT INTO T5_Ssub (Gdate, Hcode, Sdate, Jubun, Gssum, Pubun, Gbigo, Yesno, Time1)
        VALUES (:gdate, :hcode, :sdate, :jubun, :gssum, :pubun, :gbigo, '0', NOW())
    notes:
      - "마감 가드: 대응 청구월(:sdate)이 마감되었으면 ST_PERIOD_CLOSED."
      - "jubun 미제공 시 마이크로초 채번 (C2/C3 패턴)."
    web:
      method: INSERT
      table: T5_Ssub
      bind: parameterized
      transaction: required
      precondition: period_open
    in_scope_phase1: true

  - id: SQL-ST-9-CASH-UPDATE
    legacy:
      file: legacy_delphi_source/legacy_source/Subu41.pas
      line: 563
      sql: |
        UPDATE T5_Ssub SET Gssum=:gssum, Pubun=:pubun, Gbigo=:gbigo, Time2=NOW()
         WHERE Gdate=:gdate AND Hcode=:hcode AND Jubun=:jubun
    web:
      method: UPDATE
      table: T5_Ssub
      bind: parameterized
      transaction: required
      precondition: period_open
    in_scope_phase1: true

  - id: SQL-ST-10-CASH-STATUS-HCODE
    legacy:
      file: legacy_delphi_source/legacy_source/Subu42.pas
      line: 278
      sql: |
        # 거래처별 입금현황 (Sobo42 본):
        SELECT t.Hcode, g.Gname AS Hname,
               Sum(t.Sum26) AS gosum, Sum(t.Sum27) AS gbsum, Sum(t.Sum28) AS gssum
          From T2_Ssub t LEFT JOIN G7_Ggeo g ON t.Hcode=g.Gcode
         Where t.Sdate = :month
         Group By t.Hcode, g.Gname
        UNION SELECT
          # T5_Ssub 입금 누계는 별도 LEFT JOIN
        Order By t.Hcode
    notes:
      - "전월미수(GSUMX)는 (현재 월의 Sdate < :month) 누계로 별도 SELECT."
      - "당월미수(GSUMY) = GSUMX + GSSUM - GSUSU 클라이언트 계산."
    web:
      method: SELECT
      table: T2_Ssub, T5_Ssub
      bind: parameterized
    in_scope_phase1: true

  - id: SQL-ST-11-CASH-STATUS-SDATE
    legacy:
      file: legacy_delphi_source/legacy_source/Subu42_1.pas
      line: 297
      sql: |
        # 년월별 입금현황 (Sobo42_1 변형):
        SELECT t.Gdate AS sdate,
               Sum(t.Sum26) AS gosum, Sum(t.Sum27) AS gbsum, Sum(t.Sum28) AS gssum,
               (Sum(t.Sum26)+Sum(t.Sum27)) AS gpsum
          From T2_Ssub t
         Where t.Hcode = :hcode
         Group By t.Gdate
         Order By t.Gdate
    notes:
      - "변형 — group_by=Gdate, GPSUM 컬럼 추가. variant=sdate 일 때만 노출."
      - "거래처는 검색 입력(:hcode)으로 단일 고정."
    web:
      method: SELECT
      table: T2_Ssub, T5_Ssub
      bind: parameterized
    in_scope_phase1: true

  - id: SQL-ST-12-GPASS-ROTATE
    legacy:
      file: legacy_delphi_source/legacy_source/Subu45.pas
      line: 372
      sql: |
        # 평문 폐기 — DEC-032 모던 이관:
        # OLD: UPDATE Id_Logn SET Gpass=:plaintext WHERE Hcode='0001'
        # NEW: audit_password_service.rotate_password(scope='gpass_change')
        #      → application_settings (scope='audit', key='password_hash') bcrypt UPSERT
    notes:
      - "🔒 audit_token(scope='gpass_change') 검증 필수."
      - "기존 InputBox 평문 입력 폐기 → AuditPasswordModal `rotate` 액션."
    web:
      method: POST
      table: application_settings
      bind: parameterized
      precondition: audit_token_valid
    in_scope_phase1: true

  - id: SQL-ST-13-LOOKUP-CUSTOMER
    legacy:
      file: legacy_delphi_source/legacy_source/Subu45.pas
      line: 100
      sql: |
        SELECT Gname, Gadd1, Gadd2, Gtel1, Gtel2 From G7_Ggeo Where Gcode=:hcode
    notes:
      - "거래처 자동완성. C2 masters_service.search_customers 재사용."
    web:
      method: SELECT
      table: G7_Ggeo
      bind: parameterized
    in_scope_phase1: true

# ---------------------------------------------------------------
# 5. 엔드포인트 (웹)
# ---------------------------------------------------------------
endpoints:
  # ---------- 청구서관리 (Sobo45/45_1) ----------
  - method: GET
    path: /api/v1/settlement/billing
    description: "월별 청구 헤더 목록 조회 (거래처/월 범위)."
    auth: bearer
    request:
      query:
        server_id: string
        month_from: string   # 'YYYYMM'
        month_to: string
        hcode?: string
        variant?: "string — 'standard' | 'takbae' (default 'standard')"
        include_cancelled?: boolean
        limit?: integer
        offset?: integer
    responses:
      "200":
        body:
          items:
            - gdate: string
              hcode: string
              hname: string
              total_lines: integer
              sum26: integer
              sum27: integer
              sum28: integer
              yesno: "string ('0'|'1'|'2')"
          page: { limit, offset, total, has_more }

  - method: GET
    path: /api/v1/settlement/billing/{billing_key}
    description: "청구서 상세 (헤더 + 라인 N개)."
    auth: bearer
    request:
      path:
        billing_key: string   # '{gdate}|{hcode}'
    responses:
      "200":
        body:
          billing_key: { gdate, hcode }
          customer: { hcode, hname }
          variant: "string"
          summary: { sum26, sum27, sum28, yesno }
          lines:
            - idx: integer
              gdate: string
              gqut1: integer
              gqut2: integer
              gqut3: integer
              gqut4: integer
              gqut5: integer
              gqut6: integer
              gqut7: integer
              name1: string
              name2: string
              gname: string
              gsqut: integer
              gssum: integer
              yesno: string
      "404": { body: { detail: "Billing not found", code: "ST_NOT_FOUND" } }

  - method: POST
    path: /api/v1/settlement/billing/aggregate
    description: "청구서 집계 — 출고/반품/발송비를 (gdate,hcode) 키로 T2_Ssub UPSERT + T3_Ssub 라인 재구성. 마감 가드 적용."
    auth: bearer
    request:
      content_type: application/json
      schema:
        server_id: string
        gdate: "string (required, 'YYYYMM')"
        hcode: "string (required)"
        variant?: "string ('standard'|'takbae')"
        lines?: "array (optional — 미제공 시 출고/반품 원천에서 자동 집계)"
    responses:
      "200":
        body:
          billing_key: { gdate, hcode }
          summary: { sum26, sum27, sum28, total_lines }
          rebuilt_lines: integer
          updated_at: string
      "423": { body: { detail: "마감된 자료입니다.", code: "ST_PERIOD_CLOSED" } }
      "422": { body: { detail: "Validation failed", code: "ST_VALIDATION" } }
      "500": { body: { detail: "Transaction failed (rolled back)", code: "ST_TX_FAILED" } }

  - method: POST
    path: /api/v1/settlement/billing/confirm
    description: "청구서 확정 — T2_Ssub.Yesno='1'. 🔒 audit_token(scope='settlement_confirm') 필수."
    auth: bearer
    request:
      headers:
        Authorization-Audit: "Bearer-Audit {token}"
      content_type: application/json
      schema:
        server_id: string
        gdate: string
        hcode: string
    responses:
      "200":
        body:
          billing_key: { gdate, hcode }
          yesno: "1"
          confirmed_at: string
      "401": { body: { detail: "Audit token required", code: "ST_AUDIT_REQUIRED" } }
      "423": { body: { detail: "이미 마감된 자료입니다.", code: "ST_PERIOD_CLOSED" } }

  - method: POST
    path: /api/v1/settlement/billing/cancel
    description: "청구서 소프트 취소 — T2_Ssub.Yesno='2' (DEC-012). 🔒 audit_token 필수."
    auth: bearer
    request:
      headers:
        Authorization-Audit: "Bearer-Audit {token}"
      content_type: application/json
      schema:
        server_id: string
        gdate: string
        hcode: string
        reason: "string (optional, audit-only)"
    responses:
      "200":
        body:
          billing_key: { gdate, hcode }
          yesno: "2"
          cancelled_at: string
      "401": { body: { detail: "Audit token required", code: "ST_AUDIT_REQUIRED" } }
      "409": { body: { detail: "이미 취소된 자료입니다.", code: "ST_ALREADY_CANCELLED" } }

  # ---------- 청구금액 년월 (Sobo47) ----------
  - method: GET
    path: /api/v1/settlement/billing/period
    description: "월별 청구금액 합계 보고 (Sobo47)."
    auth: bearer
    request:
      query:
        server_id: string
        hcode: "string (required)"
        month_from: "string (required) 'YYYYMM'"
        month_to: "string (required)"
    responses:
      "200":
        body:
          items:
            - gdate: string    # YYYYMM
              gsumx: integer   # 당월금액
              gsumy: integer   # 세액
              gssum: integer   # 합계
              name1: string    # 비고
          totals:
            gsumx: integer
            gsumy: integer
            gssum: integer

  # ---------- 입금내역 (Sobo41) ----------
  - method: GET
    path: /api/v1/settlement/cash
    description: "입금 내역 목록 (Sobo41)."
    auth: bearer
    request:
      query:
        server_id: string
        date_from: string    # 'YYYY-MM-DD'
        date_to: string
        hcode?: string
        include_cancelled?: boolean
        limit?: integer
        offset?: integer
    responses:
      "200":
        body:
          items:
            - gdate: string
              sdate: string
              hcode: string
              hname: string
              jubun: string
              gssum: integer
              pubun: string
              gbigo: string
              yesno: string
          page: { limit, offset, total, has_more }

  - method: POST
    path: /api/v1/settlement/cash
    description: "입금 신규/수정 등록 (UPSERT). 마감 가드: sdate(대응 청구월) Yesno='1' 면 423."
    auth: bearer
    request:
      content_type: application/json
      schema:
        server_id: string
        gdate: string
        hcode: string
        sdate: string
        jubun?: "string (optional, server-generated)"
        gssum: integer
        pubun: string
        gbigo?: string
    responses:
      "200":
        body:
          cash_key: { gdate, hcode, jubun }
          action: "inserted|updated"
          gssum: integer
          updated_at: string
      "422": { body: { detail: "결재구분을 선택하세요.", code: "ST_VALIDATION" } }
      "423": { body: { detail: "마감된 자료입니다.", code: "ST_PERIOD_CLOSED" } }

  - method: PATCH
    path: /api/v1/settlement/cash/{cash_key}/cancel
    description: "입금 소프트 취소 (DEC-012)."
    auth: bearer
    request:
      headers:
        Authorization-Audit: "Bearer-Audit {token}"
      path:
        cash_key: string   # '{gdate}|{hcode}|{jubun}'
    responses:
      "200":
        body:
          cash_key: { gdate, hcode, jubun }
          status: "cancelled"
      "401": { body: { detail: "Audit token required", code: "ST_AUDIT_REQUIRED" } }
      "409": { body: { detail: "이미 취소된 자료입니다.", code: "ST_ALREADY_CANCELLED" } }

  # ---------- 입금현황 (Sobo42/42_1) ----------
  - method: GET
    path: /api/v1/settlement/cash-status
    description: "입금현황 5단 집계 — variant=hcode (Sobo42 본) | sdate (Sobo42_1 변형)."
    auth: bearer
    request:
      query:
        server_id: string
        variant: "string ('hcode'|'sdate', default 'hcode')"
        month: "string (required) 'YYYYMM' — 기준월"
        hcode?: "string — variant=sdate 시 필수"
        limit?: integer
        offset?: integer
    responses:
      "200":
        body:
          variant: string
          items:
            # variant=hcode:
            - hcode?: string
              hname?: string
            # variant=sdate:
            - sdate?: string
            # 공통:
            - gsumx: integer    # 전월미수
              gosum: integer    # 당월금액
              gbsum: integer    # 세액
              gpsum?: integer   # 당월합계 (variant=sdate 만)
              gssum: integer    # 합계금액
              gdate: string     # 입금일
              gsusu: integer    # 입금액
              gsumy: integer    # 당월미수
          totals:
            gsumx: integer
            gosum: integer
            gbsum: integer
            gssum: integer
            gsusu: integer
            gsumy: integer
          page: { limit, offset, total, has_more }

  # ---------- audit (DEC-029 재사용) ----------
  - method: POST
    path: /api/v1/audit/password-verify
    description: "패스워드 검증 (settlement scope). C4 와 동일 endpoint, scope 만 'settlement_confirm' / 'gpass_change' 추가."
    auth: bearer
    request:
      content_type: application/json
      schema:
        password: "string (required)"
        scope: "string — 'settlement_confirm' 또는 'gpass_change'"
    responses:
      "200":
        body:
          token: string
          expires_at: string
          scope: string
          algorithm: "string ('bcrypt'|'plain_fallback')"
      "401": { body: { detail: "비밀번호가 일치하지 않습니다.", code: "ST_AUDIT_INVALID" } }
      "429": { body: { detail: "비밀번호 시도 한도를 초과했습니다.", code: "ST_AUDIT_LOCKED" } }

  - method: POST
    path: /api/v1/audit/gpass-rotate
    description: "Gpass(평문) 회전 (Sobo45.pas L372 InputBox 폐기, DEC-032). 🔒 scope='gpass_change' 토큰 필수. C4 의 /audit/password-rotate (scope=audit) 와 경로/스코프를 분리해 라우트 충돌·권한 혼동을 방지."
    auth: bearer
    request:
      headers:
        Authorization-Audit: "Bearer-Audit {token}"
      content_type: application/json
      schema:
        new_password: "string (required, min=4)"
    responses:
      "200":
        body:
          rotated_at: string
          algorithm: "bcrypt"
          cost: integer
      "401": { body: { detail: "Audit token required", code: "ST_AUDIT_REQUIRED" } }

# ---------------------------------------------------------------
# 6. 차이점·결정 사항
# ---------------------------------------------------------------
deltas:
  - id: D-ST-1
    title: 마감 정책 — T2_Ssub.Yesno 보존, 글로벌 close_until 키 미도입
    in_scope_phase1: true
    decision_ref: DEC-031
    phase1_behavior: "T2_Ssub.Yesno='1' 인 (gdate,hcode) 의 모든 쓰기를 423 + 한글 메시지로 차단. application_settings.settlement.close_until 키는 도입하지 않음."
    legacy_behavior: "Subu45.pas L840·979·1051 의 if Yesno='1' then ShowMessage(...) 분기."
    proposed_web_behavior: "settlement_service.assert_period_open(gdate, hcode) 헬퍼를 모든 쓰기 contract action 진입 직후 호출."

  - id: D-ST-2
    title: 평문 Gpass 변경 → AuditPasswordModal rotate 이관
    in_scope_phase1: true
    decision_ref: DEC-032
    phase1_behavior: "InputBox 평문 입력 폐기. AuditPasswordModal 의 'rotate' 액션 (audit_password_service.rotate_password) 호출, scope='gpass_change'."
    legacy_behavior: "Subu45.pas L372~381: InputBox + UPDATE Id_Logn SET Gpass=평문."
    risk: "1차 — 운영팀이 기존 평문 비밀번호를 새 bcrypt 해시로 1회 이행 필요."

  - id: D-ST-3
    title: 변형 (Sobo45_1 / Sobo42_1) 단일 컴포넌트 + 데이터 주도 분기
    in_scope_phase1: true
    decision_ref: DEC-019
    phase1_behavior: "URL ?variant=takbae|sdate 로 분기. 백엔드는 variant 파라미터를 받아 컬럼 헤더/SQL group_by 만 변경. 코드 분기 0건."

  - id: D-ST-4
    title: 청구서출력 (Sobo46) + 세금계산서 (Sobo49) — Phase 2
    in_scope_phase1: false
    decision_ref: OQ-ST-1
    phase1_behavior: "Phase 1 미제공. Sobo45 의 Button701/702 인쇄 버튼은 disabled."
    proposed_web_behavior: "Phase 2 별 사이클 — print_invoice / issue_tax_invoice 액션 추가, 외부 발행 채널은 OQ-ST-1 답변 후."

  - id: D-ST-5
    title: 권한키 분기 (D_Select F43~F47) — C10 RBAC 통합
    in_scope_phase1: false
    decision_ref: DEC-009
    phase1_behavior: "1차 모든 인증 사용자 권한 동등 (D_Select 빈 값). 헬퍼 인터페이스(app/core/d_select.py) 만 노출."

  - id: D-ST-6
    title: 결재구분 PUBUN 코드표 — OQ-ST-4 카탈로그 후 enum 화
    in_scope_phase1: true
    decision_ref: OQ-ST-4
    phase1_behavior: "1차 자유 입력 (string). 카탈로그 확정 시 enum 으로 검증 추가."

  - id: D-ST-7
    title: 인쇄 (Sobo47 Tong20.Srart_47_01) — 화면 결과로 흡수
    in_scope_phase1: true
    decision_ref: DEC-017
    phase1_behavior: "별 인쇄 버튼 미제공. 화면의 SUM 푸터로 보고서 의미 흡수. 인쇄는 C7 사이클."

# ---------------------------------------------------------------
# 7. 동등성 기준 (5축)
# ---------------------------------------------------------------
equivalence:
  functional:
    - "동일 (gdate, hcode) 입력에 대해 aggregate → confirm → cancel 사이클이 가능."
    - "마감(Yesno='1') 후의 쓰기는 423 + i18n 'c5.errors.period_closed'."
    - "확정·취소는 audit_token(scope='settlement_confirm') 필수."
    - "Sobo45_1 (택배) variant 는 동일 엔드포인트 + ?variant=takbae — 컬럼 의미만 변경."
    - "입금현황 variant=hcode(Sobo42 본) 와 variant=sdate(Sobo42_1 변형) 모두 동일 endpoint."
    - "Gpass 변경은 audit_password_service.rotate_password(scope='gpass_change')."
  data:
    - "T2_Ssub UPSERT = SELECT FOR UPDATE → UPDATE/INSERT (단일 트랜잭션, execute_transactional_block)."
    - "T3_Ssub 라인 = DELETE WHERE 월 → INSERT N건 단일 트랜잭션."
    - "Yesno enum: '0' 신규/미확정, '1' 마감, '2' 취소(DEC-012)."
    - "audit_returns 패턴 재사용 → audit_settlement 신설 (T5)."
  ux:
    - "DEC-028: 모던 페이지의 모든 위젯에 data-legacy-id 부착 — layout_mappings 의 위젯 ID 와 1:1."
    - "Sobo45 14컬럼 그리드 + 좌측 출판사 그리드, Sobo47 5컬럼, Sobo41 7컬럼+5필드 입력, Sobo42 9컬럼."
    - "마감 후 행은 '마감' 배지 + 셀 readonly 시각화."
    - "AuditPasswordModal: scope='settlement_confirm'/'gpass_change' 분기."
    - "i18n 메시지는 c5.ko.json 단일 출처."
  performance:
    - "월별 청구 집계 (라인 200건) < 1.5s (단일 트랜잭션)."
    - "입금 등록 < 500ms."
    - "입금현황 50거래처 < 1s (5단 집계)."
    - "목록 조회 p95 < 500ms (limit=50)."
  audit:
    - "aggregate/confirm/cancel/rotate 모두 audit.settlement 로거 + audit_settlement 테이블 INSERT."
    - "필수 필드: timestamp / gcode / billing_key / action / result / client_ip / audit_token_hash."
    - "확정·취소·Gpass 변경은 audit_token_hash 추가 기록."

