# Migration Contract: 정산 청구·집계·입금 (C5 Phase 1)
# 본 계약은 레거시 델파이 동작을 웹(API+UI)에서 동등하게 재현하기 위한 1차 계약입니다.
# 출처(레거시):
#   - legacy_delphi_source/legacy_source/Subu45.pas (TSobo45 청구서관리 — INSERT/UPDATE T2_Ssub ≈2644~2971,
#       Yesno='1' 마감 분기 840·979·1051, Tong40._Sv_Ghng_ 트리거 3282~3304/4523, 평문 Gpass 372~381)
#   - legacy_delphi_source/legacy_source/Subu45_1.pas (택배 변형 — nForm='45_1', 폼 로컬 T4_Sub51/52)
#   - legacy_delphi_source/legacy_source/Subu47.pas (TSobo47 청구금액 년월 — 271~316 Group By Gdate)
#   - legacy_delphi_source/legacy_source/Subu41.pas (TSobo41 입금내역 — Select * From T5_Ssub, 343/353/563 INSERT/UPDATE)
#   - legacy_delphi_source/legacy_source/Subu42.pas (TSobo42 입금현황 — Select Hcode, Sum26..28 ≈278)
#   - legacy_delphi_source/legacy_source/Subu42_1.pas (변형 — Group By Gdate ≈297, GPSUM 추가)
#   - legacy_delphi_source/legacy_source/Base01.pas L12~17 (E_* 메시지 상수)
# 사용 폼: Sobo45/45_1 (청구서관리) + Sobo47 (청구금액 년월) + Sobo41 (입금내역) + Sobo42/42_1 (입금현황)
# Phase 2 (별도 contract 또는 본 contract 의 v1.1.0 신설 예정): Sobo46 (청구서출력) + Sobo49 (세금계산서)
# 핵심 테이블: T2_Ssub (청구 헤더, Sum26~28 합계, Yesno 마감 플래그) / T3_Ssub (청구 상세 라인) / T5_Ssub (입금)
# 보조 테이블: Sv_Ghng (변동 트리거 — _Sv_Ghng_) / G7_Ggeo (거래처 LOOKUP) / Id_Logn (Gpass — DEC-032)
# 1차 미접근: Sobo46 청구서출력 / Sobo49 세금계산서 / Tong20.Srart_47_01 보고 인쇄 — Phase 2
# 관련 OQ: OQ-ST-1~5 (analysis/screen_cards/c5_settlement.md §8)
# 관련 DEC: DEC-031 (T2_Ssub.Yesno 마감 정책 — 본 contract 와 함께 신설),
#           DEC-032 (평문 Gpass → AuditPasswordModal rotate — 본 contract 와 함께 신설),
#           DEC-029 (audit_password_service 재사용 — scope=settlement_confirm/gpass_change 추가),
#           DEC-024 (페이지네이션·EUC-KR), DEC-019 (customer_variants), DEC-012 (Yesno='2' soft cancel),
#           DEC-009 (D_Select 1차 미적용), DEC-028 (dfm 영구 입력 동결)
# 참조 산출물: analysis/layout_mappings/Sobo45_billing.md / Sobo45_1_billing.md / Sobo47_billing.md /
#              Sobo41_cash.md / Sobo42_cash.md / Sobo42_1_cash.md
#              analysis/screen_cards/c5_settlement.md (C5 통합 카드)
#              analysis/handlers/c5_phase1.md (이벤트·SQL 인덱스)
#              i18n/messages/c5.ko.json (메시지 카탈로그)

id: C5-settlement-billing
name: 정산 청구·집계·입금 + 마감 가드 (Phase 1) / 청구서출력·세금계산서·재집계·audit 회전 UI (Phase 2) / PDF 다운로드 (C7 Phase 1) / 발송비입금 422 핫픽스 (DEC-033 (f) 확장)
version: 1.3.1
status: approved
scope_phase: phase2
acceptance_goal: |
  C5 Phase 1 합격선:
  "기존 사용자가 (1) 거래처별 월 청구서를 집계·확정·취소(소프트)할 수 있고,
   (2) 월별 청구금액 합계를 조회할 수 있으며,
   (3) 입금 내역을 신규/수정 등록하고,
   (4) 거래처별·년월별 입금현황(전월미수·당월금액·세액·입금·당월미수)을 조회할 수 있다."
  마감(`T2_Ssub.Yesno='1'`) 후의 모든 쓰기는 HTTP 423 + 레거시 한글 메시지로 차단(DEC-031).
  확정·취소·Gpass 변경은 audit_password_service 토큰(DEC-029) 통과 필수.

  C5 Phase 2 합격선:
  "기존 사용자가 (5) 청구서 1매를 HTML 미리보기로 확인 + 브라우저 인쇄(window.print) 할 수 있고,
   (6) 월별 세금계산서 발행 대상 목록을 조회 + Chek3 토글(단건/일괄) 로 발행 상태를 관리하고,
   (7) 세금계산서 1매를 HTML 미리보기로 확인 + 외부 발행을 stub(NOT_INTEGRATED) 으로 시도하면 audit 만 영속화되며,
   (8) 청구 재집계 (gdate, hcode? 단위) 를 동기 트리거하고,
   (9) audit_settlement 최근 N건을 조회하면서 Gpass/Audit 두 scope 회전을 단일 화면에서 운용할 수 있다."
  Phase 2 모든 쓰기는 Phase 1 의 assert_period_open 가드를 그대로 통과(DEC-031). 인쇄 = HTML 미리보기까지(PDF/실인쇄/일괄은 C7 이연, DEC-034).
  세금계산서 외부 채널은 stub (DEC-035). Chek3 토글 SQL 은 단일 헬퍼로 흡수 (DEC-036).

