# 8. 비범위
# ---------------------------------------------------------------
out_of_scope:
  # Phase 2 범위 진입 (이전 Phase 1 의 out-of-scope 4건 모두 해소):
  #   - 청구서 인쇄 (Sobo46) → Phase 2 진입 (HTML 미리보기 only — DEC-034)
  #   - 세금계산서 발행 (Sobo49) → Phase 2 진입 (외부 채널은 stub — DEC-035)
  #   - 재집계 잡 (recalc_aggregate) → Phase 2 진입 (동기 트리거 — D-ST-10)
  #   - 고급 audit (audit 회전 UI) → Phase 2 진입 (D-ST-11)
  #
  # C7 Phase 1 진입 (D-ST-12 신설로 해소):
  #   - 청구서/세금계산서 PDF 다운로드 → C7 Phase 1 진입 (DEC-037 WeasyPrint)
  #
  # Phase 2 / C7 Phase 1 도 포함하지 않는 항목:
  - "일괄 인쇄 (Sobo46 Button016/017, Sobo49 Button016/017) — C7 Phase 2"
  - "프린터 직결 (PrinterSetupDialog) — OQ-002 잔존 (브라우저 인쇄 다이얼로그 위임)"
  - "세금계산서 외부 채널 실연결 (홈택스/이메일/팩스 등) — DEC-035 후속"
  - "재집계 백그라운드 큐 (비동기, 재시도) — Phase 2 합격선 미달 시 후속 사이클"
  - "F43~F47 권한 분기 (DEC-009) — C10 RBAC 통합"
  - "본사 ocode 분기 — 1차 지사 'B' 만"
  - "결재구분 PUBUN enum 검증 — OQ-ST-4 카탈로그 후"
  - "Sobo49 Code2(영수/청구) 편집 — Phase 2 표시만, 후속 사이클"

