#   chul_09 (위러브)    → T3_WAREHOUSE_LITE (warehouse_publisher, 출판사관리 부재)
#   book_21 (MS북스)    → T3_WAREHOUSE_FULL (warehouse_publisher, 출판사관리 + TSCLIB)
#   book_07 (북앤북류)  → T3_WAREHOUSE_FULL (warehouse_publisher, 출판사관리 + 신규폼군)
#   book_* (독립출판사) → T3 (publisher)
# ─────────────────────────────────────────────────────────────────────────────
