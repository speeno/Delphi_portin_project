# Migration Contract: Tenants Directory (DSN-DEC-06)
#
# 로그인 기반 DSN 라우팅의 정본 메타.
# 라우팅 키 = (tenant_id, account_family) — Uses 라벨 단독 사용 금지 (DSN-DEC-06).
#
# 비밀 정책 (secrets-policy.md G3)
# ----------------------------------
# - DB UserName / Password 는 이 파일 어디에도 기록하지 않는다.
# - 자격증명은 Vault 또는 환경변수(BLS_DB__<server>__USER, BLS_DB__<server>__PASSWORD)에만.
# - has_credentials_in_source 가 true 인 테넌트는 welove_db_route_matrix.json 에서
#   감지된 원본 파일 기록을 의미하며, 웹 인프라에는 vault 주입을 사용한다.
#
# 1차 시드 출처
# -------------
# - analysis/welove_db_route_matrix.json   (40 routes — server_id, db_name_logical, account_family)
# - analysis/welove_chul_builds.json       (7 builds — build_id, build_role, account_type_inferred)
# - docs/decision-login-db-routing.md      (DSN-DEC-06 설계)
# - tools/seed_tenants_directory.py        (자동 시드 스크립트)
#
# 추적 ID
# --------
# TENDIR-* 는 docs/welove-tracking-ids-backlog.md 에 등록됨.
#
# 동일 테넌트 다중 빌드 정책 (ACC-MULTI-*)
# ------------------------------------------
# - 같은 tenant_label_kor 로 여러 build_role 이 존재할 경우 각각 별도 행으로 등록.
#   예: 한국도서유통 → distributor / publisher / warehouse_publisher 세 행.
# - 사용자의 build_role 은 web_users.account_type / web_publisher_whitelist 승인 시 결정.

id: TENDIR-v1
name: 테넌트 디렉토리 (DSN 라우팅 정본)
version: 1.0.0
status: draft
revision_history:
  - { version: 1.0.0, date: 2026-04-24, summary: "DSN-DEC-06 초안 — welove_db_route_matrix.json + welove_chul_builds.json 결합 1차 시드" }

schema:
  tenant_id:       { type: uuid, pk: true, desc: "UUID v4 (시드 시 자동 생성)" }
  tenant_label_kor: { type: str, desc: "한글 표시 라벨 (Config.Ini Uses 값과 동일)" }
  account_family:  { type: str, desc: "DB prefix / 빌드 SKU (chul_09, book_07, book_21, book_kb ...)" }
  active_build_id: { type: str, nullable: true, desc: "BLD-* ID (analysis/welove_chul_builds.json 정합)" }
  build_role:      { type: enum, values: [distributor, publisher, warehouse_publisher, super], desc: "빌드 역할" }
  parent_tenant_id: { type: uuid, nullable: true, desc: "상위 총판 tenant_id (T2-PUB 인 경우)" }
  default_account_type:
    type: enum
    values: [T1, T2_DIST, T2_PUB, T3, T3_WAREHOUSE_LITE, T3_WAREHOUSE_FULL]
    desc: "회원가입/로그인 시 자동 매핑될 계정 유형 후보"
  primary_server:  { type: str, desc: "데이터 서버 ID (서버1~4, welove_db_route_matrix::server_id)" }
  db_name_logical: { type: str, desc: "DB 이름 (자격증명 제외 — chul_09_db 등)" }
  is_active:       { type: bool, default: true, desc: "테넌트 활성 여부" }
  notes:           { type: str, nullable: true }

