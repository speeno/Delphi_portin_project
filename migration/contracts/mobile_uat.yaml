# v0.2 보강 — breakpoint 격리 정책 (desktop 회귀 가드)
breakpoint_isolation_policy:
  description: |
    모바일 반응형 CSS 변경은 데스크톱 회귀를 발생시키지 않도록 다음 격리 규칙을 따른다.
  rules:
    - id: BPI-1
      rule: "신규 모바일 규칙은 `@media (max-width: 1024px)` 미만에서만 적용한다."
    - id: BPI-2
      rule: "기존 desktop selector(`.dashboard-grid`, `.scenario-card`, `.tracks-grid` 등) 의 default(미디어 쿼리 외) 속성은 변경 금지."
    - id: BPI-3
      rule: "Tailwind/유사 utility 사용 시 mobile-first prefix 만 사용 (`md:`/`lg:` 등으로 desktop 잠금)."
    - id: BPI-4
      rule: "터치 영역 ≥ 44×44 pt 는 mobile breakpoint 안에서만 강제 (desktop hover 영역 미변경)."
  enforcement:
    static_check: "rg -n '^[^@]*\\.(scenario-card|dashboard-grid|tracks-grid)\\s*\\{' dashboard/css/style.css | wc -l   # default selector 수정 0 검증 baseline"
    snapshot_test: "test/test_c11_mobile_responsive.py::test_desktop_layout_unchanged"

# v0.2 보강 — 스캐너 입력 충돌 케이스
scanner_conflict_cases:
  - id: SC-1
    description: "USB-OTG 어댑터 + USB-HID 바코드 스캐너 → keydown 시퀀스가 모바일 가상 키보드 toggle 과 race condition 없는지 검증"
    target: lib/scanner.ts (C8 자산)
  - id: SC-2
    description: "모바일 가상 키보드 활성 상태에서 스캐너 입력 시 focus 이동 없이 buffer 정합 유지"
    target: lib/scanner.ts
  - id: SC-3
    description: "스캐너 입력 (≤ 50ms 간격) 이 keypress event handler 에 의한 자동완성/입력완성 후 line 반영과 충돌하지 않음"
    target: outbound_orders page + scanner buffer

acceptance_criteria:
  - id: AC-MOB-1
    description: "viewport ≤ 768px 반응형 — 핵심 4 시나리오 데스크톱 동등 워크플로우"
    test: "test/test_c11_mobile_responsive.py::test_mobile_viewport_render_pass"
  - id: AC-MOB-2
    description: "USB-OTG 어댑터 + USB-HID 바코드 스캐너 호환 — `lib/scanner.ts` 동작 정합 (모바일 가상 키보드와 충돌 없음)"
    test: "test/test_c11_mobile_responsive.py::test_scanner_virtual_keyboard_no_conflict"
  - id: AC-MOB-3
    description: "터치 영역 ≥ 44×44 pt (Apple HIG)"
    test: "test/test_c11_mobile_responsive.py::test_touch_target_min_size"
  - id: AC-MOB-4
    description: "5 디바이스 × 4 시나리오 = 20 테스트 PASS"
    test: "test/test_c11_mobile_responsive.py::test_device_scenario_matrix"
  - id: AC-MOB-5
    description: "데스크톱 회귀 0건 — breakpoint 격리 정책 (BPI-1~4) 정합"
    test: "test/test_c11_mobile_responsive.py::test_desktop_layout_unchanged"

decisions:
  - DEC-MOB-1   # breakpoint 격리 정책 동결 (BPI-1~4)
  - DEC-MOB-2   # 스캐너 가상키보드 충돌 케이스 (SC-1~3) 정합 회귀 가드
open_questions:
