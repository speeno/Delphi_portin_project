# Migration Contract: 출고택배관리 (Phase 2)
# 출처(레거시):
#   - legacy_delphi_source/legacy_source/Subu28.pas (TSobo28 출고택배관리)
# blocker: 택배사 외부 API 연동 합의 필요 (placeholder-t1-t2-index.md §1).

id: C2-delivery-dispatch
name: 출고택배관리 (송장번호 매핑 + 배송상태 동기)
version: 0.9.0
status: draft
scope_phase: phase2
created: 2026-04-21
updated: 2026-04-21
owner: 메인개발자

references:
  - analysis/screen_cards/Sobo28.md
  - migration/coverage/placeholder-t1-t2-index.md   # blocker 출처

constraints:
  new_sql_count: 0   # S1_Ssub 의 택배 관련 컬럼만 사용
  external_integrations: gated   # 택배사 API 는 BLK-DLV-1 해소 후 별도 contract 분리

blockers:
  - id: BLK-DLV-1
    description: "택배사 외부 API 연동 합의 필요 — CJ대한통운 / 한진 / 우체국 API 키 + 비용 정책. 본 phase2 는 송장번호 수동 입력 + 상태 매뉴얼 조회로 진행."
    owner: 비즈니스
    eta: 2026-Q3

intent: |
  운영자가 출고일자 + 택배사 단위로 출고 건을 조회하고,
  송장번호를 입력하여 택배사와 매핑.
  배송상태 자동 동기화는 BLK-DLV-1 해소 후 phase3 에서 외부 API 연동.

scope:
  list:
    path: GET /api/v1/delivery/dispatch
    legacy_id: Sobo28
    permission: delivery.dispatch.read
    query_params:
      ship_date: required ISO date
      carrier: optional enum[cj, hanjin, post, etc]
      status: optional enum[pending, mapped, in_transit, delivered, returned]
      page: { limit: 100, max_limit: 500 }
    response:
      items:
        - dispatch_id: string
          slip_no: string         # 출고전표 번호
          customer_name: string
          carrier: string
          tracking_no: string | null
          status: enum
          last_updated: ISO datetime | null
      total: int

  upsert_tracking:
    path: PUT /api/v1/delivery/dispatch/{dispatch_id}/tracking
    permission: delivery.dispatch.write
    request_body:
      tracking_no: required string
      carrier: required enum[cj, hanjin, post, etc]
    response:
      dispatch_id: string
      tracking_no: string
      status: "mapped"
      audit_id: string

  status_refresh:
    path: POST /api/v1/delivery/dispatch/{dispatch_id}/refresh
    permission: delivery.dispatch.read
    note: "BLK-DLV-1 해소 전: 매뉴얼 status 입력만 허용. 해소 후: 택배사 API 호출."
    request_body:
      status: optional enum    # phase2 매뉴얼 입력
    response:
      dispatch_id: string
      status: enum
      last_updated: ISO datetime

acceptance_criteria:
  - id: AC-DLV-1
    description: "list — ship_date 단일일자 출고 건 + carrier 필터 정합"
    test: "test/test_c2_delivery_dispatch.py::test_list_filters"
  - id: AC-DLV-2
    description: "upsert_tracking — tracking_no 중복(다른 dispatch 와 같은 번호) 시 409 CONFLICT"
    test: "test/test_c2_delivery_dispatch.py::test_tracking_duplicate_rejected"
  - id: AC-DLV-3
    description: "audit_delivery 에 tracking_no upsert 이벤트 기록 (before/after)"
    test: "test/test_c2_delivery_dispatch.py::test_audit_emit"
  - id: AC-DLV-4
    description: "권한 가드 — delivery.dispatch.write 미보유 시 403"
    test: "test/test_c2_delivery_dispatch.py::test_permission_guard"
  - id: AC-DLV-5   # blocker 해소 후
    description: "BLK-DLV-1 해소 후 — status_refresh 가 택배사 API 정상 응답 시 status 자동 갱신"
    test: "test/test_c2_delivery_dispatch.py::test_status_refresh_external_api"
    pending_blocker: BLK-DLV-1

decisions:
  - DEC-040
  - DEC-041
  - DEC-044   # 외부 API 는 phase3 까지 보류
  - DEC-046
