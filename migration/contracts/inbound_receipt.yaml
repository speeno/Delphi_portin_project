# Migration Contract: 입고 접수(입고명세서 입력) (C3)
# 본 계약은 레거시 델파이 동작을 웹(API+UI)에서 동등하게 재현하기 위한 1차 계약입니다.
# 출처(레거시):
#   - legacy_delphi_source/legacy_source/Subu22.pas (TSobo22)
#       FormShow / Button101Click(조회) / nSqry.Append+Post (라인 INSERT) /
#       L243 UPDATE S1_Ssub SET Time4=now() / L760·L778·L828·L846 Max(Idnum) 채번 /
#       L1216 UPDATE S1_Memo / L1259 INSERT INTO S1_Memo
#   - legacy_delphi_source/legacy_source/Subu54.pas (TSobo54 일별 입고내역서)
#   - legacy_delphi_source/legacy_source/Subu57.pas (TSobo57 기간별 입고내역서)
#   - legacy_delphi_source/legacy_source/Subu38.pas (TSobo38 전송자료받기 — 1차 사용자 파일 업로드 우회)
# 사용 폼: Sobo22 (TSobo22, Subu22.dfm, 변형 Sobo22_1/_2 는 customer_variants 만)
# 핵심 테이블: S1_Ssub (출고와 동일 테이블, Gubun 컬럼으로 입고 식별)
# 보조 테이블: S1_Memo (UPSERT — Subu22.pas L1216/1259), G4_Book/G2_Ggwo/G6_Ggeo/G1_Ggeo/G7_Ggeo (자동완성 LOOKUP), H2_Gbun (지점/지사명)
# 1차 미접근: S4_Ssub (가입고 — DEC-027 후속), 진짜 FTP 자동수신 (OQ-IN-1)
# 관련 OQ: OQ-IN-1 (FTP 자동수신 후속 인프라 합의)
# 관련 DEC: DEC-027 (1차 INSERT/UPDATE ON + 소프트 취소 + FTP 우회), DEC-028 (dfm 레이아웃 영구 입력),
#           DEC-024 (aiomysql EUC-KR 디코딩), DEC-012 (소프트 취소 패턴 — C2 재사용)
# 참조 산출물: analysis/layout_mappings/Sobo22.md / Sobo38.md / Sobo54.md / Sobo57.md (DEC-028 1:1 매핑표)

id: C3-inbound-receipt
name: 입고 접수(입고명세서 입력)
version: 1.0.0
status: approved        # draft → review → approved (1차 동결, DEC-027)
scope_phase: phase1
acceptance_goal: |
  1차 포팅 합격선: "기존 사용자가 입고 명세서를 신규 등록 / 수정 / 취소 / 조회 (CRUD) 할 수 있고,
  EUC-KR CSV/TXT 파일 업로드로 외부 입고 데이터를 일괄 적재할 수 있다."
  진짜 FTP 자동수신(OQ-IN-1) / 인쇄·바코드 결합(DEC-004) / 권한키 분기(DEC-009 패턴) 는 모두 후속.
owners:
  business: 메인개발자
  legacy: 델파이 담당자
  web: 웹 포팅 팀
links:
  candidate: docs/core-scenarios-candidates.md#1-후보요약
  test_pack: test/test_c3_inbound_phase1.py
  source_legacy:
    - legacy_delphi_source/legacy_source/Subu22.pas
    - legacy_delphi_source/legacy_source/Subu22.dfm
    - legacy_delphi_source/legacy_source/Subu38.pas
    - legacy_delphi_source/legacy_source/Subu54.pas
    - legacy_delphi_source/legacy_source/Subu57.pas
  source_analysis:
    - analysis/screen_cards/Sobo22.md
    - analysis/screen_cards/Sobo38.md
    - analysis/screen_cards/Sobo54.md
    - analysis/screen_cards/Sobo57.md
  layout_mappings:        # DEC-028 — 신규 화면 작성의 공식 입력
    - analysis/layout_mappings/Sobo22.md
    - analysis/layout_mappings/Sobo38.md
    - analysis/layout_mappings/Sobo54.md
    - analysis/layout_mappings/Sobo57.md
  dfm_html_artifacts:
    - tools/delphi_porting_accelerator/examples/generated/legacy_source_root/Subu22/Sobo22.html
    - tools/delphi_porting_accelerator/examples/generated/legacy_source_root/Subu22_1/Sobo22_1.html
    - tools/delphi_porting_accelerator/examples/generated/legacy_source_root/Subu22_2/Sobo22_2.html
    - tools/delphi_porting_accelerator/examples/generated/legacy_source_root/Subu54/Sobo54.html
    - tools/delphi_porting_accelerator/examples/generated/legacy_source_root/Subu57/Sobo57.html
  related_open_questions:
    - OQ-IN-1   # FTP 자동수신 후속 인프라 합의

# ---------------------------------------------------------------
# 1. 비즈니스 의도
# ---------------------------------------------------------------
intent: |
  입고 명세서 1건 (출판사·일자·전표 단위로 라인 N개) 을 등록·수정·취소·조회한다.
  레거시 TSobo22 의 그리드 (nSqry) + 데이터셋 자동 INSERT/UPDATE 패턴을, 웹에서는 명시적 트랜잭션
  (BEGIN→N×INSERT→COMMIT) 으로 재현하여 라인 일부 실패 시 전체 롤백을 보장한다.
  메모(S1_Memo) 는 헤더 단위로 UPSERT (Subu22.pas L1216/1259 패턴 — 존재 시 UPDATE, 없으면 INSERT).
  외부 입고 데이터는 1차에서 사용자가 EUC-KR CSV/TXT 를 업로드하여 동일한 INSERT 트랜잭션으로 적재한다.

# ---------------------------------------------------------------
# 2. 입력 (UI/API 공용)
# ---------------------------------------------------------------
inputs:
  receipt_header:
    - name: gdate
      type: string         # 'YYYY-MM-DD' (저장 시 'YYYY.MM.DD' 변환 — outbound 와 동일)
      required: true
      legacy_field: S1_Ssub.Gdate
      note: "Subu22 Edit101/DateEdit1. 기본값 = 오늘. _normalize_gdate 재사용."
    - name: hcode
      type: string         # 출판사 코드
      required: true
      legacy_field: S1_Ssub.Hcode
      note: "출판사 코드. Subu22 Edit103 (TabOrder 11). G7_Ggeo lookup."
    - name: gcode
      type: string         # 입고처 코드 (출고의 hcode 와 의미 다름 주의)
      required: true
      legacy_field: S1_Ssub.Gcode
      note: "입고처 코드. Subu22 Edit104 (TabOrder 13). G1_Ggeo lookup."
    - name: jubun
      type: string
      required: false      # 신규 시 서버 자동 채번 (Subu22.pas L760 Max(Idnum)+1 패턴 → 마이크로초 채번으로 동시성 회피, OUT 와 동일)
      legacy_field: S1_Ssub.Jubun
      note: "전표 단위 코드. 1차 (Gdate,Hcode,Gcode) 당 1 jubun 가정 — OUT-3 와 동일."
    - name: gjisa
      type: string
      required: false
      legacy_field: S1_Ssub.Gjisa
      note: "지사 코드. 1차에서는 메타로만."
    - name: gubun
      type: string
      required: false
      default: '입고'      # 1차 고정 — S1_Ssub 가 출고와 공유 테이블이므로 Gubun 으로 식별
      legacy_field: S1_Ssub.Gubun
    - name: ocode
      type: string
      required: false
      default: 'B'         # 지사 입고 1차 고정
      legacy_field: S1_Ssub.Ocode
    - name: scode
      type: string
      required: false
      default: 'X'
      legacy_field: S1_Ssub.Scode
  receipt_memo:
    - name: gbigo
      type: string
      required: false
      legacy_field: S1_Memo.Gbigo
      note: "헤더 메모 (Subu22.pas L1216 UPDATE / L1259 INSERT 의 UPSERT 대상)."
    - name: sbigo
      type: string
      required: false
      legacy_field: S1_Memo.Sbigo
    - name: gtel1
      type: string
      required: false
      legacy_field: S1_Memo.Gtel1
    - name: gtel2
      type: string
      required: false
      legacy_field: S1_Memo.Gtel2
    - name: gname
      type: string
      required: false
      legacy_field: S1_Memo.Gname
    - name: gpost
      type: string
      required: false
      legacy_field: S1_Memo.Gpost
  receipt_lines:
    - name: lines[]
      required: true
      min_items: 1
      schema:
        - name: pubun
          type: string
          required: false
          legacy_field: S1_Ssub.Pubun
          note: "구분 (DBGrid101 컬럼 1). G1_Gbun lookup."
        - name: bcode
          type: string
          required: true
          legacy_field: S1_Ssub.Bcode
          note: "도서 코드 (DBGrid101 컬럼 2). G4_Book lookup."
        - name: gsqut
          type: integer
          required: true
          legacy_field: S1_Ssub.Gsqut
          note: "수량 (DBGrid101 컬럼 4, 합계 대상)."
        - name: gdang
          type: integer
          required: false
          legacy_field: S1_Ssub.Gdang
          note: "단가 (DBGrid101 컬럼 5). 미제공 시 G4_Book.Gdang 사용."
        - name: grat1
          type: number
          required: false
          legacy_field: S1_Ssub.Grat1
          note: "비율 (DBGrid101 컬럼 6). 미제공 시 G4_Book.Grat1~6 lookup (Subu22.pas L1017)."
        - name: gssum
          type: integer
          required: false
          default: 0
          legacy_field: S1_Ssub.Gssum
          note: "금액 (DBGrid101 컬럼 7, 합계 대상). 미제공 시 gsqut*gdang*grat1 자동 계산."
        - name: gbigo
          type: string
          required: false
          legacy_field: S1_Ssub.Gbigo
          note: "라인 비고 (DBGrid101 컬럼 8)."
        - name: yesno
          type: string
          required: false
          default: '0'
          legacy_field: S1_Ssub.Yesno
          note: "배송 상태 (DBGrid101 컬럼 9). '0'=미처리, '2'=취소 (DEC-012 소프트)."

# ---------------------------------------------------------------
# 3. 출력
# ---------------------------------------------------------------
outputs:
  success:
    - name: receipt_key
      type: object
      schema:
        gdate: string
        hcode: string
        gcode: string
        jubun: string
      use: "조회/수정/취소 시 식별자. URL path 에서 '{gdate}|{hcode}|{gcode}|{jubun}' 직렬화."
    - name: lines
      type: integer
      use: "본 입고의 라인 row 수."
    - name: qty
      type: integer
      use: "SUM(Gsqut)."
    - name: amount
      type: integer
      use: "SUM(Gssum)."
    - name: status
      type: string
      enum: [active, cancelled]
      use: "Yesno 기반 — '2' 가 모든 라인이면 cancelled, 아니면 active. (C2 와 동일 매핑)."
  failure_codes:
    - code: IN_VALIDATION
      condition: "필수 필드 누락 / 타입 불일치"
      http_status: 422
    - code: IN_NOT_FOUND
      condition: "지정한 합성키의 row 가 없음"
      http_status: 404
    - code: IN_DUPLICATE
      condition: "신규 등록 시 이미 같은 합성키 존재"
      http_status: 409
      phase1_policy: "1차는 jubun 자동 채번 (마이크로초) 으로 충돌 거의 없음."
    - code: IN_TX_FAILED
      condition: "라인 INSERT/UPDATE/DELETE 트랜잭션 도중 SQL 오류 → 전체 롤백"
      http_status: 500
    - code: IN_IMPORT_DECODE
      condition: "업로드 파일 EUC-KR 디코딩 실패 (DEC-024 _normalize_aiomysql_row 정책 동일 적용)"
      http_status: 400
    - code: IN_PERIOD_LOCKED
      condition: "마감(close) 된 기간으로 신규/수정 시도"
      http_status: 423
      phase1_policy: "1차는 application_settings.inbound.close_until 단일 키 — 미설정 시 항상 허용."

# ---------------------------------------------------------------
# 4. 데이터 액세스 (레거시 SQL ↔ 웹 SQL)
# ---------------------------------------------------------------
data_access:
  - id: SQL-IN-1-LIST
    legacy:
      file: legacy_delphi_source/legacy_source/Subu22.pas
      line: 398    # L398 Sqlen := 'Select * From S1_Ssub Where '+D_Select+ ...
      sql: |
        Select * From S1_Ssub Where <D_Select>
              Gdate >= '<from>' and Gdate <= '<to>' and Gubun='입고'
              and Ocode='B' and Scode='X' [and Hcode='<hc>'] [and Gcode='<gc>']
        Order By Gdate, Hcode, Gcode, Jubun
    notes:
      - "조회 화면(Button101 조회). 1차 web 변환은 GROUP BY (Gdate,Hcode,Gcode,Jubun) 합성키로 단순화."
      - "C2 outbound 의 SQL-OUT-4 패턴과 정합 — 동일 테이블, Gubun 만 '입고'."
    web:
      method: SELECT
      table: S1_Ssub
      columns: [Gdate, Hcode, Gcode, Jubun, "COUNT(*) AS lines", "SUM(Gsqut) AS qty", "SUM(Gssum) AS amount", "MAX(Yesno) AS yesno"]
      where:
        - "Gdate >= :date_from"
        - "Gdate <= :date_to"
        - "Gubun = '입고'"
        - "Ocode = 'B'"
        - "Scode = 'X'"
        - "[Hcode = :hcode]"
        - "[Gcode = :gcode]"
      group_by: ["Gdate", "Hcode", "Gcode", "Jubun"]
      order_by: ["Gdate DESC", "Hcode", "Gcode"]
      limit: parameterized
      bind: parameterized
    in_scope_phase1: true

  - id: SQL-IN-2-INSERT-LINE
    legacy:
      file: legacy_delphi_source/legacy_source/Subu22.pas
      line: 476    # L476 nSqry.Append (TQuery 데이터셋 자동 INSERT — 정적 SQL 미캡처)
      related_lines:
        - 760     # Max(Idnum) 채번 패턴 (Subu22.pas)
        - 778
        - 828
        - 846
      sql: |
        # 데이터셋 자동 생성 SQL (정적 분석 미캡처). 웹에서 명시적 SQL 로 재작성:
        # INSERT INTO S1_Ssub
        #   (Gdate, Hcode, Gcode, Jubun, Gjisa, Pubun, Bcode, Gubun, Ocode, Scode,
        #    Yesno, Gsqut, Gdang, Grat1, Gssum, Gbigo, Idnum, Time3)
        # VALUES (%s, %s, %s, %s, %s, %s, %s, %s, %s, %s,
        #         '0', %s, %s, %s, %s, %s, %s, NOW())
    notes:
      - "Yesno 초기값 = '0' (미처리). DEC-027 1차 cancel flag 만 사용."
      - "Time3 = NOW() (Subu22 L243 UPDATE 의 Time4=now() 와 동일 패턴; 입고는 Time3/4 둘 다 사용 가능 — 1차는 Time3 만)."
      - "Idnum = Max(Idnum)+1 합성키 (Subu22.pas L760 패턴). 동시성은 마이크로초 jubun 채번으로 1차 회피."
      - "라인 N개를 단일 트랜잭션으로 (BEGIN→INSERT×N→COMMIT). C2 outbound 의 execute_in_transaction 재사용."
    web:
      method: INSERT
      table: S1_Ssub
      bind: parameterized
      transaction: required
    in_scope_phase1: true

  - id: SQL-IN-3-UPDATE-LINE
    legacy:
      file: legacy_delphi_source/legacy_source/Subu22.pas
      line: 243    # UPDATE S1_Ssub SET Time4=now() (라인 메타 변경 + 타임스탬프)
      sql: |
        # UPDATE S1_Ssub SET Pubun=%s, Gsqut=%s, Gdang=%s, Grat1=%s, Gssum=%s,
        #                    Gbigo=%s, Time3=NOW(), Time4=NOW()
        #  WHERE Gdate=%s AND Hcode=%s AND Gcode=%s AND Jubun=%s AND Bcode=%s
    notes:
      - "수정 시 (Gdate,Hcode,Gcode,Jubun,Bcode) 합성키. 출고와 컬럼이 1개 더 (Gcode) — 입고는 입고처 단위 분리."
      - "수량/단가/비율/금액/구분/비고 모두 1차 변경 가능. Yesno (cancel) 는 SQL-IN-5 로 분리."
    web:
      method: UPDATE
      table: S1_Ssub
      bind: parameterized
      transaction: required
    in_scope_phase1: true

  - id: SQL-IN-4-DELETE-LINE
    legacy:
      file: legacy_delphi_source/legacy_source/Subu22.pas
      line: 1137   # nSqry.Append; DBGrid101.SelectedIndex:=0 (그리드 라인 삭제 — ADO 자동)
      sql: |
        # DELETE FROM S1_Ssub
        #  WHERE Gdate=%s AND Hcode=%s AND Gcode=%s AND Jubun=%s AND Bcode=%s
    notes:
      - "1차 in_scope: 수정 흐름 안에서의 라인 삭제 (PUT diff). 헤더 전체 물리 삭제는 미제공 (DEC-027 소프트만)."
    web:
      method: DELETE
      table: S1_Ssub
      bind: parameterized
      transaction: required
    in_scope_phase1: true

  - id: SQL-IN-5-CANCEL
    legacy:
      file: legacy_delphi_source/legacy_source/Subu22.pas
      line: 243    # 동일 UPDATE 패턴 (소프트 취소는 Yesno='2' 로 일괄 변경)
      sql: |
        UPDATE S1_Ssub SET Yesno='2', Time3=NOW(), Time4=NOW()
         WHERE Gdate=:gdate AND Hcode=:hcode AND Gcode=:gcode AND Jubun=:jubun
    notes:
      - "C2 outbound SQL-OUT-5 와 동일 패턴 (DEC-012 재사용)."
      - "1차 단순화: 처리상태 제한(@Yesoo='1') 제거 — 어떤 상태든 cancel 가능."
      - "WHERE 키 (Gdate, Hcode, Gcode, Jubun) — 한 입고 헤더의 모든 라인 일괄 취소."
    web:
      method: UPDATE
      table: S1_Ssub
      set:
        - "Yesno = '2'"
        - "Time3 = NOW()"
        - "Time4 = NOW()"
      where:
        - "Gdate = :gdate"
        - "Hcode = :hcode"
        - "Gcode = :gcode"
        - "Jubun = :jubun"
      bind: parameterized
    in_scope_phase1: true

  - id: SQL-IN-6-IMPORT-FILE
    legacy:
      file: legacy_delphi_source/legacy_source/Subu38.pas
      line: 1      # 동적 FTP 수신 — 정적 분석 캡처 없음. DEC-027 사용자 업로드 우회.
      sql: |
        # 사용자 업로드 (multipart/form-data) → 서버 EUC-KR 디코딩 → 라인 N개 INSERT 트랜잭션
        # SQL-IN-2 와 동일 INSERT 를 N×N 회 수행 (헤더 그룹별 트랜잭션).
    notes:
      - "DEC-027: 1차 FTP 자동수신 미구현. 동일 파일 포맷을 사용자가 업로드."
      - "DEC-024: aiomysql 풀과 동일 EUC-KR errors='replace' 정책 적용."
      - "부분 성공 허용: 라인 단위 에러 응답 (라인번호·필드·사유)."
    web:
      method: INSERT
      table: S1_Ssub
      bind: parameterized
      transaction: required
    in_scope_phase1: true

  - id: SQL-IN-7-MEMO-UPSERT
    legacy:
      file: legacy_delphi_source/legacy_source/Subu22.pas
      line: 1259   # INSERT INTO S1_Memo (L1216 UPDATE 와 한 쌍 — UPSERT 패턴)
      related_lines:
        - 560     # SELECT Gbigo,Sbigo,Gtel1,Gtel2,Gname,Gpost From S1_Memo
        - 1197    # SELECT Gbigo From S1_Memo Where ... (존재 확인)
        - 1216    # UPDATE S1_Memo SET Gbigo=...
      sql: |
        # 패턴: SELECT 1 From S1_Memo Where (gdate,hcode,gcode,jubun) → 존재면 UPDATE, 없으면 INSERT.
        # 웹 1차는 동일 트랜잭션 안에서 SELECT → UPDATE/INSERT 분기.
        UPDATE S1_Memo SET Gbigo=%s, Sbigo=%s, Gtel1=%s, Gtel2=%s, Gname=%s, Gpost=%s
         WHERE Gdate=%s AND Hcode=%s AND Gcode=%s AND Jubun=%s;
        # rows=0 이면 ↓
        INSERT INTO S1_Memo (Gdate, Hcode, Gcode, Jubun, Gbigo, Sbigo, Gtel1, Gtel2, Gname, Gpost)
        VALUES (%s, %s, %s, %s, %s, %s, %s, %s, %s, %s);
    notes:
      - "1차 web 단순화: 단일 트랜잭션 SELECT→분기. MySQL ON DUPLICATE KEY 는 S1_Memo PK 확인 후 후속 단계."
      - "헤더 단위 1행만 (라인 메모는 S1_Ssub.Gbigo 컬럼)."
    web:
      method: UPSERT
      table: S1_Memo
      bind: parameterized
      transaction: required
    in_scope_phase1: true

  - id: SQL-IN-8-DETAIL
    legacy:
      file: legacy_delphi_source/legacy_source/Subu22.pas
      line: 398
      sql: |
        Select * From S1_Ssub Where <D_Select>
              Gdate=:gdate AND Hcode=:hcode AND Gcode=:gcode AND Jubun=:jubun
        Order By Bcode
    notes:
      - "라인 묶음 상세 조회. ORDER BY Bcode (Subu22 자동 정렬)."
    web:
      method: SELECT
      table: S1_Ssub
      columns: ["*"]
      where:
        - "Gdate = :gdate"
        - "Hcode = :hcode"
        - "Gcode = :gcode"
        - "Jubun = :jubun"
      order_by: ["Bcode"]
      bind: parameterized
    in_scope_phase1: true

  - id: SQL-IN-9-LOOKUP-PRODUCT
    legacy:
      file: legacy_delphi_source/legacy_source/Subu22.pas
      line: 507    # Select Grat1~6,Gname,Gjeja,Gdang,Scode From G4_Book
      sql: |
        Select Gcode AS bcode, Gname, Gjeja, Gdang, Grat1, Grat2, Grat3, Grat4, Grat5, Grat6, Scode
          From G4_Book
         Where Gcode = :bcode
    notes:
      - "도서 자동완성 + 단가/비율 자동 채움. 입고 신규 시 단가 미제공이면 G4_Book.Gdang 사용."
      - "C9 masters_service.search_products 재사용 (신규 헬퍼 금지 — 사용자 룰)."
    web:
      method: SELECT
      table: G4_Book
      bind: parameterized
    in_scope_phase1: true

  - id: SQL-IN-10-DAILY-REPORT
    legacy:
      file: legacy_delphi_source/legacy_source/Subu54.pas
      line: 1      # TSobo54 DBGrid101/201 (영역 매핑은 layout_mappings/Sobo54.md)
      sql: |
        # DBGrid101 (출판사 단위)
        Select Gdate, Hcode, Hname, Gcode, Gname, Idnum, Pubun, Bcode, Bname,
               SUM(Gsqut) AS gsqut, AVG(Gdang) AS gdang
          From S1_Ssub LEFT JOIN G7_Ggeo ON S1_Ssub.Hcode = G7_Ggeo.Gcode
                       LEFT JOIN G1_Ggeo ON S1_Ssub.Gcode = G1_Ggeo.Gcode
                       LEFT JOIN G4_Book ON S1_Ssub.Bcode = G4_Book.Gcode
         Where Gdate=:gdate AND Gubun='입고' AND Yesno IN ('0','1')
        Group By Hcode, Bcode
        Order By Hcode, Bcode

        # DBGrid201 (입고처 단위)
        Select Gcode, Gname, Idnum, Pubun, Bcode, Bname,
               SUM(Gsqut) AS gsqut, AVG(Gdang) AS gdang, AVG(Grat1) AS grat1, SUM(Gssum) AS gssum
          From S1_Ssub LEFT JOIN G1_Ggeo ON ... LEFT JOIN G4_Book ON ...
         Where Gdate=:gdate AND Gubun='입고' AND Yesno IN ('0','1')
        Group By Gcode, Bcode
        Order By Gcode, Bcode
    notes:
      - "Yesno IN ('0','1') 로 active 만 — cancelled('2') 제외."
      - "라벨/컬럼은 layout_mappings/Sobo54.md DBGrid101/201 표 그대로 보존."
    web:
      method: SELECT
      table: S1_Ssub
      bind: parameterized
    in_scope_phase1: true

  - id: SQL-IN-11-PERIOD-REPORT
    legacy:
      file: legacy_delphi_source/legacy_source/Subu57.pas
      line: 1
      sql: |
        # Sobo57 — 동일 패턴이지만 BETWEEN :date_from AND :date_to
        # DBGrid101 (출판사 단위), DBGrid201 (입고처 단위) 컬럼은 layout_mappings/Sobo57.md
    notes:
      - "Sobo54 일별 SQL 의 Where 절을 BETWEEN 로 대체. 컬럼은 layout_mappings/Sobo57.md 그대로."
    web:
      method: SELECT
      table: S1_Ssub
      bind: parameterized
    in_scope_phase1: true

# ---------------------------------------------------------------
# 5. 엔드포인트 (웹)
# ---------------------------------------------------------------
endpoints:
  - method: GET
    path: /api/v1/inbound/receipts
    description: "입고 명세서 목록 조회 (날짜 범위 + 출판사/입고처 필터)."
    auth: bearer
    request:
      query:
        server_id: string
        date_from: string   # 'YYYY-MM-DD'
        date_to: string
        hcode?: string
        gcode?: string
        include_cancelled?: boolean    # 기본 false
        limit?: integer    # 기본 100, 최대 500
        offset?: integer
    responses:
      "200":
        body:
          items:
            - receipt_key: { gdate: string, hcode: string, gcode: string, jubun: string }
              publisher_name: string
              vendor_name: string
              lines: integer
              qty: integer
              amount: integer
              status: "active|cancelled"
          page:
            limit: integer
            offset: integer
            total: integer
            has_more: boolean
      "401": { body: { detail: "Invalid or expired token" } }

  - method: GET
    path: /api/v1/inbound/receipts/{receipt_key}
    description: "입고 명세서 상세 (한 합성키의 라인 N개 + 메모 + 마스터 채움)."
    auth: bearer
    request:
      path:
        receipt_key: string   # '{gdate}|{hcode}|{gcode}|{jubun}'
    responses:
      "200":
        body:
          receipt_key: { gdate: string, hcode: string, gcode: string, jubun: string }
          publisher: { hcode: string, hname: string }
          vendor: { gcode: string, gname: string }
          memo:
            gbigo?: string
            sbigo?: string
            gtel1?: string
            gtel2?: string
            gname?: string
            gpost?: string
          status: "active|cancelled"
          lines:
            - bcode: string
              bname: string
              pubun: string
              gsqut: integer
              gdang: integer
              grat1: number
              gssum: integer
              gbigo: string
              yesno: string
      "404": { body: { detail: "Receipt not found", code: "IN_NOT_FOUND" } }

  - method: POST
    path: /api/v1/inbound/receipts
    description: "입고 명세서 신규 등록 (헤더 + 메모 + 라인 N개 단일 트랜잭션)."
    auth: bearer
    request:
      content_type: application/json
      schema:
        server_id: string
        receipt_header:
          gdate: "string (required)"
          hcode: "string (required)"
          gcode: "string (required)"
          jubun: "string (optional, server-generated if omitted)"
          gjisa: "string (optional)"
          gubun: "string (optional, default '입고')"
          ocode: "string (optional, default 'B')"
          scode: "string (optional, default 'X')"
        receipt_memo: "object (optional) — { gbigo, sbigo, gtel1, gtel2, gname, gpost }"
        receipt_lines:
          - bcode: "string (required)"
            pubun: "string (optional)"
            gsqut: "integer (required)"
            gdang: "integer (optional)"
            grat1: "number (optional)"
            gssum: "integer (optional, default 0)"
            gbigo: "string (optional)"
    responses:
      "201":
        body:
          receipt_key: { gdate, hcode, gcode, jubun }
          lines: integer
          qty: integer
          amount: integer
          created_at: string
      "409": { body: { detail: "Duplicate receipt key", code: "IN_DUPLICATE" } }
      "422": { body: { detail: "Validation failed", code: "IN_VALIDATION", errors: object } }
      "423": { body: { detail: "Period locked", code: "IN_PERIOD_LOCKED" } }
      "500": { body: { detail: "Transaction failed (rolled back)", code: "IN_TX_FAILED" } }

  - method: PUT
    path: /api/v1/inbound/receipts/{receipt_key}
    description: "입고 수정 (라인 diff: 추가/수정/삭제 + 메모 UPSERT)."
    auth: bearer
    request:
      content_type: application/json
      schema:
        receipt_memo: "object (optional) — { gbigo, sbigo, gtel1, gtel2, gname, gpost }"
        receipt_lines:
          - bcode: "string (required)"
            pubun: "string (optional)"
            gsqut: "integer (required)"
            gdang: "integer (optional)"
            grat1: "number (optional)"
            gssum: "integer (optional, default 0)"
            gbigo: "string (optional)"
    responses:
      "200":
        body:
          receipt_key:
            gdate: string
            hcode: string
            gcode: string
            jubun: string
          lines: integer
          qty: integer
          amount: integer
          updated_at: string
          diff:
            inserted: integer
            updated: integer
            deleted: integer
      "404": { body: { detail: "Receipt not found", code: "IN_NOT_FOUND" } }
      "423": { body: { detail: "Period locked", code: "IN_PERIOD_LOCKED" } }

  - method: PATCH
    path: /api/v1/inbound/receipts/{receipt_key}/cancel
    description: "입고 취소 (모든 라인 Yesno='2' UPDATE — 소프트 삭제). DEC-027."
    auth: bearer
    request:
      content_type: application/json
      schema:
        reason: "string (optional, audit-only)"
    responses:
      "200":
        body:
          receipt_key: { gdate, hcode, gcode, jubun }
          status: "cancelled"
          cancelled_at: string
      "404": { body: { detail: "Receipt not found", code: "IN_NOT_FOUND" } }
      "409": { body: { detail: "Already cancelled", code: "IN_DUPLICATE" } }

  - method: POST
    path: /api/v1/inbound/import
    description: "외부 입고 데이터 EUC-KR CSV/TXT 업로드 (DEC-027 — FTP 자동수신 우회)."
    auth: bearer
    request:
      content_type: multipart/form-data
      schema:
        server_id: "string (required)"
        file: "binary (required) — EUC-KR/UTF-8 CSV/TXT, 1행=헤더, 2행~=라인"
        gubun: "string (optional, default '입고')"
        dry_run: "boolean (optional, default false) — true 면 검증만 수행, INSERT 없음"
    responses:
      "200":
        body:
          imported: integer
          receipts: integer        # 그룹된 헤더 수
          errors:
            - line: integer
              field: string
              detail: string
      "400": { body: { detail: "EUC-KR decode failed", code: "IN_IMPORT_DECODE" } }
      "423": { body: { detail: "Period locked", code: "IN_PERIOD_LOCKED" } }

  - method: GET
    path: /api/v1/inbound/reports/daily
    description: "일별 입고내역서 (Sobo54). DBGrid101 (출판사 단위) + DBGrid201 (입고처 단위) 두 그리드."
    auth: bearer
    request:
      query:
        server_id: string
        gdate: "string (required, 'YYYY-MM-DD')"
    responses:
      "200":
        body:
          by_publisher:    # DBGrid101 — layout_mappings/Sobo54.md §2
            - { gdate, hcode, hname, gcode, gname, idnum, pubun, bcode, bname, gsqut, gdang }
          by_vendor:       # DBGrid201 — layout_mappings/Sobo54.md §3
            - { gcode, gname, idnum, pubun, bcode, bname, gsqut, gdang, grat1, gssum }
          totals: { qty: integer, amount: integer }

  - method: GET
    path: /api/v1/inbound/reports/period
    description: "기간별 입고내역서 (Sobo57). 시작/종료 일자 BETWEEN."
    auth: bearer
    request:
      query:
        server_id: string
        date_from: "string (required, 'YYYY-MM-DD')"
        date_to: "string (required, 'YYYY-MM-DD')"
    responses:
      "200":
        body:
          by_publisher:    # DBGrid101 — layout_mappings/Sobo57.md §2
            - { hcode, hname, gdate, gcode, gname, idnum, pubun, bcode, bname, gsqut, gdang }
          by_vendor:       # DBGrid201 — layout_mappings/Sobo57.md §3
            - { gdate, gcode, gname, idnum, pubun, bcode, bname, gsqut, gdang, grat1, gssum }
          totals: { qty: integer, amount: integer }

# ---------------------------------------------------------------
# 6. 차이점·결정 사항
# ---------------------------------------------------------------
deltas:
  - id: D-IN-1
    title: 진짜 FTP 자동수신 (Subu38) — 1차 사용자 파일 업로드 우회
    in_scope_phase1: false
    decision_ref: DEC-027
    phase1_behavior: "1차는 사용자가 EUC-KR CSV/TXT 를 수동 업로드. POST /api/v1/inbound/import."
    legacy_behavior: "TSobo38 이 외부 FTP 서버에서 자동 수신."
    proposed_web_behavior: "(후속) FTP/SFTP 자격증명 합의 + 스케줄러 도입 (OQ-IN-1 closure)."
    risk: "1차 — 운영자 수동 작업 필요. 베타 운영 전 운영 매뉴얼에 명시."
    deferred_to: "후속 사이클 (OQ-IN-1)"

  - id: D-IN-2
    title: 인쇄 (Sobo54/57 출력) — C7 인쇄 시나리오로 이관
    in_scope_phase1: false
    decision_ref: DEC-004
    phase1_behavior: "1차는 화면 표시만. 출력 버튼 disabled (또는 브라우저 인쇄)."
    legacy_behavior: "Sobo54/57 의 인쇄 버튼 → QuickRpt."
    proposed_web_behavior: "(후속) C7 사이클에서 브라우저 인쇄 + PDF 하이브리드."

  - id: D-IN-3
    title: 헤더 전체 물리 삭제 — 미제공 (소프트 취소만)
    in_scope_phase1: false
    decision_ref: DEC-012
    phase1_behavior: "PATCH /cancel 만 제공. DELETE 메서드 미제공."
    legacy_behavior: "관리자가 mSqry.Delete 로 ADO 자동 DELETE 가능."
    proposed_web_behavior: "(후속) 참조 무결성 매트릭스 작성 후 별도 결정."

  - id: D-IN-4
    title: 권한키 분기 (F25/F52/F56/F29) — 일반 권한 관리에 통합
    in_scope_phase1: false
    decision_ref: DEC-009
    phase1_behavior: "1차 모든 인증 사용자에게 권한 동등."
    legacy_behavior: "TSobo22 의 등록·수정·삭제 권한이 권한키로 분기."
    proposed_web_behavior: "(후속) C10 권한 관리 RBAC 도입 시 매핑."

# ---------------------------------------------------------------
# 7. 동등성 기준 (5축)
# ---------------------------------------------------------------
equivalence:
  functional:
    - "동일 (gdate, hcode, gcode, lines[]) 입력에 대해 신규 등록 → 합성키(jubun) 발급 → 조회 가능."
    - "수정 시 라인 diff (추가/수정/삭제) + 메모 UPSERT 가 단일 트랜잭션."
    - "취소 후 GET 상세에서 status='cancelled'."
    - "EUC-KR CSV/TXT 업로드 → 동일 INSERT 트랜잭션으로 적재."
    - "1차: 권한키/바코드/인쇄/물리삭제 모두 미수행."
  data:
    - "S1_Ssub INSERT/UPDATE/DELETE 모두 명시적 SQL + 파라미터 바인딩."
    - "라인 N개 = 단일 트랜잭션. 1건 실패 시 전체 롤백."
    - "S1_Memo UPSERT (Subu22.pas L1216/1259 패턴)."
    - "Yesno enum: '0'/'1'/'2'. 1차 신규='0', 취소→'2'. (C2 와 동일)."
    - "EUC-KR 디코딩: aiomysql 풀과 동일 errors='replace' 정책 (DEC-024)."
    - "DEC-028: 모던 페이지의 모든 위젯에 data-legacy-id 부착 — layout_mappings 의 위젯 ID 와 1:1."
  ux:
    - "Subu22 의 3분할 레이아웃 (상단 검색 / 중단 그리드 / 하단 입력) 을 layout_mappings/Sobo22.md §1 그대로 모던 그리드로 재구성."
    - "DBGrid101 9 컬럼 (PUBUN/BCODE/BNAME/GSQUT/GDANG/GRAT1/GSSUM/GBIGO/YESNO) 컬럼명·정렬·합계 보존."
    - "Sobo54/57 의 DBGrid101+DBGrid201 두 그리드 동시 표시 (좌·우 분할)."
    - "도서/거래처 자동완성 (C9 masters_service 재사용)."
    - "탭순서 8→10→11→12→13→14→15 (Sobo22 Panel001) 키보드 네비게이션 보존."
  performance:
    - "라인 100건 신규 등록 < 1s (로컬 MySQL, 단일 트랜잭션)."
    - "목록 조회 p95 < 500 ms (limit=50)."
    - "리포트 1일 / 1주 < 1s (집계 쿼리 + 인덱스)."
  audit:
    - "신규/수정/취소/업로드 모두 audit.inbound 로거에 구조화 JSON 1줄 기록."
    - "필수 필드: timestamp / gcode (작업자) / receipt_key / action (created/updated/cancelled/imported) / result / client_ip."
    - "업로드 시 imported_count / errors_count / source_filename 추가 기록."

# ---------------------------------------------------------------
# 8. 비범위
# ---------------------------------------------------------------
out_of_scope:
  - "진짜 FTP 자동수신 (D-IN-1 / DEC-027) — 후속 OQ-IN-1 closure"
  - "인쇄 트리거 (D-IN-2 / DEC-004) — 후속 C7 인쇄"
  - "헤더 전체 물리 삭제 (D-IN-3 / DEC-012)"
  - "권한키 F25/F52/F56/F29 분기 (D-IN-4 / DEC-009) — 후속 C10"
  - "가입고 (S4_Ssub) 흐름 — Subu22.pas L409/L829/L866 — 후속 별도 시나리오"
  - "변형 폼 Sobo22_1 / Sobo22_2 의 customer_variants — 1차 본판만, 차이는 customer_variants 섹션에만 기록"
  - "본사 Ocode='A' 입고 — 1차는 지사 Ocode='B' 만"
  - "Sg_Csum 등 집계 테이블 동기화 (출고와 동일 후속 정책)"

