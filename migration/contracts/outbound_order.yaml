out_of_scope:
  # 1차 포팅 비범위 (DEC-009~012)
  - "권한키 F21/F22/F26 분기 (D-OUT-1 / DEC-009) — 후속 C10 권한 관리"
  - "바코드 입력 (D-OUT-2 / DEC-010) — 후속 C8 바코드"
  - "인쇄 트리거 (D-OUT-3 / DEC-011) — 후속 C7 인쇄"
  - "주문 전체 물리 삭제 (D-OUT-4 / DEC-012) — 참조 무결성 검토 후"
  # 본 계약 자체의 비범위
  - "Sg_Csum 집계 갱신 (OQ-OUT-2) — Sobo67 분석 사이클"
  - "변형 폼 Subu27_1 의 customer_variants — 1차 본판만"
