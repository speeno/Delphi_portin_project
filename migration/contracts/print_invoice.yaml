# Migration Contract: 인쇄 — 양식 5종 PDF 다운로드 (C7 Phase 1)
# 본 계약은 5종 양식 중 P1-C/D/E (출고 거래명세서/반품 영수증/거래명세서) 를 한 곳에서 정의합니다.
# P1-A (청구서) / P1-B (세금계산서) 는 settlement_billing.yaml v1.2.0 에 흡수 (단일 라우터 일관).
# P1-F (라벨) 은 print_label.yaml 별도 (사양·데이터 출처 상이).
#
# 출처(레거시):
#   - legacy_delphi_source/legacy_source/Subu27.pas (TSobo27 출고 — Print_FormCanvas Phase 후속, C2 자산 재사용)
#   - legacy_delphi_source/legacy_source/Subu23.pas (TSobo23 반품 — Phase 후속, C4 자산 재사용)
#   - legacy_delphi_source/legacy_source/Subu21.pas (TSobo21 거래명세 — Phase 후속, C6 자산 재사용)
#   - legacy_delphi_source/legacy_source/Tong04.pas L1~? (Print_* 141 procedure — DEC-039 .frf 참조용 카탈로그)
# 핵심 결정:
#   DEC-004 (하이브리드 인쇄), DEC-009 (인쇄는 후속 → 본 contract), DEC-017 (인쇄 트리거 → C7),
#   DEC-028 (dfm 산출물 영구 입력), DEC-037 (PDF 엔진 = WeasyPrint), DEC-039 (.frf 참조용)

id: C7-print-invoice
name: 인쇄 — 출고/반품/거래명세서 PDF (C7 Phase 1 + Phase 2-α)
version: 1.1.2
status: approved
scope_phase: c7_phase2_alpha
acceptance_goal: |
  C7 Phase 1 합격선:
  "기존 사용자가 (1) 출고 1건의 거래명세서를 PDF 로 다운로드할 수 있고,
   (2) 반품 1건의 영수증을 PDF 로 다운로드할 수 있으며,
   (3) 매출 1건의 거래명세서를 PDF 로 다운로드할 수 있다."
  모든 PDF 는 WeasyPrint 단일 엔진(DEC-037), A4 세로, 폰트 NanumGothic 번들, Content-Type: application/pdf.
  데이터는 100% 기존 detail SQL 재사용 — 신규 SQL 0 (SRP — 빌더는 출력 변환만).

owners:
  business: 메인개발자
  legacy: 델파이 담당자
  web: 웹 포팅 팀

links:
  candidate: docs/core-scenarios-candidates.md#c7-인쇄
  test_pack:
    - test/test_c7_print_phase1.py
  source_legacy:
    - legacy_delphi_source/legacy_source/Subu27.pas
    - legacy_delphi_source/legacy_source/Subu23.pas
    - legacy_delphi_source/legacy_source/Subu21.pas
    - legacy_delphi_source/legacy_source/Tong04.pas
  source_analysis:
    - analysis/print_specs/c7_phase1.md
    - analysis/handlers/c7_phase1.md
    - analysis/layout_mappings/Sobo27.md     # P1-C 매핑 §11 PDF 절
    - analysis/layout_mappings/Sobo23.md     # P1-D 매핑 §11 PDF 절
    - analysis/layout_mappings/Sobo21.md     # P1-E 매핑 §11 PDF 절

decisions:
  - DEC-004      # 하이브리드 인쇄
  - DEC-009      # 인쇄는 후속 → 본 contract 에서 종결
  - DEC-017      # 인쇄 트리거 → C7 (본 contract 에서 종결)
  - DEC-028      # dfm 산출물 영구 입력
  - DEC-037      # PDF 엔진 = WeasyPrint 단일
  - DEC-039      # .frf 참조용 카탈로그 (런타임 적재 0)

open_questions:
  - OQ-002       # 프린터 직결 (Phase 1 미해소 — 브라우저 다이얼로그 위임)

# ---------------------------------------------------------------
# 5. 엔드포인트
# ---------------------------------------------------------------
endpoints:
  - method: GET
    path: /api/v1/print/outbound-statement/{order_key}.pdf
    description: "P1-C 출고 거래명세서 PDF (C2 SQL-OUT-6 재사용)."
    auth: bearer
    in_scope_phase: c7_phase1
    request:
      path:
        order_key: "string '{gdate}|{gtran}' (기존 C2 키 규약)"
      query:
        server_id: string
        variant: "string (선택, 기본 'base'. 'base' | 'v0'..'v9' — Phase 2-α 거래처별 양식 분기, Report_4_51-{0~9}.frf 등가)"
    responses:
      "200":
        content_type: application/pdf
        headers:
          Content-Disposition: 'inline; filename="outbound_{order_key}.pdf"'
          Cache-Control: "private, no-store"
        body: "<binary PDF bytes>"
      "404": { body: { detail: "해당 출고 자료가 없습니다.", code: "PR_NOT_FOUND" } }
      "422": { body: { detail: "지원하지 않는 양식 변형입니다.", code: "PR_VARIANT_UNSUPPORTED" } }
      "503": { body: { detail: "PDF 엔진이 설치되지 않았습니다.", code: "PR_ENGINE_UNAVAILABLE" } }

  - method: GET
    path: /api/v1/print/return-receipt/{return_key}.pdf
    description: "P1-D 반품 영수증 PDF (C4 SQL-RT-3~5 재사용). yesno=2 행은 line-through 시각화 (DEC-012)."
    auth: bearer
    in_scope_phase: c7_phase1
    request:
      path:
        return_key: "string '{gdate}|{gtran}' (기존 C4 키 규약)"
      query:
        server_id: string
        variant: "string (선택, 기본 'base'. 'base' | 'v1' | 'v2' | 'v3' | 'v5' — Phase 2-α 거래처별 양식 분기, Report_2_13-{1,2,3,5}.frf. v4 결번)"
    responses:
      "200":
        content_type: application/pdf
        headers:
          Content-Disposition: 'inline; filename="return_{return_key}.pdf"'
          Cache-Control: "private, no-store"
        body: "<binary PDF bytes>"
      "404": { body: { detail: "해당 반품 자료가 없습니다.", code: "PR_NOT_FOUND" } }
      "422": { body: { detail: "지원하지 않는 양식 변형입니다.", code: "PR_VARIANT_UNSUPPORTED" } }
      "503": { body: { detail: "PDF 엔진이 설치되지 않았습니다.", code: "PR_ENGINE_UNAVAILABLE" } }

  - method: GET
    path: /api/v1/print/sales-statement/{order_key}.pdf
    description: "P1-E 거래명세서 PDF (C6 SQL-INQ-2~3 재사용). layout=legacy_triplicate 시 삼련 회원사 양식."
    auth: bearer
    in_scope_phase: c7_phase1
    request:
      path:
        order_key: "string '{gdate}|{hcode}|{jubun}|{gjisa}' (C6 키 규약)"
      query:
        server_id: string
        layout: "string (선택, 기본 default). default | legacy_triplicate (`print_sales_statement.yaml`)"
    responses:
      "200":
        content_type: application/pdf
        headers:
          Content-Disposition: 'inline; filename="sales_statement_{order_key}.pdf"'
          Cache-Control: "private, no-store"
        body: "<binary PDF bytes>"
      "404": { body: { detail: "해당 매출 자료가 없습니다.", code: "PR_NOT_FOUND" } }
      "422": { body: { detail: "지원하지 않는 인쇄 레이아웃입니다.", code: "PR_LAYOUT_UNSUPPORTED" } }
      "503": { body: { detail: "PDF 엔진이 설치되지 않았습니다.", code: "PR_ENGINE_UNAVAILABLE" } }

  - method: GET
    path: /api/v1/print/barcode.svg
    description: "다중 심볼 SVG 미리보기 — ``barcode_svg_service`` (code128|code39|ean13|ean8|upca|itf|isbn13|codabar|qr, DB 조회 없음)."
    auth: bearer
    in_scope_phase: c7_phase1
    request:
      query:
        server_id: string
        payload: "string 1..4096 — 심볼별 규칙은 prepare_barcode_payload"
        symbology: "string (optional, default code128) — list_supported_symbologies() 정규화"
        w: "number (optional, default 50, mm)"
        h: "number (optional, default 15, mm)"
    responses:
      "200":
        content_type: "image/svg+xml; charset=utf-8"
        body: "<SVG document>"
      "422":
        body:
          code: "PR_BARCODE_UNSUPPORTED"
          message: "바코드 SVG 생성 불가(페이로드 또는 엔진)."

# ---------------------------------------------------------------
# 6. 차이점·결정 사항
# ---------------------------------------------------------------
deltas:
  - id: D-PR-1
    title: PDF 엔진 단일화 (DEC-037)
    decision_ref: DEC-037
    legacy_behavior: "Subu27/23/21 + Tong04.Print_* 141 procedure 가 Delphi Canvas + FastReport 4 (.frf) 혼용."
    c7_behavior: "WeasyPrint 단일. 양식별 분기 0 — 빌더는 HTML 만, 엔진은 print_service.render_pdf 한 함수."
    risk: "WeasyPrint 시스템 의존성 (libpango/libcairo/libgdk-pixbuf) 미설치 시 503. Dockerfile 메모 + 회귀 1건으로 가시화."

  - id: D-PR-2
    title: 신규 SQL 금지 — 기존 detail SQL 재사용 (SRP)
    decision_ref: DEC-037
    c7_behavior: |
      P1-C: outbound_service.get_order_detail (SQL-OUT-6) → render_outbound_statement_html
      P1-D: returns_service.get_return_detail (SQL-RT-3~5) → render_return_receipt_html
      P1-E: transactions_service.get_sales_statement_detail (SQL-INQ-2~3) → render_sales_statement_html
      서비스 레이어에 분기 추가 0건. 빌더는 기존 dict 응답을 HTML 로 변환만.
    risk: "기존 detail 응답 schema 변경 시 빌더도 동시 갱신 필요 → 단위 테스트로 키 정적 검사 (test_c7_print_phase1.py)."

  - id: D-PR-3
    title: .frf 자산 = 참조용 카탈로그 (DEC-039)
    decision_ref: DEC-039
    legacy_behavior: "WeLove_FTP/book_21/AutoUpdateX/Report/Report_*.frf 98건 (FastReport VCL 4.x 바이너리)."
    c7_behavior: "런타임 적재 0. 디자인 정본은 .frf 그대로, HTML/CSS 는 매핑 노트(§PDF 절) + print_specs/c7_phase1.md 의 수동 재현. T9 카탈로그(analysis/print_specs/frf_catalog.md) 가 5종 ↔ .frf 파일명 1:1 표시."
    risk: ".frf 디자인 변경 시 모던 HTML/CSS 동시 갱신이 운영자 책임 → 카탈로그가 변경 알람 매개. T10 (FastReport OSS 파서 R&D) 으로 자동화 가능성 별도 추적."

  - id: D-PR-4
    title: 프린터 직결 미지원 (OQ-002 잔존)
    decision_ref: DEC-004
    c7_behavior: "PDF 다운로드 + 브라우저/시스템 인쇄 다이얼로그 위임. PrinterSetupDialog 의 모던 등가는 Phase 2 후속."
    risk: "라벨 프린터 사용자에게는 추가 클릭 1회. 메시지 c7.print.preview_only_native 로 가시화."

  - id: D-PR-5
    title: 거래처별 양식 변형 = 단일 빌더 + variant 인자 (Phase 2-α / DEC-019 패턴 재사용)
    decision_ref: DEC-028
    legacy_behavior: |
      Subu27 의 출고 거래명세 양식이 거래처별로 Report_4_51-{0~9}.frf 10 변형 존재 (Tong04.Print_Sobo27_N).
      Subu23 의 반품 영수증 양식이 거래처별로 Report_2_13-{1,2,3,5}.frf 4 변형 존재 (-4 결번 — 거래처 4 폐업/공유 추정).
      레거시는 호출자에서 변형 번호를 if/case 분기로 LoadFromFile 분기.
    c7_behavior: |
      모던 단일 빌더 render_outbound_statement_html(detail, *, variant: str = "base") /
      render_return_receipt_html(detail, *, variant: str = "base") 가 데이터 주도 분기.
      코드 분기 (if customer_id == ...) 금지 — 변형별 헤더 라벨/CSS 클래스 차이만.
      라우터 ?variant=base|v0..v9 / base|v1|v2|v3|v5 쿼리로 명시.
      미지원 variant → 422 PR_VARIANT_UNSUPPORTED. 미지정 또는 'base' → Phase 1 산출물과 byte-identical.
    risk: ".frf 정본 미열람 한계 → 변형별 시각 차이는 운영 SME 검토 후 customer_variants 갱신 필요. variant 자동 매핑 (거래처 → variant) 은 Phase 2-β 보류."

# ---------------------------------------------------------------
# 7. 동등성 기준 (5축)
# ---------------------------------------------------------------
equivalence:
  functional:
    - "P1-C/D/E 모두 호출 시 200 + Content-Type=application/pdf + `%PDF-` 시그니처."
    - "헤더 텍스트 (거래처명/일자/전표번호) 가 detail JSON 응답의 동일 필드와 1:1 (pypdf 텍스트 추출 검증)."
    - "빈 detail 응답이라도 200 + placeholder 본문 (test 'pdf_empty' 5케이스)."
    - "WeasyPrint 미설치 시 503 + 'c7.engine.unavailable'."
  data:
    - "신규 SQL 0건. 기존 list/detail 함수 그대로 호출."
    - "data-legacy-id ↔ 빌더 입력 키 1:1 (DEC-028 정적 검사)."
  ux:
    - "기존 미리보기 페이지 4처에 'PDF 다운로드' 버튼 (T6a)."
    - "신규 미리보기 페이지 3처 (P1-C/D/E) (T6b)."
    - "다운로드 시작 시 토스트 c7.print.downloading, 성공 시 c7.print.ready, 실패 시 c7.print.failed."
  performance:
    - "P1-C/D/E 단건 PDF p95 < 1.5s (라인 100건)."
    - "P1-A/B (settlement_billing.yaml 흡수) 단건 PDF p95 < 1s."
  audit:
    - "Phase 1 PDF 다운로드는 audit 미기록 (읽기 전용 — DEC-031 마감 가드 무관)."
    - "후속 사이클에서 'pdf_downloaded' action 추가 검토 (Phase 2)."

# ---------------------------------------------------------------
# 8. 비범위
# ---------------------------------------------------------------
out_of_scope:
  - "일괄 인쇄 (Tong04.Print_* 141 procedure 의 다중 호출 패턴) — C7 Phase 2"
  - "프린터 직결 (PrinterSetupDialog 모던 등가) — OQ-002 잔존"
  - ".frf 자동 변환 (런타임 .frf → HTML) — DEC-039 차단, T10 R&D"
  - "라벨 인쇄 — print_label.yaml 별도"
  - "청구서/세금계산서 PDF — settlement_billing.yaml v1.2.0 흡수"
  - "PDF 다운로드 audit 기록 — Phase 2"

