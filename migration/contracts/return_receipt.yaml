    - OQ-RT-6   # Subu25 INSERT 의 Time1=Time1 자기 참조 버그 검증

# ---------------------------------------------------------------
# 1. 비즈니스 의도
# ---------------------------------------------------------------
intent: |
  반품 명세서 1건 (거래처·일자·전표 단위로 라인 N개) 을 등록·수정·취소·조회한다.
  반품된 책의 운명을 3분기로 결정:
    1) 재생 (Sobo24): 정품 상태 양호 → 정품 재고 환원 (S1_Ssub Gubun='재생' INSERT, Sg_Csum 갱신)
    2) 해체 (Sobo25): 손상/판매불가 → 폐기 분류 (S1_Ssub Gubun='해체', Bdate 키)
    3) 변경 (Sobo51): 분류 재조정 → 비품재고 등 (Sv_Ghng 변경 이력 + Sg_Csum 동기 갱신)
  레거시 Base10.T2_Sub31/41/51, T5_Sub11 의 데이터셋 자동 SQL 을 명시적 트랜잭션 (BEGIN→N×INSERT→COMMIT) 으로 재현.
  메모(S1_Memo) 는 헤더 단위로 UPSERT (C6/C3 재사용 패턴).
  재고 변경 작업 (재생/해체/변경) 은 사전 패스워드 검증 (Sobo40 → /api/v1/audit/password-verify → token) 통과 필수 (DEC-029).
  임프린트 지점은 chul_08 변형의 "자료불러오기" 다이얼로그로 외부 데이터 임포트.

# ---------------------------------------------------------------
# 2. 입력 (UI/API 공용)
# ---------------------------------------------------------------
inputs:
  return_header:
    - name: gdate
      type: string         # 'YYYY-MM-DD' (저장 시 'YYYY.MM.DD' 변환 — outbound 와 동일)
      required: false      # 일반 반품/재생 시 필수, 해체 시 bdate 사용
      legacy_field: S1_Ssub.Gdate
      note: "Subu23 Edit101/DateEdit1. 기본값 = 오늘. _normalize_gdate 재사용 (C2/C3)."
    - name: bdate
      type: string         # 해체(Sobo25) 전용 — 반품 입고일
      required: false
      legacy_field: S1_Ssub.Bdate
      note: "Subu25 의 Bdate 키. 일반 반품/재생/변경 에서는 미사용. OQ-RT-2 검증 대상."
    - name: hcode
      type: string         # 거래처 코드
      required: true
      legacy_field: S1_Ssub.Hcode
      note: "거래처 코드. Subu23 Edit104 (TabOrder 13). G1_Ggeo lookup."
    - name: jubun
      type: string
      required: false      # 신규 시 서버 자동 채번 (Subu23.pas L758 Max(Idnum)+1 패턴 → 마이크로초 채번 — C2/C3 재사용)
      legacy_field: S1_Ssub.Jubun
      note: "전표 단위 코드. 1차 (Gdate/Bdate, Hcode) 당 1 jubun 가정."
    - name: gjisa
      type: string
      required: false
      legacy_field: S1_Ssub.Gjisa
      note: "지사 코드. 1차에서는 메타로만."
    - name: gubun
      type: string
      required: false
      default: '반품'      # 1차 반품 메인 — 재생/해체/변경 endpoint 는 자체 default
      enum: ['반품', '재생', '해체']     # 변경(Sobo51) 은 별도 endpoint
      legacy_field: S1_Ssub.Gubun
    - name: ocode
      type: string
      required: false
      default: 'B'         # 지사 1차 고정
      legacy_field: S1_Ssub.Ocode
    - name: scode
      type: string
      required: false
      default: 'X'         # 정상 (재생 후 '2', 해체 후 '3' 으로 분기 — Base01.pas L5267/L5410)
      legacy_field: S1_Ssub.Scode
  return_memo:
    - name: gbigo
      type: string
      required: false
      legacy_field: S1_Memo.Gbigo
      note: "헤더 메모 (Subu23.pas L1213 UPDATE / L1257 INSERT 의 UPSERT 대상)."
    - name: sbigo
      type: string
      required: false
      legacy_field: S1_Memo.Sbigo
    - name: gtel1
      type: string
      required: false
      legacy_field: S1_Memo.Gtel1
    - name: gtel2
      type: string
      required: false
      legacy_field: S1_Memo.Gtel2
    - name: gname
      type: string
      required: false
      legacy_field: S1_Memo.Gname
    - name: gpost
      type: string
      required: false
      legacy_field: S1_Memo.Gpost
  return_lines:
    - name: lines[]
      required: true
      min_items: 1
      schema:
        - name: pubun
          type: string
          required: false
          legacy_field: S1_Ssub.Pubun
          note: "구분 (Sobo23.DBGrid101 컬럼 1). G1_Gbun lookup."
        - name: bcode
          type: string
          required: true
          legacy_field: S1_Ssub.Bcode
          note: "도서 코드 (Sobo23.DBGrid101 컬럼 2). G4_Book lookup."
        - name: gsqut
          type: integer
          required: true
          legacy_field: S1_Ssub.Gsqut
          note: "수량 (Sobo23.DBGrid101 컬럼 4, 합계 대상)."
        - name: gdang
          type: integer
          required: false
          legacy_field: S1_Ssub.Gdang
          note: "단가 (Sobo23.DBGrid101 컬럼 5). 미제공 시 G4_Book.Gdang 사용."
        - name: grat1
          type: number
          required: false
          legacy_field: S1_Ssub.Grat1
          note: "할인율 (Sobo23.DBGrid101 컬럼 6). G1_Ggeo/G4_Book Grat1~6 lookup."
        - name: gssum
          type: integer
          required: false
          default: 0
          legacy_field: S1_Ssub.Gssum
          note: "금액 (Sobo23.DBGrid101 컬럼 7, 합계 대상). 미제공 시 gsqut*gdang*(1-grat1) 자동 계산."
        - name: gbigo
          type: string
          required: false
          legacy_field: S1_Ssub.Gbigo
          note: "라인 비고 (Sobo23.DBGrid101 컬럼 8). 해체(Sobo25) 시 사유 필수 (감사 로그)."
        - name: yesno
          type: string
          required: false
          default: '0'
          legacy_field: S1_Ssub.Yesno
          note: "상태 (Sobo23.DBGrid101 컬럼 9). '0'=미처리, '2'=취소 (DEC-012 소프트)."
  audit_password:
    - name: token
      type: string
      required: false      # 재생/해체/변경 endpoint 에서만 필수 (Authorization 헤더 또는 body)
      note: "Sobo40 검증 통과 시 발급된 5분 수명 HMAC-SHA256 토큰. /api/v1/audit/password-verify 응답."
  import_payload:
    - name: customer_kind
      type: string
      required: true
      enum: ['직거래', '서점', '온라인', '기타']
      note: "chul_08 자료불러오기 — 거래처 구분 (Subu23_1_chul08.Edit101 콤보)."
    - name: file
      type: binary
      required: true
      note: "외부 자료 파일 (CSV/엑셀 — OQ-RT-1 형식 확정 후 multipart). 1차 CSV EUC-KR 가정."

# ---------------------------------------------------------------
# 3. 출력
# ---------------------------------------------------------------
outputs:
  success:
    - name: return_key
      type: object
      schema:
        gdate: "string?"     # 일반 반품/재생/변경 시
        bdate: "string?"     # 해체 시
        hcode: string
        jubun: string
      use: "조회/수정/취소 시 식별자. URL path 에서 'G|{gdate}|{hcode}|{jubun}' (일반) 또는 'B|{bdate}|{hcode}|{jubun}' (해체) 직렬화."
    - name: lines
      type: integer
      use: "본 반품의 라인 row 수."
    - name: qty
      type: integer
      use: "SUM(Gsqut)."
    - name: amount
      type: integer
      use: "SUM(Gssum)."
    - name: status
      type: string
      enum: [active, cancelled, regenerated, disassembled, changed]
      use: "Yesno + Scode + Gubun 기반 — 'active'=정상, 'cancelled'=Yesno='2', 'regenerated'=재생 처리 완료, 'disassembled'=해체 처리 완료, 'changed'=변경 처리 완료."
  audit_token:
    - name: token
      type: string
      use: "패스워드 검증 통과 시 발급. Authorization: Bearer-Audit {token} 헤더로 다음 호출에 사용. 5분 수명."
    - name: expires_at
      type: string
      use: "ISO 8601 timestamp."
  failure_codes:
    - code: RT_VALIDATION
      condition: "필수 필드 누락 / 타입 불일치"
      http_status: 422
    - code: RT_NOT_FOUND
      condition: "지정한 합성키의 row 가 없음"
      http_status: 404
    - code: RT_DUPLICATE
      condition: "신규 등록 시 이미 같은 합성키 존재"
      http_status: 409
      phase1_policy: "1차는 jubun 자동 채번 (마이크로초) 으로 충돌 거의 없음."
    - code: RT_TX_FAILED
      condition: "라인 INSERT/UPDATE/DELETE 트랜잭션 도중 SQL 오류 → 전체 롤백"
      http_status: 500
    - code: RT_AUDIT_REQUIRED
      condition: "재생/해체/변경 endpoint 호출 시 audit token 누락 또는 만료"
      http_status: 401
    - code: RT_AUDIT_INVALID
      condition: "패스워드 검증 실패 (비밀번호 불일치)"
      http_status: 401
    - code: RT_AUDIT_LOCKED
      condition: "패스워드 검증 3회 실패 → 30초 잠금"
      http_status: 429
    - code: RT_REASON_REQUIRED
      condition: "해체 처리 (Sobo25) 시 GBIGO (사유) 누락"
      http_status: 422
      phase1_policy: "감사 로그용 — 모던 강화 (DEC-029)."
    - code: RT_CONCURRENT_CHANGE
      condition: "변경 처리 (Sobo51) 시 동시 변경 충돌 (Sv_Ghng Max(Gdate) 기반)"
      http_status: 409
    - code: RT_IMPORT_DECODE
      condition: "임포트 파일 디코딩 실패 (DEC-024 _normalize_aiomysql_row 정책)"
      http_status: 400

# ---------------------------------------------------------------
# 4. 데이터 액세스 (레거시 SQL ↔ 웹 SQL)
# ---------------------------------------------------------------
data_access:
  - id: SQL-RT-1-LIST
    legacy:
      file: legacy_delphi_source/legacy_source/Subu23.pas
      line: 372
      sql: |
        Select * From S1_Ssub Where <D_Select>
              Gdate >= '<from>' and Gdate <= '<to>' and Gubun='반품'
              and Ocode='B' and Scode='X' [and Hcode='<hc>']
        Order By Gdate, Hcode, Jubun
    notes:
      - "조회 화면(Button101 / dxButton1). 1차 web 변환은 GROUP BY 합성키로 단순화 (C2/C3 패턴)."
      - "C2/C3 의 SQL-OUT-4 / SQL-IN-1 패턴과 정합 — 동일 테이블, Gubun 만 '반품'."
    web:
      method: SELECT
      table: S1_Ssub
      columns: [Gdate, Hcode, Jubun, "COUNT(*) AS lines", "SUM(Gsqut) AS qty", "SUM(Gssum) AS amount", "MAX(Yesno) AS yesno"]
      where:
        - "Gdate >= :date_from"
        - "Gdate <= :date_to"
        - "Gubun = '반품'"
        - "Ocode = 'B'"
        - "Scode = 'X'"
        - "[Hcode = :hcode]"
        - "[Yesno != '2' OR :include_cancelled]"
      group_by: ["Gdate", "Hcode", "Jubun"]
      order_by: ["Gdate DESC", "Hcode"]
      limit: parameterized
      bind: parameterized
    in_scope_phase1: true

  - id: SQL-RT-2-DETAIL
    legacy:
      file: legacy_delphi_source/legacy_source/Subu23.pas
