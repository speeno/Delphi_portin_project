changelog:
  - date: 2026-04-19
    by: porting-team
    note: |
      1.0.0 — C4 반품 처리 1차 contract 신규 작성 (DEC-029 신설과 함께 동결).
      - scope_phase: phase1 / acceptance_goal: "CRUD + 3분기 처리 + 일일 보고 + 패스워드 + 임포트"
      - 분석 출처: analysis/c4_returns_flow.md (SQL-RT-1~27 카탈로그) + Subu23/24/25/51/55/40.pas + Base01.pas L4839~5520
      - layout_mappings: Sobo23/23_1(3변형)/24/25/51/55/40 모두 1:1 매핑표 (DEC-028)
      - data_access SQL-RT-1~27 (LIST/DETAIL/CRUD/CANCEL/MEMO/REGEN/DISASS/CHANGE/DAILY/IMPORT/AUDIT/LOOKUP/IDNUM)
      - INSERT/UPDATE/DELETE 는 Base10 데이터셋 자동 SQL 을 명시적 SQL + 파라미터 바인딩으로 재작성
      - 3분기 처리: 재생(Sobo24, Gdate 키, Scode='2' soft) / 해체(Sobo25, Bdate 키 ⭐, Scode='3' soft) / 변경(Sobo51, Sv_Ghng+Sg_Csum 동기)
      - 패스워드 게이트 (Sobo40 → /audit/password-verify) — 5분 HMAC 토큰, 1차 환경변수 평문, Phase 2 bcrypt
      - 임포트 (chul_08 자료불러오기) — multipart 업로드 → preview → execute, 1차 CSV EUC-KR
      - deltas D-RT-1~8 (1차 in_scope: D-RT-1/2/3/8, 후속: D-RT-4/5/6/7)
      - endpoints: GET 목록/상세 + POST(신규) + PUT/PATCH-cancel/PATCH-memo + 재생/해체/변경 + 일별 보고서 + 패스워드 + 임포트(preview/execute)
      - customer_variants: Sobo23 본 + Sobo23_1 본/chul_05/chul_08 — 코드 분기 금지, chul_08 은 별도 컴포넌트 (DEC-029 §2)
      - 1차 합격선: "반품 CRUD + 3분기 처리 + 일일 보고 + 패스워드 + chul_08 임포트"
