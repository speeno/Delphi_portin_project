# ---------------------------------------------------------------
# 5. 엔드포인트 (웹)
# ---------------------------------------------------------------
endpoints:
  - method: GET
    path: /api/v1/returns
    description: "반품 명세서 목록 조회 (날짜 범위 + 거래처 필터)."
    auth: bearer
    request:
      query:
        server_id: string
        date_from: string   # 'YYYY-MM-DD'
        date_to: string
        hcode?: string
        include_cancelled?: boolean    # 기본 false
        limit?: integer
        offset?: integer
    responses:
      "200":
        body:
          items:
            - return_key: { gdate: string, hcode: string, jubun: string }
              customer_name: string
              lines: integer
              qty: integer
              amount: integer
              status: "active|cancelled"
          page:
            limit: integer
            offset: integer
            total: integer
            has_more: boolean
      "401": { body: { detail: "Invalid or expired token" } }

  - method: GET
    path: /api/v1/returns/{return_key}
    description: "반품 명세서 상세 (한 합성키의 라인 N개 + 메모 + 마스터 채움)."
    auth: bearer
    request:
      path:
        return_key: string   # 'G|{gdate}|{hcode}|{jubun}' 또는 'B|{bdate}|{hcode}|{jubun}'
    responses:
      "200":
        body:
          return_key: { gdate?: string, bdate?: string, hcode: string, jubun: string }
          customer: { hcode: string, hname: string }
          memo:
            gbigo?: string
            sbigo?: string
            gtel1?: string
            gtel2?: string
            gname?: string
            gpost?: string
          status: "active|cancelled"
          lines:
            - bcode: string
              bname: string
              pubun: string
              gsqut: integer
              gdang: integer
              grat1: number
              gssum: integer
              gbigo: string
              yesno: string
      "404": { body: { detail: "Return not found", code: "RT_NOT_FOUND" } }

  - method: POST
    path: /api/v1/returns
    description: "반품 명세서 신규 등록 (헤더 + 메모 + 라인 N개 단일 트랜잭션)."
    auth: bearer
    request:
      content_type: application/json
      schema:
        server_id: string
        return_header:
          gdate: "string (required)"
          hcode: "string (required)"
          jubun: "string (optional, server-generated)"
          gjisa: "string (optional)"
          gubun: "string (optional, default '반품')"
          ocode: "string (optional, default 'B')"
          scode: "string (optional, default 'X')"
        return_memo: "object (optional) — { gbigo, sbigo, gtel1, gtel2, gname, gpost }"
        return_lines:
          - bcode: "string (required)"
            pubun: "string (optional)"
            gsqut: "integer (required)"
            gdang: "integer (optional)"
            grat1: "number (optional)"
            gssum: "integer (optional, default 0)"
            gbigo: "string (optional)"
    responses:
      "201":
        body:
          return_key: { gdate, hcode, jubun }
          lines: integer
          qty: integer
          amount: integer
          created_at: string
      "409": { body: { detail: "Duplicate return key", code: "RT_DUPLICATE" } }
      "422": { body: { detail: "Validation failed", code: "RT_VALIDATION", errors: object } }
      "500": { body: { detail: "Transaction failed (rolled back)", code: "RT_TX_FAILED" } }

  - method: PUT
    path: /api/v1/returns/{return_key}
    description: "반품 수정 (라인 diff: 추가/수정/삭제 + 메모 UPSERT)."
    auth: bearer
    responses:
      "200":
        body:
          return_key: { gdate?, bdate?, hcode, jubun }
          lines: integer
          qty: integer
          amount: integer
          updated_at: string
          diff: { inserted: integer, updated: integer, deleted: integer }
      "404": { body: { detail: "Return not found", code: "RT_NOT_FOUND" } }

  - method: PATCH
    path: /api/v1/returns/{return_key}/cancel
    description: "반품 취소 (모든 라인 Yesno='2' UPDATE — 소프트 삭제). DEC-012."
    auth: bearer
    request:
      content_type: application/json
      schema:
        reason: "string (optional, audit-only)"
    responses:
      "200":
        body:
          return_key: { gdate, hcode, jubun }
          status: "cancelled"
          cancelled_at: string
      "404": { body: { detail: "Return not found", code: "RT_NOT_FOUND" } }

  - method: PATCH
    path: /api/v1/returns/{return_key}/memo
    description: "헤더 메모 UPSERT (S1_Memo)."
    auth: bearer
    request:
      content_type: application/json
      schema:
        gbigo?: string
        sbigo?: string
        gtel1?: string
        gtel2?: string
        gname?: string
        gpost?: string
    responses:
      "200":
        body:
          return_key: { gdate, hcode, jubun }
          action: "inserted|updated"
          updated_at: string

  # ---------- 재생 (Sobo24) ----------
  - method: GET
    path: /api/v1/returns/dispose/regenerable
    description: "재생 가능 후보 라인 조회 (Sobo24)."
    auth: bearer
    request:
      query:
        server_id: string
        date_from: string
        date_to: string
        hcode?: string
        limit?: integer
        offset?: integer
    responses:
      "200":
        body:
          items:
            - id: integer
              gdate: string
              bcode: string
              bname: string
              gsqut: integer
              gdang: integer
              gssum: integer
              gbigo: string

  - method: POST
    path: /api/v1/returns/dispose/regen
    description: "재생 처리 — 정품 재고 환원 + Sg_Csum 갱신. 🔒 audit_token 필수 (DEC-029)."
    auth: bearer
    request:
      headers:
        Authorization-Audit: "Bearer-Audit {token} — POST /audit/password-verify 응답"
      content_type: application/json
      schema:
        server_id: string
        rows:
          - id: integer
            gsqut?: integer  # 부분 재생 시 — 미제공 시 전체
            gbigo?: string
    responses:
      "200":
        body:
          processed: integer
          regenerated_qty: integer
      "401": { body: { detail: "Audit token required or expired", code: "RT_AUDIT_REQUIRED" } }
      "500": { body: { detail: "Transaction failed (rolled back)", code: "RT_TX_FAILED" } }

  # ---------- 해체 (Sobo25) ----------
  - method: GET
    path: /api/v1/returns/dispose/disassemblable
    description: "해체 가능 후보 라인 조회 (Sobo25). ⭐ Bdate 키."
    auth: bearer
    request:
      query:
        server_id: string
        date_from: string
        date_to: string
        hcode?: string
    responses:
      "200":
        body:
          items:
            - id: integer
              bdate: string  # ⭐ Bdate (반품 입고일)
              bcode: string
              bname: string
              gsqut: integer
              gdang: integer
              gssum: integer
              gbigo: string

  - method: POST
    path: /api/v1/returns/dispose/disassemble
    description: "해체 처리 — 폐기 분류. 🔒 audit_token + ConfirmDialog + GBIGO(사유) 필수 (DEC-029)."
    auth: bearer
    request:
      headers:
        Authorization-Audit: "Bearer-Audit {token}"
      content_type: application/json
      schema:
        server_id: string
        rows:
          - id: integer
            gsqut?: integer
            gbigo: "string (required)"   # 해체 사유 — 감사 로그
    responses:
      "200":
        body:
          processed: integer
          disassembled_qty: integer
      "401": { body: { detail: "Audit token required", code: "RT_AUDIT_REQUIRED" } }
      "422": { body: { detail: "Reason required for disassemble", code: "RT_REASON_REQUIRED" } }

  # ---------- 변경 (Sobo51) ----------
  - method: GET
    path: /api/v1/returns/change/changeable
    description: "변경 가능 후보 조회 (Sobo51). ⭐ Sg_Csum 직접 조회."
    auth: bearer
    request:
      query:
        server_id: string
        date_from: string
        date_to: string
        hcode?: string
    responses:
      "200":
        body:
          items:
            - gdate: string
              hcode: string
              bcode: string
              gssum: integer   # 대조재고 (READ-ONLY)
              gosum: integer   # 원장재고 (READ-ONLY)
              gbsum: integer   # 변경수량 (입력 대상)
              gbigo: string

  - method: POST
    path: /api/v1/returns/change
    description: "변경 처리 — Sv_Ghng UPSERT + Sg_Csum 동기. 🔒 audit_token + GBIGO 필수."
    auth: bearer
    request:
      headers:
        Authorization-Audit: "Bearer-Audit {token}"
      content_type: application/json
      schema:
        server_id: string
        rows:
          - gdate: string
            hcode: string
            bcode: string
            gbsum: "integer (required)"
            gbigo: "string (required)"   # 변경 사유 — 감사 로그
    responses:
      "200":
        body:
          processed: integer
          inserted: integer
          updated: integer
      "401": { body: { detail: "Audit token required", code: "RT_AUDIT_REQUIRED" } }
      "409": { body: { detail: "Concurrent change detected", code: "RT_CONCURRENT_CHANGE" } }
      "422": { body: { detail: "Reason required for change", code: "RT_REASON_REQUIRED" } }

  # ---------- 일별 보고서 (Sobo55) ----------
  - method: GET
    path: /api/v1/returns/reports/daily
    description: "일별 반품내역서 (Sobo55). DBGrid101 (출판사 단위) + DBGrid201 (라인 상세)."
    auth: bearer
    request:
      query:
        server_id: string
        date_from: "string (required)"
        date_to: "string (required)"
        hcode?: string
        gcode?: string
        detail_for_hcode?: string  # 마스터 행 선택 시 디테일 응답에 포함
    responses:
      "200":
        body:
          master:
            - gdate: string
              hcode: string
              hname: string
              line_count: integer
              total_qty: integer
              total_amount: integer
          detail:
            - gcode: string
              gname: string
              idnum: integer
              pubun: string
              bcode: string
              bname: string
              gsqut: integer
              gdang: integer
              grat1: number
              gssum: integer
          kpi:
            total_publishers: integer
            total_count: integer
            total_qty: integer
            total_amount: integer

  # ---------- 패스워드 검증 (Sobo40) ----------
  - method: POST
    path: /api/v1/audit/password-verify
    description: "패스워드 검증 (Sobo40 다이얼로그). 통과 시 5분 수명 토큰 발급."
    auth: bearer
    request:
      content_type: application/json
      schema:
        password: "string (required)"
        scope: "string (default 'inventory_change')"  # 토큰 스코프
    responses:
      "200":
        body:
          token: string         # HMAC-SHA256 (Phase 1 임시)
          expires_at: string    # ISO 8601 — 5분 후
          scope: string
      "401": { body: { detail: "Invalid password", code: "RT_AUDIT_INVALID" } }
      "429": { body: { detail: "Too many failed attempts (3 in 30s)", code: "RT_AUDIT_LOCKED" } }

  # ---------- 임포트 (Sobo23_1 chul_08 자료불러오기) ----------
  - method: POST
    path: /api/v1/returns/import/preview
    description: "외부 자료 임포트 미리보기 (chul_08 자료불러오기). multipart 업로드 → 미리보기 + preview_id."
    auth: bearer
    request:
      content_type: multipart/form-data
      schema:
        server_id: "string (required)"
        customer_kind: "string (required) — '직거래'/'서점'/'온라인'/'기타'"
        file: "binary (required) — CSV EUC-KR (1차)"
    responses:
      "200":
        body:
          preview_id: string         # 후속 execute 호출에 사용 (5분 수명)
          rows:
            - jubun: string
              gcode: string
              gname: string
              bcode: string
              bname: string
              gsqut: integer
              gdang: integer
              gssum: integer
              code1: "string|null"   # 불능 사유 (있으면 임포트 불가)
              code2: "boolean"       # 임포트 가능 여부
          summary:
            importable: integer
            unimportable: integer
      "400": { body: { detail: "Decode failed", code: "RT_IMPORT_DECODE" } }

  - method: POST
    path: /api/v1/returns/import/execute
    description: "임포트 실행 — 미리보기에서 importable 행만 INSERT 트랜잭션."
    auth: bearer
    request:
      content_type: application/json
      schema:
        server_id: string
        preview_id: "string (required)"
    responses:
      "200":
        body:
          imported: integer
          skipped: integer
          returns:
            - return_key: { gdate, hcode, jubun }
              lines: integer

# ---------------------------------------------------------------
# 6. 차이점·결정 사항
# ---------------------------------------------------------------
deltas:
  - id: D-RT-1
    title: 패스워드 게이트 모달 (Sobo40) 의 토큰 기반 강화
    in_scope_phase1: true
    decision_ref: DEC-029
    phase1_behavior: "환경변수 AUDIT_PASSWORD 평문 비교 + 5분 HMAC-SHA256 토큰 + audit_log INSERT."
    legacy_behavior: "TSobo40 단순 모달 — 결과 boolean 반환."
    proposed_web_behavior: "(Phase 2) bcrypt(cost=12) + 운영 비밀 관리자 통합."
    risk: "1차 — 환경변수 평문 보관 (운영 보안 임시). 운영 매뉴얼에 명시."

  - id: D-RT-2
    title: 3분기 처리 (재생/해체/변경) 의 명시적 트랜잭션 강화
    in_scope_phase1: true
    decision_ref: DEC-029
    phase1_behavior: "각 endpoint 가 BEGIN→처리→COMMIT 명시. 라인 1개 실패 시 전체 롤백."
    legacy_behavior: "Base10.Socket.RunSQL 직접 실행 (autocommit, BEGIN/COMMIT 없음)."
    proposed_web_behavior: "DIP 강화 — 모든 변경 트랜잭션이 returns_service.execute_in_transaction 으로 통일."

  - id: D-RT-3
    title: 임프린트 chul_08 변형 — 별도 컴포넌트 (DataImportModal) 분리
    in_scope_phase1: true
    decision_ref: DEC-029
    phase1_behavior: "ReturnLineGrid 와 별도 컴포넌트 — data-legacy-id 네임스페이스 분리 (Sobo23_1.* vs Sobo23_1_import.*)."
    legacy_behavior: "TSobo23_1 (book_kb) 와 TSobo23_1 (chul_08) 이 같은 파일명이지만 폼 캡션이 다름 (반품명세서 vs 자료불러오기)."
    proposed_web_behavior: "동일 파일명, 의미 다른 폼의 네임스페이스 분리 정책 — DEC-029 §2 참조."

  - id: D-RT-4
    title: Sobo34_4 폐기 원장 + Sobo58 기간별 보고서 — Phase 2 후속
    in_scope_phase1: false
    decision_ref: DEC-027
    phase1_behavior: "Phase 1 미제공. Phase 2 에 reports/period + reports/disposal 추가 예정."
    legacy_behavior: "별도 화면."
    proposed_web_behavior: "C7 사이클 또는 C4 Phase 2 에서 추가."

  - id: D-RT-5
    title: 인쇄 (Sobo55 출력 버튼) — C7 인쇄 시나리오로 이관
    in_scope_phase1: false
    decision_ref: DEC-017
    phase1_behavior: "Phase 1 화면 표시만. 인쇄 버튼 disabled."

  - id: D-RT-6
    title: 헤더 전체 물리 삭제 — 미제공 (소프트 취소만)
    in_scope_phase1: false
    decision_ref: DEC-012
    phase1_behavior: "PATCH /cancel 만. DELETE 메서드 미제공."

  - id: D-RT-7
    title: 권한키 분기 (D_Select) — 일반 권한 관리에 통합
    in_scope_phase1: false
    decision_ref: DEC-009
    phase1_behavior: "1차 모든 인증 사용자에게 권한 동등 (D_Select 빈 값 가정)."
    proposed_web_behavior: "(후속) C10 권한 관리 RBAC 도입 시 매핑."

  - id: D-RT-8
    title: 임포트 외부 데이터 형식 — CSV EUC-KR 만 (1차)
    in_scope_phase1: true
    decision_ref: OQ-RT-1
    phase1_behavior: "CSV EUC-KR 가정. 헤더 행 + 라인 N 행."
    proposed_web_behavior: "(후속) 엑셀/타 시스템 API/JSON 등 형식 추가 — 운영팀 합의 후."

# ---------------------------------------------------------------
# 7. 동등성 기준 (5축)
# ---------------------------------------------------------------
equivalence:
  functional:
    - "동일 (gdate, hcode, lines[]) 입력에 대해 신규 등록 → 합성키(jubun) 발급 → 조회 가능."
    - "수정 시 라인 diff (추가/수정/삭제) + 메모 UPSERT 가 단일 트랜잭션."
    - "취소 후 GET 상세에서 status='cancelled'."
    - "재생 처리: token 검증 → 정품 재고 +N + Sg_Csum 갱신 (단일 트랜잭션)."
    - "해체 처리: token + ConfirmDialog + GBIGO 필수 → Bdate 키로 INSERT (단일 트랜잭션)."
    - "변경 처리: token + GBIGO 필수 → Sv_Ghng UPSERT + Sg_Csum 동기 (단일 트랜잭션)."
    - "일별 보고서: master + detail 2단 그리드 + KPI 4종."
    - "임포트 (chul_08): 미리보기 → 실행 (CODE2=완료 표시)."
    - "1차: 권한키/바코드/인쇄/물리삭제/Sobo34_4/Sobo58 모두 미수행."
  data:
    - "S1_Ssub INSERT/UPDATE/DELETE 모두 명시적 SQL + 파라미터 바인딩."
    - "라인 N개 = 단일 트랜잭션. 1건 실패 시 전체 롤백."
    - "S1_Memo UPSERT (Subu23.pas L1213/1257 패턴 — C6/C3 재사용)."
    - "Yesno enum: '0'/'1'/'2'. 1차 신규='0', 취소→'2'. (C2/C3 와 동일)."
    - "Scode enum: 'X' 정상, '2' 재생 후 삭제, '3' 해체 후 삭제. (Base01.pas L5267/L5410)."
    - "Bdate (해체 키) vs Gdate (일반 반품 키) 분리 — return_key 직렬화 'B|...' / 'G|...' prefix."
    - "Sv_Ghng UPSERT + Sg_Csum 동기 — 단일 트랜잭션."
    - "audit_log INSERT — 모든 패스워드 검증 시도 (성공/실패) + 모든 재생/해체/변경 처리."
    - "DEC-028: 모던 페이지의 모든 위젯에 data-legacy-id 부착 — layout_mappings 의 위젯 ID 와 1:1."
  ux:
    - "Subu23 의 4분할 레이아웃 (상단 검색 / 중단 그리드 / 하단 입력 / 우측 액션 코너) 을 layout_mappings/Sobo23.md §2 그대로 모던 그리드로 재구성."
    - "DBGrid101 9 컬럼 (PUBUN/BCODE/BNAME/GSQUT/GDANG/GRAT1/GSSUM/GBIGO/YESNO) 컬럼명·정렬·합계 보존."
    - "Sobo24/25 7 컬럼 (GDATE/BCODE/BNAME/GSQUT/GDANG/GSSUM/GBIGO) 동일 구조 — 공통 DisposeGrid 컴포넌트 추출."
    - "Sobo51 7 컬럼 (GDATE/GCODE/GNAME/GSSUM=대조/GOSUM=원장/GBSUM=변경/GBIGO) — 회계 검증 패턴 (GSSUM≠GOSUM 행 강조)."
    - "Sobo55 master/detail 2단 + KPI 4종 (총 출판사수/총 건수/총 권수/총 금액)."
    - "AuditPasswordModal: autoFocus + Enter 단축키 + inline 에러 + 5분 토큰."
    - "DataImportModal (chul_08): 미리보기 그리드 + CODE1/CODE2 상태 컬럼 + 일괄 등록 토글."
    - "도서/거래처 자동완성 (C2/C9 masters_service 재사용)."
  performance:
    - "라인 100건 신규 등록 < 1s (로컬 MySQL, 단일 트랜잭션)."
    - "재생/해체 100건 처리 < 1.5s (audit token 검증 포함)."
    - "변경 50건 처리 < 2s (Sv_Ghng + Sg_Csum 동기)."
    - "목록 조회 p95 < 500 ms (limit=50)."
    - "일별 보고서 < 1s (master + detail)."
    - "임포트 1000행 미리보기 < 3s, 실행 < 5s."
  audit:
    - "신규/수정/취소/재생/해체/변경/임포트 모두 audit.returns 로거에 구조화 JSON 1줄 기록."
    - "필수 필드: timestamp / gcode (작업자) / return_key / action (created/updated/cancelled/regenerated/disassembled/changed/imported) / result / client_ip / audit_token_hash."
    - "재생/해체/변경 시: audit_token_id (검증 통과한 토큰 ID) 추가 기록."
    - "패스워드 검증: audit.audit 로거에 success/fail/locked 모두 기록."

