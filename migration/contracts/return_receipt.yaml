  layout_mappings:        # DEC-028 — 신규 화면 작성의 공식 입력
    - analysis/layout_mappings/Sobo23.md
    - analysis/layout_mappings/Sobo23_1.md  # 본/chul_05/chul_08 3변형 모두 반영
    - analysis/layout_mappings/Sobo24.md
    - analysis/layout_mappings/Sobo25.md
    - analysis/layout_mappings/Sobo51.md
    - analysis/layout_mappings/Sobo55.md
    - analysis/layout_mappings/Sobo40.md
  dfm_html_artifacts:
    - tools/delphi_porting_accelerator/examples/generated/legacy_source_root/Subu23/Sobo23.html
    - tools/delphi_porting_accelerator/examples/generated/legacy_source_root/Subu23_1/Sobo23_1.html
    - tools/delphi_porting_accelerator/examples/generated/legacy_source_root/Subu23_1_chul05/Sobo23_1.html
    - tools/delphi_porting_accelerator/examples/generated/legacy_source_root/Subu23_1_chul08/Sobo23_1.html
    - tools/delphi_porting_accelerator/examples/generated/legacy_source_root/Subu24/Sobo24.html
    - tools/delphi_porting_accelerator/examples/generated/legacy_source_root/Subu25/Sobo25.html
    - tools/delphi_porting_accelerator/examples/generated/legacy_source_root/Subu51/Sobo51.html
    - tools/delphi_porting_accelerator/examples/generated/legacy_source_root/Subu55/Sobo55.html
