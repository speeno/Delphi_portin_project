# Migration Contract: 반품 처리 (C4)
# 본 계약은 레거시 델파이 동작을 웹(API+UI)에서 동등하게 재현하기 위한 1차 계약입니다.
# 출처(레거시):
#   - legacy_delphi_source/legacy_source/Subu23.pas (TSobo23 반품 메인 — CRUD 진입점)
#       FormShow / Button101Click(조회) / Button501Click(메모 로드) /
#       L372/388 SELECT / L1213 UPDATE S1_Memo / L1257 INSERT INTO S1_Memo (UPSERT)
#       L758/776/826/844 Max(Idnum) 채번
#   - legacy_delphi_source/legacy_source/Subu23_1.dfm (라인 다이얼로그 본/chul_05) + Subu23_1_chul08 자료불러오기 (변형)
#   - legacy_delphi_source/legacy_source/Subu24.pas (TSobo24 반품재고 정품입고-재생) → Base10.T2_Sub41AfterDelete/BeforePost
#   - legacy_delphi_source/legacy_source/Subu25.pas (TSobo25 반품재고 반품입고-해체) → Base10.T2_Sub51AfterDelete/BeforePost (Bdate 키)
#   - legacy_delphi_source/legacy_source/Subu51.pas (TSobo51 반품재고 변경) → Base10.T5_Sub11 + _Sv_Ghng_ (Sv_Ghng + Sg_Csum 동기)
#   - legacy_delphi_source/legacy_source/Subu55.pas (TSobo55 일별 반품내역서)
#   - legacy_delphi_source/legacy_source/Subu40.pas (TSobo40 패스워드 다이얼로그 — 단순 UI 모달)
#   - legacy_delphi_source/legacy_source/Base01.pas L4839/4897 (T2_Sub31 = 반품 라인 INSERT/UPDATE),
#                                                  L5251/5295 (T2_Sub41 = 재생),
#                                                  L5398/5424 (T2_Sub51 = 해체, Bdate 키),
#                                                  L6805+L8731 (T5_Sub11 + _Sv_Ghng_ = 변경)
# 사용 폼: Sobo23 (메인) + Sobo23_1 (라인 본/chul_05/chul_08 변형) + Sobo24 (재생) + Sobo25 (해체) + Sobo51 (변경) + Sobo55 (일별 보고서) + Sobo40 (패스워드)
# 핵심 테이블: S1_Ssub (출고/입고/반품/재생/해체 통합 — Gubun 컬럼으로 식별, Bdate/Gdate 키 분기)
# 보조 테이블: S1_Memo (헤더 메모 UPSERT — Subu23.pas L1213/1257), Sg_Csum (집계 재고 — Subu51 동기 갱신),
#             Sv_Ghng (변경 이력 — Subu51 핵심), G1_Ggeo/G4_Book/G5_Ggeo/G7_Ggeo (자동완성 LOOKUP)
# 1차 미접근: Sobo24 의 부분 재생, Sobo34_4 (폐기 원장), Sobo58 (기간별 보고서) — Phase 2
# 관련 OQ: OQ-RT-1~6 (analysis/c4_returns_flow.md §7)
# 관련 DEC: DEC-029 (재고 변경 작업 패스워드 게이트 — 본 contract 와 함께 신설),
#           DEC-027 (소프트 취소 패턴 — C3 재사용), DEC-024 (페이지네이션), DEC-019 (customer_variants),
#           DEC-012 (소프트 취소 — Yesno='2'), DEC-028 (dfm 레이아웃 영구 입력)
# 참조 산출물: analysis/layout_mappings/Sobo23.md / Sobo23_1.md / Sobo24.md / Sobo25.md / Sobo51.md / Sobo55.md / Sobo40.md
#             analysis/c4_returns_flow.md (SQL-RT-1~27 카탈로그)

id: C4-return-receipt
name: 반품 처리 (CRUD + 3분기 처리 + 일일 보고 + 패스워드 + 임포트)
version: 1.0.0
status: approved        # draft → review → approved (1차 동결, DEC-029 신설과 함께)
scope_phase: phase1
acceptance_goal: |
  1차 포팅 합격선: "기존 사용자가 반품 명세서를 신규 등록 / 수정 / 취소 / 조회 (CRUD) 할 수 있고,
  반품된 책의 운명을 3분기 (재생 / 해체 / 변경) 로 결정할 수 있으며,
  일별 반품 보고서를 조회하고, 임프린트 지점에서는 외부 자료(자료불러오기) 임포트가 가능하다.
  재고 변경 작업 (재생/해체/변경) 은 패스워드 다이얼로그 (Sobo40) 통과 필수."
  Sobo34_4 (폐기 원장) / Sobo58 (기간 보고서) / 인쇄·바코드 / 권한키 분기 / 진짜 부분 재생 정밀 제어 는 모두 후속.

owners:
  business: 메인개발자
  legacy: 델파이 담당자
  web: 웹 포팅 팀

links:
  candidate: docs/core-scenarios-candidates.md#c4-반품
  test_pack: test/test_c4_returns_phase1.py
  source_legacy:
    - legacy_delphi_source/legacy_source/Subu23.pas
    - legacy_delphi_source/legacy_source/Subu23.dfm
    - legacy_delphi_source/legacy_source/Subu24.pas
    - legacy_delphi_source/legacy_source/Subu25.pas
    - legacy_delphi_source/legacy_source/Subu51.pas
    - legacy_delphi_source/legacy_source/Subu55.pas
    - legacy_delphi_source/legacy_source/Subu40.pas
    - legacy_delphi_source/legacy_source/Base01.pas
  source_analysis:
