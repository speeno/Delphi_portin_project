<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>환경설정</title>
  <style>body { margin: 0; padding: 24px; font-family: Arial, sans-serif; background: #f5f7fb; }
.legacy-control { box-sizing: border-box; }
.legacy-control.table, table.legacy-control { border-collapse: collapse; background: white; }
.legacy-control th, .legacy-control td, table.legacy-control th, table.legacy-control td { border: 1px solid #a8b0bb; padding: 4px 6px; font-size: 12px; }
.legacy-control thead th { background: #e8eef8; }
.legacy-unsupported { border: 1px dashed #d32f2f; background: #fff5f5; color: #9a1f1f; padding: 4px 6px; }
.legacy-unsupported-badge { position: absolute; left: 2px; top: 2px; font-size: 10px; color: #9a1f1f; background: rgba(255, 245, 245, 0.9); border: 1px dashed #d32f2f; padding: 0 4px; }
button.legacy-control { background: linear-gradient(#fdfdfd, #dfe7ef); border: 1px solid #9aa6b2; }
input.legacy-control, textarea.legacy-control { border: 1px solid #9aa6b2; background: #ffffff; }
.legacy-radio-option { display: flex; align-items: center; gap: 4px; font-size: 12px; cursor: pointer; }
.legacy-radiogroup-empty { color: #64748b; font-size: 12px; padding: 4px; }
.legacy-tab-header { display: flex; gap: 0; background: #dfe7ef; border-bottom: 1px solid #bfc5cc; }
.legacy-tab-btn { padding: 4px 12px; border: 1px solid #bfc5cc; border-bottom: none; background: #ececec; cursor: pointer; font-size: 12px; }
.legacy-tab-btn.legacy-tab-active { background: #ffffff; font-weight: bold; }</style>
</head>
<body>
<div class="legacy-control form form TSobo1A" style="position:relative;width:358px;height:119px;background:#ececec;overflow:hidden;font-size:12px;font-family:굴림, sans-serif;color:#111111;border:1px solid #bfc5cc" data-delphi-class="TSobo1A" data-delphi-render="form" id="Sobo1A" data-delphi-event-show="FormShow">환경설정<fieldset class="legacy-control group group TFlatGroupBox" style="position:absolute;left:4px;top:4px;width:205px;height:69px;background:14416873;border:1px solid #bfc5cc" data-delphi-class="TFlatGroupBox" data-delphi-render="group" id="FlatGroupBox1" tabindex="0"><legend>거래명세서</legend><div class="legacy-control label label TLabel" style="position:absolute;left:9px;top:44px;width:101px;height:12px;display:flex;align-items:center;justify-content:center;white-space:pre-line" data-delphi-class="TLabel" data-delphi-render="label" id="Label1">세부내용 라인 수</div><label class="legacy-control checkbox checkbox TFlatCheckBox" style="position:absolute;left:9px;top:20px;width:164px;height:17px" data-delphi-class="TFlatCheckBox" data-delphi-render="checkbox" for="FlatCheckBox1_cb"><input type="checkbox" id="FlatCheckBox1_cb" class="legacy-control checkbox TFlatCheckBox" tabindex="0" /> 합계금액 앞에 &quot; \&quot;표시</label><input type="number" class="legacy-control number number TFlatNumber" style="position:absolute;left:121px;top:40px;width:43px;height:21px;font-size:15px;font-family:굴림, sans-serif;color:#111111;padding:2px 6px" data-delphi-class="TFlatNumber" data-delphi-render="number" id="Edit_lines" tabindex="1" tabindex="1" value="5" /></fieldset><button class="legacy-control button button TdxButton" style="position:absolute;left:5px;top:86px;width:128px;height:26px;padding:2px 6px;cursor:pointer;display:flex;align-items:center;justify-content:center" data-delphi-class="TdxButton" data-delphi-render="button" id="Button102" tabindex="1" data-delphi-event-click="Button102Click">저장 후 닫기</button><button class="legacy-control button button TdxButton" style="position:absolute;left:136px;top:86px;width:74px;height:26px;padding:2px 6px;cursor:pointer;display:flex;align-items:center;justify-content:center" data-delphi-class="TdxButton" data-delphi-render="button" id="dxButton1" tabindex="2" data-delphi-event-click="dxButton1Click">닫기</button></div>
</body>
</html>
