# DEC-054 — 레거시 포팅 누락 회귀 가드 allowlist
#
# 본 파일은 `tools/audit_legacy_coverage.py` 가 신규 위반을 감별하기 위한
# 의도된 부채(baseline) + 의도된 deferral 의 단일 원천이다.
#
# 신규 항목 추가 정책 (사용자 룰):
#   1) `reason` 필수 — 누락/불일치 사유 한 줄
#   2) `until`  필수 — 정리 시점 (Phase / merge / 분기 명시)
#   3) PR 리뷰 시 신규 추가 사유 검토
#
# 분기 정기 점검 (plan §5.3):
#   - `until` 만료 항목 일괄 재분류 → registry 보강 또는 별도 포팅 plan 수립
#
# 카테고리:
#   missing_forms       : DFM root caption 있지만 registry id 에도 없고 어떤
#                          entry 의 scenario.legacy_form 에서도 참조되지 않음
#   caption_mismatches  : registry id ↔ DFM caption 정확 일치 위반
#                          (registry id base prefix 매칭 포함 — 예: Sobo67_status → Sobo67)
#
# ── 의도된 신규 포팅 (registry 등록 OK, DFM form_name 으로는 미존재) ──
# baseline 으로 surface 되지 않으므로 audit 카테고리 영향 없음 — 문서화 목적.
# (intentional_new_forms 섹션과 교차 검증)
intentional_new_forms:
  - form_name: Sobo67_yearbook
    reason: "별도 사이클 — '도서별년말집계 신규 포팅' (DEC-033 (k+1)) 산출"
    until: "Sobo67_yearbook merge"

